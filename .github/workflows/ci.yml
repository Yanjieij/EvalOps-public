name: ci

# Runs on every push to main and every pull request against main.
# Each job is independent so a failure in one lane (e.g. Go) doesn't
# mask a Python regression — surface all problems at once.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on the same branch to avoid queue pile-up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-engine:
    name: eval-engine (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: services/eval-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install eval-engine (editable, dev extras)
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: pytest
        run: pytest -q --cov=evalops --cov-report=term-missing

  control-plane:
    name: control-plane (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.23"]
    defaults:
      run:
        working-directory: services/control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: services/control-plane/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  agent-sidecar:
    name: agent-sidecar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sut-extensions/reference-agent-sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install sidecar package
        run: pip install -e .
      - name: Import smoke
        run: python -c "from agent_sidecar.server import create_app; create_app()"

  proto:
    name: proto (buf lint + drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.66.1
      - name: buf lint
        run: cd proto && buf lint
      - name: buf generate + diff guard
        run: |
          cd proto && buf generate
          cd ..
          if ! git diff --quiet -- \
              services/control-plane/internal/proto \
              services/eval-engine/src/evalops/v1; then
            echo "::error::proto stubs drift detected. Run 'make proto-gen' and commit."
            git diff --stat -- services/control-plane/internal/proto services/eval-engine/src/evalops/v1
            exit 1
          fi

  sidecar-sync:
    name: sidecar sync guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check that sut-extensions and reference-app copies would match if deployed
        # We can't actually sync into an external reference-app tree in CI
        # (it doesn't exist here). Instead we lint the source tree and
        # exercise the script in --check mode against itself.
        run: |
          test -d sut-extensions/reference-agent-sidecar
          test -x scripts/deploy-sidecar.sh
          # Ensure the script's rsync excludes don't miss the source.
          grep -q "SRC=" scripts/deploy-sidecar.sh

  web:
    name: web typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
