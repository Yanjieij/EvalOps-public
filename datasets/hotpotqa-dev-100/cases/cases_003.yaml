    - id: Viglen
      content: Viglen Ltd provides IT products and services, including storage systems,
        servers, workstations and data/voice communications equipment and services.
    - id: Compass Minerals
      content: Compass Minerals International, Inc is a United States listed public
        company that, through its subsidiaries, is a leading producer of minerals,
        including salt, magnesium chloride, sulfate of potash and other plant nutrition
        products.  Based in Kansas City, the company provides bulk treated and untreated
        highway deicing salt to customers in North America and the United Kingdom
        and plant nutrition products to growers worldwide.  Compass Minerals also
        produces consumer deicing and water conditioning products, consumer and commercial
        culinary salt, and other mineral-based products for consumer, agricultural,
        and industrial applications.  In addition, Compass Minerals provides records
        management services to businesses throughout the United Kingdom.
    - id: Owens &amp; Minor
      content: Owens & Minor () is a Fortune 500 company based in Mechanicsville,
        Virginia, just outside of Richmond.  Owens & Minor, Inc. is a healthcare logistics
        company specializing in contracting packages of healthcare products for hospitals.  Owens
        and Minor's tagline is "Connecting the World of Medical Products to the Point
        of Care".  The company provides supply chain services to healthcare providers
        and manufacturers of healthcare products, including disposable medical supplies
        as well as devices and implants.  Owens and Minor has logistics operations
        in the United States and Europe, where three quarters of global healthcare
        spending occurs.  Owens & Minor’s customers span the healthcare market from
        independent hospitals to large integrated healthcare networks, as well as
        group purchasing organizations, healthcare products manufacturers, and the
        federal government.  Owens & Minor is headquartered in Mechanicsville, Virginia,
        and has annualized revenues exceeding $9 billion.
    - id: Kingstone Companies
      content: 'Kingstone Companies, Inc., which has its headquarters in Kingston,
        New York, provides property and casualty insurance products through its subsidiary,
        Kingstone Insurance Company.  It places contracts with the third-party licensed
        premium finance company through its subsidiary Payments, Inc, a NYS licensed
        Insurance Premium Finance Company.  Kingstone Insurance Company was ranked
        #1 of the 81 insurers rated by the Professional Insurance Agents Association
        in its 2010 Company Performance Survey.  The company sells insurance products
        include personal lines of insurance products, general liability policies commercial
        automobile policies and so on through independent retail and wholesale agents
        and brokers.'
    - id: Jonathan Michael Ansell
      content: Jonathan M. Ansell (born August 13, 1950 in Binghamton, New York) is
        an American entrepreneur and CEO in the insurance and insurtech industry.  Ansell
        is the founder and CEO of insurtech companies Merlinio Technologies and Merlinio
        Insurance Services, an online digital insurance agency and technology platform
        serving the millennial market.  Before Merlinio, Ansell was a co-founder and
        CEO of Fusion Company, a global digital merchandising provider that specializes
        in ancillary products.  Fusion was created in 2012 after being spun-out of
        a large international insurance company.  Previously Ansell was the President,
        CEO and one of the co-founders of what is now Allianz Global Assistance USA,
        one of the largest travel insurance companies in the US and American specialty
        insurer Jefferson Insurance Company.  He was also a member of the management
        board of Allianz Global Assistance, formerly Mondial Assistance, an international
        travel insurance and assistance company based in Paris, France.
    - id: Clean Power Finance
      content: 'Clean Power Finance, headquartered in San Francisco, California, is
        a financial services and software company for the residential solar industry.  Clean
        Power Finance operates the CPF Market, an online business-to-business platform
        that connects institutional investors and lenders with residential solar professionals
        who need solar finance products to grow their businesses.  Clean Power Finance
        provides the solar industry with CPF Tools, a solar sales, quoting and design
        software-as-a-Service (SaaS) solution: qualified residential solar channel
        partners access finance products through the software.  Third-party investors
        create solar project finance funds; Clean Power Finance provides origination,
        underwriting and asset management services to the fund investors and markets
        investor capital to solar professionals as residential finance products, including
        solar leases and power purchase agreements (PPAs).'
