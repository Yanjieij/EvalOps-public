    - id: Eric Schultz
      content: Eric Schultz is a senior advisor to former President Barack Obama and
        is the founder of Schultz Group.  Schultz is a former White House Principal
        Deputy Press Secretary and special assistant to President Obama.  Recognized
        by "Politico" as the strategist “White House officials turn to in a crisis
        to handle communications,” Schultz was originally hired at the White House
        in 2011 to respond to Congressional oversight investigations.  After White
        House Deputy Press Secretary Josh Earnest replaced Jay Carney to become White
