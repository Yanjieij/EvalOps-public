    - title: Viglen
      sentence: Viglen Ltd provides IT products and services, including storage systems,
        servers, workstations and data/voice communications equipment and services.
    sources:
    - id: Cardinal Health
      content: Cardinal Health, Inc. is a Fortune 500 health care services company
        based in Dublin, Ohio.  The company specializes in distribution of pharmaceuticals
        and medical products, serving more than 100,000 locations.  The company also
        manufactures medical and surgical products, including gloves, surgical apparel
        and fluid management products.  In addition, it operates the nation’s largest
        network of radiopharmacies.  Cardinal Health provides medical products to
        over 75 percent of hospitals in the United States.  In December 2013, it was
        announced that Cardinal Health would team up with CVS Caremark, which would
        form the largest generic drug sourcing operation in the United States.  The
        venture was named Red Oak Sourcing and began operations in July 2014.
    - id: Terren Peizer
      content: Terren Scott Peizer dubbed the "Zelig of Wall Street" is currently
        the Chairman of his personal Los Angeles-based investment company, Acuitas
        Group Holdings (AGH), which in turn owns 100% of Crede Capital Group (CCG)
        which invests in public companies, and provides growth capital to small and
        medium-sized enterprises.  Since its inception in June 2009, CCG has provided
        companies with capital commitments and funding in excess of $1.2 Billion.  Besides
        its ownership of Crede Capital, Acuitas Group owns 72% of Catasys, Inc., a
        provider of proprietary big data based analytics and predictive modeling driven
        behavioral health management services for health plans; and owns 100% of NeurMedix,
        Inc., a biotech company that develops and commercializes disease modifying
        small molecules to treat neuro-degenerative diseases, such as Parkinson’s
        disease, Alzheimer’s disease, Migraine disease, Huntington’s disease, ALS,
        MS, Epilepsy, Traumatic Brain Injury, and Retina disease.  Peizer is Founder,
        Chairman of the three Acuitas companies, and is CEO of Catasys, Inc. and Crede
        Capital Group.  Having developed a bioscience and healthcare expertise, Peizer’s
        Crede Capital became the largest shareholder in 22nd Century Group, Inc.,
        a public company that is commercializing bio-plant technology to harm-reduce
        tobacco, creating very low nicotine and very low tar tobacco products which
        affect levels of addiction and cancer causing carcinogens.  On October 1,
        2015 New England Journal of Medicine published a landmark study on the company’s
        very low nicotine spectrum cigarettes.  In October 2014, Peizer and 22nd Century
        formed a JV to commercialize the company’s products in China with China National
        Tobacco Company, the largest tobacco company in the world and the largest
        monopoly in China.  China represents over 50% of the worldwide tobacco market.
    - id: BankUnited
      content: BankUnited, Inc., with total consolidated assets of $27.9 billion at
        December 31, 2016, is a bank holding company with one wholly owned subsidiary,
        BankUnited, collectively, the Company.  BankUnited, a national banking association
        headquartered in Miami Lakes, Florida, provides a full range of banking services
        to individual and corporate customers through 94 banking centers located in
        15 Florida counties and 6 banking centers in the New York metropolitan area.  The
        Bank also provides certain commercial lending and deposit products on a national
        platform.  The Company endeavors to provide, through experienced lending and
        relationship banking teams, personalized customer service and offers a full
        range of traditional banking products and services to both commercial and
        retail customers.
    - id: Bordan Tkachuk
      content: Bordan Tkachuk ( ) is a British business executive, the former CEO
