    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: '1866'
    aliases: []
    source_ids:
    - Lourenço Mutarelli
    - Crime and Punishment
    supporting_sentences:
    - title: Lourenço Mutarelli
      sentence: In addition to comic books, Mutarelli has also created plays, books,
        and all the illustration and animated sequences of the 2004 motion picture
        "Nina", which was based on the novel "Crime and Punishment" by Dostoyevsky.
    - title: Crime and Punishment
      sentence: ' It was first published in the literary journal "The Russian Messenger"
        in twelve monthly installments during 1866.'
    sources:
    - id: The Golden Hour (novel)
      content: The Golden Hour is a children's novel by Maiya Williams.  It was first
        published in 2004 and is the first of the Golden Hour time travel series.  It
        tells the story of Rowan Popplewell and his sister, Nina, who, while emotionally
        disturbed by the death of their mother, travel back in time to the French
        Revolution.
    - id: Crime and Punishment
      content: 'Crime and Punishment (Russian: Преступлéние и наказáние , "Prestupleniye
        i nakazaniye"; ] ) is a novel by the Russian author Fyodor Dostoyevsky.  It
        was first published in the literary journal "The Russian Messenger" in twelve
        monthly installments during 1866.  Later, it was published in a single volume.  It
        is the second of Dostoyevsky''s full-length novels following his return from
        5 years of exile in Siberia.  "Crime and Punishment" is considered the first
        great novel of his "mature" period of writing.'
    - id: Quando Eu Era Vivo
      content: 'Quando Eu Era Vivo (English: When I Was Alive ) is a 2014 Brazilian
        drama-thriller film directed by Marco Dutra, based on the novel "A Arte de
        Produzir Efeito Sem Causa" by Lourenço Mutarelli.'
    - id: Spirit of the Border
      content: Spirit of the Border is an historical novel written by Zane Grey, first
        published in 1906.  The novel is based on events occurring in the Ohio River
        Valley in the late eighteenth century.  It features the exploits of Lewis
        Wetzel, a historical personage who had dedicated his life to the destruction
        of Native Americans and to the protection of nascent white settlements in
        that region.  The story deals with the attempt by Moravian Church missionaries
        to Christianize Indians and how two brothers' lives take different paths upon
        their arrival on the border.  A highly romanticized account, the novel is
        the second in a trilogy, the first of which is "Betty Zane", Grey's first
        published work, and "The Last Trail", which focuses on the life of Jonathan
        Zane, Grey's ancestor.
    - id: Before We Say Goodbye
      content: Before We Say Goodbye, first published as Prima di Lasciarsi, is a
        2004 novel by Gabriella Ambrosio.  The work is based on the 2002 Kiryat HaYovel
        supermarket bombing and narrates the final hours in the lives of the suicide
        bomber and her victims.  It was first published in Italy in 2004 through Nutrimenti,
        and was later published in English on 2 August 2010 through Walker Books.  The
        novel has been published in multiple languages, including Arabic and Hebrew,
        and has been endorsed by Amnesty International.
    - id: 4 a.m. (novel)
      content: 4 a.m. is the debut novel of Scottish author Nina de la Mer.  It was
        first published in the UK on 26 August 2011 by Brighton-based publishing house
        Myriad Editions.  The novel draws on the author's personal experiences and
        research, covering rave culture of the 90s and peacetime life in the British
        Army.
