    - Monica Lewinsky
    supporting_sentences:
    - title: Their Lives
      sentence: 'Their Lives: The Women Targeted by the Clinton Machine is a book
        by Candice E. Jackson.'
    - title: Their Lives
      sentence: ' Published by conservative publisher World Ahead Publishing on May
        31, 2005, it recounts the stories of seven women who crossed paths with Bill
        Clinton: Monica Lewinsky, Paula Jones, Gennifer Flowers, Kathleen Willey,
        Elizabeth Gracen, Juanita Broaddrick, and Sally Perdue.'
    - title: Monica Lewinsky
      sentence: Monica Samille Lewinsky (born July 23, 1973) is an American activist,
        television personality, fashion designer, and former White House intern.
    sources:
    - id: Sheila Cavanagh
      content: 'Sheila Cavanagh is an associate professor of sociology and former
        chair of the Sexuality Studies Program at York University.  Cavanagh is currently
        chair of the Canadian Sexuality Studies Association and co-editor (along with
        Malena Gustavson) of the "Somatechnics" journal.  Her research is in the area
        of gender and sexuality with a concentration on queer, cultural, and psychoanalytic
        theories.  Cavanagh is editing a special issue on transgender and psychoanalysis
        in "Transgender Studies Quarterly" and completing her third book monograph
        titled "Transgender and the Other Sexual Difference: Bracha L. Ettinger and
        Jacques Lacan".  She co-edited a collection with Angela Failler and Rachel
        A. J. Hurst titled "Skin, Culture and Psychoanalysis" (2013) published by
        Palgrave Macmillan.  Her first sole-authored book titled "Sexing the Teacher:
        School Sex Scandals and Queer Pedagogies" (2007) was given honorable mention
        by the Canadian Women’s Studies Association.  Her second sole-authored book
        titled "Queering Bathrooms: Gender, Sexuality, and the Hygienic Imagination"
        (2010) is a GLBT Indie Book Award finalist and recipient of the CWSA/ACEF
        Outstanding Scholarship Prize Honourable Mention (2012).  Her performed ethnography
        titled Queer Bathroom Monologues (QBM) premiered at the Toronto Fringe Festival
        (2011) and was given the Audience Pick Award.  The play was professionally
        staged at Buddies in Bad Times Theatre, Toronto, in June 2014 for WorldPride
        and has toured at conferences, colleges and universities in Canada and the
        United States.  She has published in a wide range of international journals
        and given keynotes addresses at conferences in Sweden, Turkey and Canada.  Cavanagh
        teaches an undergraduate course titled Sociology of Gender and a range of
        graduate courses in sexuality studies, feminist theory and queer theory.  She
        is also interviewed in Rohan Spong''s documentaries "T is for Teacher" (2009)
        and "Queer Science" (2008).'
    - id: Gregory B. Craig
      content: Gregory Bestor "Greg" Craig (born March 4, 1945) is an American lawyer
        and former White House Counsel under President Barack Obama from 2009 to 2010.  A
        former attorney at the Washington, D.C. law firm of Williams & Connolly, Craig
        has represented numerous high-profile clients.  Prior to becoming White House
        Counsel, Craig served as assistant to the President and special counsel in
        the White House of President Bill Clinton, where he directed the team defending
        Clinton against impeachment.  Craig also served as a senior advisor to Senator
        Edward Kennedy and Secretary of State Madeleine Albright.
    - id: The White House Doctor
      content: 'The White House Doctor: My Patients Were Presidents – A Memoir is
        a book authored by Connie Mariano, the first military woman in the history
        of the United States to be appointed as Physician to the President, the first
        female director of the medical unit of the White House, and the first Filipino-American
        to become a rear admiral in the US Navy.  With a foreword from Bill Clinton,
        the autobiographical book takes a look at the personal lives of three American
        Presidents (George H.W. Bush, Bill Clinton, and George W. Bush) and three
        American First Ladies (Barbara Bush, Hillary Clinton, and Laura Bush) she
        had taken care of while working as a White House physician.  It was described
        as a "fascinating look into what goes on behind closed doors at 1600 Pennsylvania
        Avenue".'
    - id: Once Upon a Secret
      content: 'Once Upon a Secret: My Affair with President John F. Kennedy and Its
        Aftermath is a book by the former White House intern Mimi Alford in February
        2012.  It contains the autobiographical account of the woman who had an affair
        with U.S. President John F. Kennedy towards the end of his life (from June
        1962 to July 1963).  Despite its consuming influence over her life at the
        time, Alford managed to keep her involvement in the affair secret for nearly
        50 years, until basic details were published in the 2003 Kennedy biography
        "" by Robert Dallek.'
    - id: Their Lives
      content: 'Their Lives: The Women Targeted by the Clinton Machine is a book by
        Candice E. Jackson.  Published by conservative publisher World Ahead Publishing
        on May 31, 2005, it recounts the stories of seven women who crossed paths
        with Bill Clinton: Monica Lewinsky, Paula Jones, Gennifer Flowers, Kathleen
