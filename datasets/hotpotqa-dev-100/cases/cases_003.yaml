      [Anani ben Sason] Anani ben Sason (also called ''Anani, ''Inani, and ''Inyani)
      was a Jewish Talmudist who lived in the Land of Israel, known as an amora of
      the third century, a contemporary of R. Ammi.  He rarely discussed "Halakot",
      and his discussions of them were not original ("Shab. " 64b).  Once he recited
      a "Halakah" in the patriarch''s mansion, without naming its author, which provoked
      R. Ammi to ask: "Is it his own?  It is what R. Eleazar had reported in the name
      of R. Oshaiah" (M. Ḳ.  24b).  In the "Haggadah", he sometimes reported the sayings
      of others, but more often he was original.  Thus, as a reason for the juxtaposition
      of the regulations regarding the sacrificial rites and the priestly vestments
      ("Ex. " xxviii-xxix), he points out that the priestly vestments were to have
      atoning effects as well as the sacrifices.  He represents the miter as atoning
      for haughtiness, and cites R. Chanina as saying, "That which rests highest on
      the priest atones for one''s considering himself high"; and similarly with the
      rest of the priestly garments ("Zeb."  88b; " ''Ar."  16a; compare "Yer.  Yoma,"
      vii.  44b; "Lev.  R." x.).  Referring to God''s appearance in the thorn-bush
      ("Ex."  iii.  2-4) he remarks, "The Holy One—blessed be He! —said to Moses,
