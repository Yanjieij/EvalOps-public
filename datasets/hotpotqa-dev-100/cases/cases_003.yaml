    sources:
    - id: Scott's Run Nature Preserve
      content: Scott's Run Nature Preserve is a nature preserve in Fairfax County,
        Virginia, United States.  Located in McLean, it is bordered by Virginia State
        Route 193 to its south, Interstate 495 to its east and the Potomac River to
        its north.  It encompasses 336 acre of woodland with its namesake, Scott's
        Run, flowing through its west side.  Scott's Run originates in nearby Tysons
        Corner and enters the Potomac on the northwest side of the preserve.  The
        preserve is noted for including eastern hemlocks among its plant life, which
        are rare for the area.  It is a popular destination for recreation and hiking
        and is operated by the Fairfax County Park Authority.
    - id: Tysons Galleria
      content: Tysons Galleria is a three-level super-regional mall owned by General
        Growth Properties located at 2001 International Drive, McLean, Virginia, in
        Tysons Corner.  It is the second-largest mall in McLean/Tysons Corner, and
        one of the largest in the Washington metropolitan area.
    - id: Poughkeepsie Galleria
      content: The Poughkeepsie Galleria (locally known as "The Galleria") is an upscale
        shopping center on U.S. 9 in the Town of Poughkeepsie, New York, located just
        north of Wappingers Falls, and is the largest shopping center in Dutchess
        County.  The Galleria has an area of 1100000 sqft with two floors containing
        140 shops and 14 restaurants as well as a 16-screen, stadium-seating Regal
        Cinemas theater.
    - id: Tysons, Virginia
      content: Tysons, or formerly “Tysons Corner” is a census-designated place (CDP)
        and unincorporated community in Fairfax County, Virginia, United States.  Located
        in Northern Virginia between the community of McLean and the town of Vienna
        along the Capital Beltway (I-495), it lies within the Washington Metropolitan
        Area.  Tysons is home to two super-regional shopping malls—Tysons Corner Center
        and Tysons Galleria—and the corporate headquarters of numerous companies such
        as Intelsat, Gannett, Hilton Worldwide, Freddie Mac, Capital One and Booz
        Allen Hamilton.  Tysons is Fairfax County's central business district and
        a regional commercial center.  It has been characterized as a quintessential
        example of an edge city.  The population was 19,627 as of the 2010 census.
    - id: Tysons Corner Center
      content: Tysons Corner Center, located in the Tysons Corner unincorporated area
        in Fairfax County, Virginia, United States (between McLean and Vienna, Virginia),
        opened to the public in 1968, becoming one of the first fully enclosed, climate-controlled
        shopping malls in the Washington metropolitan area.
    - id: Cobb Galleria Centre
      content: 'The Cobb Galleria Centre is a meeting and convention center and a
