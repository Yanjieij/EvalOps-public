    - id: Coral Gardens and Their Magic
      content: 'Coral Gardens and Their Magic, properly Coral Gardens and Their Magic:
        A Study of the Methods of Tilling the Soil and of Agricultural Rites in the
        Trobriand Islands, is the final book in anthropologist Bronisław Malinowski''s
        ethnographic trilogy on the lives of the Trobriand Islanders.  It concentrates
        on the cultivation practices the Trobriand Islanders used to grow yams, taro,
        bananas and palms.  It describes the gardens in which the Trobrianders grew
        food as more than merely utilitarian spaces, even as works of art.  In 1988
        Alfred Gell called the book "still the best account of any primitive technological-cum-magical
        system, and unlikely ever to be superseded in this respect".  The book has
        been described as Malinowski''s "magnum opus".'
