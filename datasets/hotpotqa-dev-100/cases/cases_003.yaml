    - id: Participant observation
      content: Participant observation is one type of data collection method typically
        used in qualitative research.  It is a widely used methodology in many disciplines,
        particularly cultural anthropology and (European) ethnology, less so in sociology,
        communication studies, human geography and social psychology.  Its aim is
        to gain a close and intimate familiarity with a given group of individuals
        (such as a religious, occupational, sub cultural group, or a particular community)
        and their practices through an intensive involvement with people in their
        cultural environment, usually over an extended period of time.  The method
        originated in the field research of social anthropologists, especially Bronisław
        Malinowski and his students in Britain, the students of Franz Boas in the
        United States, and in the later urban research of the Chicago School of sociology.
    - id: Muted group theory
      content: 'Muted group theory (MGT) is developed by social anthropologists Edwin
        Ardener and Shirley Ardener in 1975.  The theory describes the relationship
        between a dominant group and its subordinate group(s): As the dominant group
        contributes mostly to the formulation of the language system, including the
        norms and vocabulary, members from the subordinate group have to learn and
        use the dominant-made language to express themselves.  However, this translation
        process may result in loss and distortion of information as the people from
        subordinate groups cannot articulate their ideas clearly.  The dominant may
        also ignore the voice of the lower-power.  All these may eventually lead to
        the mutedness of the subordinate group.  Although this theory is initially
        developed to study the different situations faced by women and men, it can
        also be applied to any marginalized group that is muted by the inadequacies
        of their languages.'
