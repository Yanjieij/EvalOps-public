    - id: Lev Kuleshov
      content: 'Lev Vladimirovich Kuleshov (Russian: Лев Влади́мирович Кулешо́в ;
        13 January [O.S. 1 January] 1899 – 29 March 1970) was a Russian and Soviet
        filmmaker and film theorist, one of the founders of the world''s first film
        school, the Moscow Film School.  He was given the title People''s Artist of
        the RSFSR in 1969.  He was intimately involved in development of the style
        of film making known as Soviet montage, especially it''s psychological underpinning,
        including the use of editing and the cut to emotionally influence the audience,
        a principle known as the Kuleshov effect.  He also developed the theory of
        creative geography, which is the use of the action around a cut to connect
        otherwise disparate settings into a cohesive narrative.'
