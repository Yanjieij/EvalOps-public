      sentence: ' It was recorded at the Flamingo Hotel in Las Vegas, Nevada.'
    - title: Flamingo Las Vegas
      sentence: Flamingo Las Vegas (formerly The Fabulous Flamingo and Flamingo Hilton
        Las Vegas) is a hotel and casino located on the Las Vegas Strip in Paradise,
        Nevada.
    sources:
    - id: The Original Jam Sessions 1969
      content: The Original Jam Sessions 1969 is a 2004 released album by Quincy Jones
        and Bill Cosby recorded as backing music for "The Bill Cosby Show" in 1969.
    - id: Flamingo Las Vegas
      content: Flamingo Las Vegas (formerly The Fabulous Flamingo and Flamingo Hilton
        Las Vegas) is a hotel and casino located on the Las Vegas Strip in Paradise,
        Nevada.  It is owned and operated by Caesars Entertainment Corporation.
    - id: Why Is There Air?
      content: Why Is There Air?  (1965) is Bill Cosby's third album.  It was recorded
        at the Flamingo Hotel in Las Vegas, Nevada.  It won the 1966 Grammy Award
        for Best Comedy Album.
    - id: Disco Bill
      content: Disco Bill (1977) is an album by Bill Cosby.  It is his fifth, and
        last, musical comedy/parody album.  As with "Bill Cosby Is Not Himself These
        Days", Cosby stated he improvised much of the material on the album; as its
        name implies, the album spoofs the disco craze of the late 1970s.
    - id: Hikky Burr
      content: theme song for "The Bill Cosby Show", and was also released as a well-known
        single in 1969.  It was written and performed by Quincy Jones and Bill Cosby.  It
        is known for its nonsense lyrics.  It is on the album "Smackwater Jack".  "Hikky
        Burr" was featured on the album "The Original Jam Sessions 1969", and on "The
        Best of Bill Cosby".
    - id: At Last Bill Cosby Really Sings
      content: At Last Bill Cosby Really Sings is an album by Bill Cosby.  It is his
        fifth music-based album and the only one released on the Stax Records-distributed
        Partee Records.  It features appearances from former Stevie Wonder band members
        like future R&B star Ray Parker, Jr. on guitar, and also features a second
        collaboration with his songwriting partner Stu Gardner, who plays organ on
        this set.
    - id: Inside the Mind of Bill Cosby
      content: Inside the Mind of Bill Cosby (1972) is the 14th album of stand up
        comedy by Bill Cosby.  It is the fifteenth such album he released, but only
        the fourth on Uni Records (when that label folded, the album was distributed
        by its parent company, MCA).  The album is available on compact disc, but
        to date the other Uni albums have not been so released.
    - id: Bill Cosby Is a Very Funny Fellow...Right!
      content: Bill Cosby is a Very Funny Fellow...Right!  is the debut album release
        by Bill Cosby.  It was recorded live at the nightclub The Bitter End in New
        York City's Greenwich Village during early 1963.  The album includes three
        sketches about Noah.
    - id: Bill's Best Friend
