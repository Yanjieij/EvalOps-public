  input:
    query: Which filmmaker was known for animation, Lev Yilmaz or Pamela B. Green?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: Levni Yilmaz
    aliases: []
    source_ids:
    - Lev Yilmaz
    - Pamela B. Green
    supporting_sentences:
    - title: Lev Yilmaz
      sentence: Levni Yilmaz (born 1973) is a San Francisco based independent film
        maker, artist and publisher, best known for his “Tales of Mere Existence”
        animated comic series.
    - title: Pamela B. Green
      sentence: Pamela B. Green is an American film producer and director known for
        her work in feature film titles and motion graphics.
    sources:
    - id: Aryanto Yuniawan
      content: Aryanto Yuniawan (born June 18, 1977 in Magelang; age 40) is Chief
        Executive Officer of PT Mataram Surya Visi Sinema, a multimedia and animation
        movie company located in Jogja Indonesia.  Ary (his nickname) is best known
        as a director of Battle of Surabaya, the first 2D animation movie in Indonesia
        which got some awards i.e. Gold Remi Award USA 2016, GrandPrize Winner of
        SICAF 2016 in South Korea, Winner of Nice International Filmmaker Festival
        2017 in France, Winner of Nioda International Film Festival in India and others.  He
        is also acclaimed as a writer, a producer, and currently working on several
        articles and books related to his job and hobby.  He started his career from
        directing and producing independent animation films including music videos.  He
        was trusted to be one of the juries of several film festivals such as Festival
        Film Indonesia (FFI 2016), Noida International Film Festival (NIFF 2016),
        and Seoul International Cartoon and Animation Festival (SICAF 2017).
    - id: Seasoned Veteran
      content: Seasoned Veteran is the third studio album by American rapper Richie
        Rich.  It was released November 5, 1996 on Def Jam Recordings, and to date
        is the only major label release for the artist.  The album was produced by
        Ali Malik, DJ Daryl, Doug Rasheed, Jermaine Dupri, Lev Berlak, Mike Mosley,
        Richie Rich and Rick Rock.  It peaked at number 11 on the "Billboard" Top
        R&B/Hip-Hop Albums and at number 35 on the "Billboard" 200.  Two of the singles
        released, "Let's Ride" and "Do G's Get To Go To Heaven? ", both appeared on
        multiple "Billboard" singles charts.  The album features guest performances
        by 2Pac, E-40, Luniz, D'wayne Wiggins, T-Boz, and Rame Royal of Rhythm & Green.
    - id: AES+F
      content: 'AES+F is an artist collective of four Russian artists: Tatiana Arzamasova
        (1955), Lev Evzovich (1958), Evgeny Svyatsky (1957), and Vladimir Fridkes
        (1956).  It was first formed as AES Group in 1987 by Arzamasova, Evzovich,
        and Svyatsky, becoming AES+F when Fridkes joined in 1995.  The collective
        works in photography, video, installation, and animation, as well as more
        traditional media, such as painting, drawing, and sculpture.  AES+F''s early
        work included performance, installation, painting, and illustration.  Well
        known for their monumental video-art installations that Gareth Harris describes
        as "monumental painting set in motion", AES+F create grand visual narratives
        that explore contemporary global values, vices and conflicts.'
    - id: Anani ben Sason
      content: 'Anani ben Sason (also called ''Anani, ''Inani, and ''Inyani) was a
        Jewish Talmudist who lived in the Land of Israel, known as an amora of the
        third century, a contemporary of R. Ammi.  He rarely discussed "Halakot",
        and his discussions of them were not original ("Shab. " 64b).  Once he recited
        a "Halakah" in the patriarch''s mansion, without naming its author, which
        provoked R. Ammi to ask: "Is it his own?  It is what R. Eleazar had reported
        in the name of R. Oshaiah" (M. Ḳ.  24b).  In the "Haggadah", he sometimes
        reported the sayings of others, but more often he was original.  Thus, as
        a reason for the juxtaposition of the regulations regarding the sacrificial
        rites and the priestly vestments ("Ex. " xxviii-xxix), he points out that
        the priestly vestments were to have atoning effects as well as the sacrifices.  He
        represents the miter as atoning for haughtiness, and cites R. Chanina as saying,
        "That which rests highest on the priest atones for one''s considering himself
        high"; and similarly with the rest of the priestly garments ("Zeb."  88b;
        " ''Ar."  16a; compare "Yer.  Yoma," vii.  44b; "Lev.  R." x.).  Referring
        to God''s appearance in the thorn-bush ("Ex."  iii.  2-4) he remarks, "The
        Holy One—blessed be He! —said to Moses, ''When I will it, one of my angels
        stretcheth forth his hand from heaven and reacheth to the ground,'' as the
