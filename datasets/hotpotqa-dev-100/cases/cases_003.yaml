      content: Linda Mvusi (c. 1955 in Bloemfontein- ) is an actress and architect.  Mvusi
        took an award for best actress at the 1988 Cannes Film Festival for her role
        in the film "A World Apart" which was directed by Chris Menges.  Mvusi was
        the first South African to get a best Actress award at Cannes.  Mvusi also
        shared in an award for excellence for her architecture on the Apartheid Museum.
    - id: Second Best (film)
      content: Second Best is a 1994 British film produced by Sarah Radclyffe and
        directed by Chris Menges.  It closely follows the 1991 novel of the same name
        by David Cook, who also wrote the screenplay.
    - id: 11 Harrowhouse
      content: 11 Harrowhouse is a 1974 British film directed by Aram Avakian.  It
        was adapted by Charles Grodin based upon the novel by Gerald A. Browne with
        the screenplay by Jeffrey Bloom.  It stars Charles Grodin, Candice Bergen,
        James Mason, Trevor Howard and John Gielgud.
    - id: End of the Road (1970 film)
      content: End of the Road is a 1970 film directed, co-written, and edited by
        Aram Avakian and adapted from a 1958 novel by John Barth, and stars Stacy
        Keach, James Earl Jones and Harris Yulin.
    - id: Chris Menges
      content: Chris Menges BSC, ASC (born 15 September 1940) is an English cinematographer
        and film director.  He is a member of both the American and British Societies
        of Cinematographers.
    - id: A World Apart (film)
