        new religious movement active mainly on the island of Tenerife and in Germany.  This
        sect was originally a splinter group of the Brahma Kumaris and is known for
        a police and media scare in which an alleged attempt to commit ritual suicide
        took place in Teide National Park in Tenerife.  The group believed in the
        end of the world but according to the religious studies scholar Georg Schmid
        and the sociologist Massimo Introvigne had no intention of collective suicide.'
    - id: Alpine National Park
