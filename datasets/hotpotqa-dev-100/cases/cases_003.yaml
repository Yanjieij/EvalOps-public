      content: The Film Independent Spirit Awards (abbreviated "Spirit Awards" and
        originally known as the FINDIE or Friends of Independents Awards), founded
        in 1984, are awards dedicated to independent filmmakers.  Winners were typically
        presented with acrylic glass pyramids containing suspended shoestrings representing
        the paltry budgets of independent films.  Since 2006, winners have received
        a trophy depicting a bird with its wings spread sitting atop of a pole with
        the shoestrings from the previous design wrapped around the pole.
    - id: Independent Spirit Award for Best Cinematography
      content: The Independent Spirit Award for Best Cinematography is one of the
        annual awards given by Independent Spirit Awards, a non-profit organization
        dedicated to independent film and independent filmmakers.
    - id: Silent Light
      content: 'Silent Light (Plautdietsch: "Stellet Licht"; Spanish: "Luz silenciosa"
        ) is a 2007 film written and directed by Carlos Reygadas.  Filmed in a Mennonite
        colony close to Cuauhtémoc, Chihuahua State, Northern Mexico, "Silent Light"
        tells the story of a Mennonite married man who falls in love with another
        woman, threatening his place in the conservative community.  The dialogue
        is in Plautdietsch, the Low German dialect of the Mennonites.  The film was
        selected as the Mexican entry for the Best Foreign Language Oscar at the 80th
        Academy Awards, but it did not make the shortlist.  The film was nominated
        for Best Foreign Film at the 24th Independent Spirit Awards.  It gained nine
        nominations, including all major categories, in the Ariel Awards, the Mexican
        national awards.'
    - id: 32nd Independent Spirit Awards
