      People''s Republic of China.


      [Alvaro Mexia] Alvaro Mexia was a 17th-century Spanish explorer and cartographer
      of the east coast of Florida.  Mexia was stationed in St Augustine and was given
      a diplomatic mission to the native populations living south of St. Augustine
      and in the Cape Canaveral area.  This mission resulted in a "Period of Friendship"
      between the Spanish and the Ais native population.


      [Embassy of the United States, Nairobi] The Embassy of the United States of
      America to Kenya (also known as Embassy Nairobi by the State Department), located
      in Nairobi, is home to the diplomatic mission of the United States to the Republic
      of Kenya.  The embassy opened in central Nairobi in 1964, when the United States
      established diplomatic relations with Kenya.  In 1998, the original embassy
      was the target of a terrorist attack, after which a new embassy building was
      constructed in Gigiri, a suburb of Nairobi, in 2003.  The US diplomatic mission
      to Somalia is also based at the Nairobi embassy.


      [List of diplomatic missions of Azerbaijan] Although Azerbaijan initiated diplomatic
      relations with Western and other countries since the Safavids dynasty in XVI
      century, the first diplomatic body - the Ministry of Foreign Affairs was established
      in 1918 when Azerbaijan was formed as a republic for the first time and Mehmet
      Hasan Hacınkski became the first minister.  The parliament sent the diplomatic
      delegation to the Ottoman State after signing the first international document
      - the Pact of Peace and Friendship - with this state and on this agreement,
      the Ottoman State became the first country recognizing independence of the ADR.  The
      next step, the "Friendship and Peace" treaty with Iran was signed on 20 March
      1919.  And the diplomatic mission of Azerbaijan had started to work as a consulate
      in Tehran and other cities.  However, this successful revival continued until
      the Russian army entered Baku on April 28, 1920.  The diplomatic delegation
      of the Republic attended the Paris Peace Conference, 1919.  As a result of the
      national democratic movement that started in Azerbaijan in 1988-1990, the country
      restored its independence on 5 February, 1991.  Afterwards, Azerbaijan started
      to create bilateral relations with other countries.  In this regard, the diplomatic
      missions have been established in foreign countries.  Today Azerbaijan has embassies
      and consulates in more than 70 countries.  Recent diplomatic missions started
      to operate in Brasil, Australia and Vietnam.


      [Head of mission] In diplomatic usage, head of mission (HOM) or chief of mission
      (COM) from the French "chef de mission diplomatique" (CMD) is the head of a
      diplomatic representation, such as an ambassador, high commissioner, nuncio,
      chargé d''affaires, permanent representative, and to a consul-general or consul.  Depending
      on the context, it may also refer to the heads of certain international organizations''
      representative offices.  Certain other titles or usages that would qualify as
      a head of mission or equivalent also exist.  While they are primarily referred
      to by the other titles mentioned above, it is common for the diplomatic corps
      of several countries to use deputy head of mission or deputy chief of mission
      (DCM) as the primary title for the second in command of a diplomatic mission.


      [United States Mission to the European Union] The United States Mission to the
      European Union (USEU) is the diplomatic mission of the United States to the
      European Union; it is based in Brussels, Belgium.  The US has maintained diplomatic
      relations with the EU and its predecessors since 1953.  The first predecessor
      of the current mission was the US diplomatic mission to the European Coal and
      Steel Community in Luxembourg, which opened in 1956.  In 1961, the US Mission
      to the European Communities was established in Brussels, which later became
      the United States Mission to the European Union, upon the latter''s establishment
      in 1993.


      [Indigenous peoples of Florida] The Indigenous peoples of Florida lived in what
      is now known as Florida for more than 12,000 years before the time of first
      contact with Europeans.  However, the indigenous Floridians had largely died
      out by the early 18th century.  Some Apalachees migrated to Louisiana, where
      their descendants now live, some were taken to Cuba and Mexico by the Spanish
      in the 18th century, and a few may have been absorbed into the Seminole and
      Miccosukee tribes.'
