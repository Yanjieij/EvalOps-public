    - id: Aleksandar Bošković
      content: Aleksandar Bošković is a social anthropologist from former Yugoslavia,
        who published twelve books and several hundred articles and book reviews on
        history and theory of anthropology, from a transactionalist and comparative
        perspective.  He is Professor in the Department of Ethnology and Anthropology
        (University of Belgrade Faculty of Philosophy), and Professor of Anthropology
        at the University of Donja Gorica in Montenegro.  Since 2 February 2017, Bošković
        also heads the Department of Anthropological Research (within the Center for
        Sociological and Anthropological Studies) at the Institute of Social Sciences
        in Belgrade, where he is Director of Research, and former (19 May 2009- 1
        February 2017) Head of the Center for Political Studies and Public Opinion
        Research.  Aleksandar Bošković previously taught at the Universities of St
        Andrews (1994), Belgrade (then Yugoslavia, 1998), Brasília (Brazil, 1999-2001),
        University of the Witwatersrand (Johannesburg, South Africa, 2001-2003), and
        Rhodes University (Grahamstown, South Africa, 2003-2006).  Between 2000 and
        2014, Aleksandar Bošković was teaching in the Post-graduate Program in Anthropology
        of the Faculty of Social Sciences (FDV), University of Ljubljana (Slovenia).  Just
        before the 2016 conference of the European Association of Social Anthropologists,
        held at the University of Milano-Bicocca, he was selected as the EASA Book
        Series Editor.  Together with Han Vermeulen, he is co-convenor of the recently
