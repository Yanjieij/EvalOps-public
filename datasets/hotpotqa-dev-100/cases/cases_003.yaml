        understanding, rather than a legally enforceable deal, but it is nevertheless
        treated with great seriousness within the services".  It was coined in , and
        has now entered political discourse as a way of measuring whether the government
        and society at large have kept to their obligations to support members of
        the armed forces.
    - id: Armed Forces Day (Poland)
      content: 'Armed Forces Day, known also as the Feast of the Polish Armed Forces
        (Polish: "Święto Wojska Polskiego" ), is a national holiday celebrated annually
        on 15 August in Poland, commemorating the anniversary of the 1920 victory
        over Soviet Russia at the Battle of Warsaw during the Polish–Soviet War.  Armed
        Forces Day is held in conjunction with the Day of the Assumption of the Virgin
        Mary, itself a separate public holiday.  The event is marked by military parades,
        equipment reviews, showcases and remembrances by all branches of the Polish
        Armed Forces across the country.  One of the most prominent events of the
