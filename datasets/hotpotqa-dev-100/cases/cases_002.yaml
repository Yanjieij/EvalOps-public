      content: Safe Harbor is an American television drama series that aired on The
        WB Television Network from September 20, 1999 to November 28, 1999.  The series
        was created and executive produced by Brenda Hampton, who at the time was
        best known for work on the fellow WB series "7th Heaven", the series was paired
        with "7th Heaven" on the network's Monday night lineup.  Despite "7th Heaven"
        being the No. 1 show on The WB during the 1999-2000 season, "Safe Harbor"
        was unable to hold a solid audience after "7th Heaven" and was canceled after
        ten episodes and one season with the show moving to Sunday nights where the
        last two episodes aired.
    - id: Power of Three (Charmed)
      content: The Power of Three, on The WB series "Charmed", refers to any bond
        formed by three magical beings good or evil.  It is most commonly used to
        describe the bond between the Warren/Halliwell line, more specifically the
        Charmed Ones, which is said to be the most powerful magical force in history.  The
        "Power of Three" originally included the Halliwell sisters Prue (Shannen Doherty),
        Piper (Holly Marie Combs) and Phoebe (Alyssa Milano).  However, following
        Prue's death in the third season finale, their long-lost younger half sister
        Paige Matthews (Rose McGowan) takes her place within the "Power of Three"
        from season four onwards.
    - id: Kay Tagal Kang Hinintay
      content: 'Kay Tagal Kang Hinintay (Tagalog: "So Long Have I Waited For You")
        is a Filipino soap opera, produced by ABS-CBN and Star Cinema.  It started
        July 8, 2002 and ended November 14, 2003.  The critically acclaimed and top-rating
        teleserye won the CMMA Best Drama Series and the PMPC Star Awards Best Primetime
        Drama Series.  It is the first local soap opera that became a finalist to
        the Best Drama Series category of the International Emmy Awards.  It was also
        part of the top five drama series of the Asian TV Awards.'
