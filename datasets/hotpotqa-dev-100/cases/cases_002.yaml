    sources:
    - id: Christus Apollo
      content: 'Christus Apollo: Cantata Celebrating the Eighth Day of Creation and
        the Promise of the Ninth is a cantata in four movements for narrator, mezzo-soprano,
        choir, and orchestra, based on a text by the science fiction author Ray Bradbury
        and composed by the American composer Jerry Goldsmith.  The piece was commissioned
        by the California Chamber Symphony in 1969, and premiered later that year
        in Royce Hall at UCLA with the narration performed by Charlton Heston (who
        had starred in the 1968 film, "Planet of the Apes", for which Goldsmith had
        composed the musical score).'
    - id: Alien (soundtrack)
      content: The iconic, avant-garde score to the film "Alien" was composed by Jerry
        Goldsmith and is considered by some to be one of his best, most visceral scores.  Rather
        than focusing on themes, Goldsmith creates a bleak and dissonant soundscape
        that fits the film's dark and intense atmosphere, with only a few "romantic"
        cues.
    - id: L.A. Confidential (soundtrack)
      content: L.A. Confidential is either the original soundtrack, on the Restless
        Records label featuring mainly songs and source music, or the original film
        score, on Varèse Sarabande Records, of the 1997 Academy Award- and Golden
        Globe Award-winning film "L.A. Confidential" starring Kevin Spacey, Russell
        Crowe, Guy Pearce, James Cromwell, Danny DeVito, and Kim Basinger (who won
        the Academy Award for Best Supporting Actress for this film).  The original
        score was composed by Jerry Goldsmith.
    - id: Innerspace
      content: Innerspace is a 1987 American science fiction comedy film directed
        by Joe Dante and produced by Michael Finnell.  Steven Spielberg served as
        executive producer.  The film was inspired by the 1966 science fiction film
        "Fantastic Voyage".  It stars Dennis Quaid, Martin Short and Meg Ryan, with
        Robert Picardo and Kevin McCarthy, with music composed by Jerry Goldsmith.  It
        earned well over $25 million in its domestic gross revenue and won an Oscar,
        the only film directed by Dante to do so.
    - id: Aliens (soundtrack)
      content: The score to the 1986 James Cameron film "Aliens" was composed by James
        Horner.  The score itself includes musical references to Gayane's Adagio from
        Aram Khachaturian's "Gayane" ballet suite, which had been used in Stanley
        Kubrick's "" (1968).  The score also uses musical motifs, sound treatments
        and excerpts from Jerry Goldsmith's original soundtrack to "Alien" (1979).  Additional
        cues taken from Jerry Goldsmith's "Alien" score were used in the climax of
        the film when Horner was unable to finish some cues to Cameron's satisfaction.  The
        film's editors also reportedly altered the score's chronological flow, sometimes
        looping, truncating or removing the music and placing it in fragmented form
        in the film out of context.  Despite production issues, it was nominated for
        an Academy Award in 1986.  It was performed by the London Symphony Orchestra.  The
        soundtrack album was released the following year, in 1987.
