        in a second-place finish in the AFC Central Division.  The Oilers appeared
        once on Monday Night Football and appeared in the playoffs for the third consecutive
        year.  It would be Jerry Glanville’s final year as the Oilers coach.  Perhaps
        one of the lowest points of the season for the Oilers was their second to
        last game against division rival Bengals.  The Bengals thumped the Oilers
        61-7 in that game.  This loss marked the worst defeat for the team during
