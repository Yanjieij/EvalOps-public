      [Jounen Kwéyòl] Jounen Kwéyòl (Creole Day) is celebrated in Saint Lucia on the
      last Sunday of October across the entire island, and has been held annually
      since 1984.  On the Sunday of this week, the various towns chosen to host this
      festival put out the result of their grand preparations; local dishes and foods
      such as roast breadfruit, Green Fig and Salt Fish (The National Dish of Saint
      Lucia), plantain, king fish, Manicou (opossum), Souse (a soup made with pork
      and often cucumber), fried bake and floats, Accra (a fried dough which contains
      salt fish), Paime (otherwise known as Conkies) and a famous dish known as Bouillon
      (fish, chicken or meat stewed with dasheen, yams, plantains, banana and dumplings)
      Also local drinks such as Cocoa Tea, Golden Apple Juice, Guava Juice and more.  Apart
      from the food part, the event is collaborated with kweyol music some of which
      have been past down to and from many generations.  The most widely used instrument
      besides vocals are the Tambos (drums) and are beaten throughout as people speak
      in the creole language and have a merry time.  Most people commemorate this
      day by wearing the island''s National Wear such as the Wob Dwiete.  Persons
      who do not want to wear the extreme layers of skirts and dresses make clothing
      out of special plaid material called Madras which is one of the cloths used
      in the national wear.  Among the places which celebrate it every year are Mon
      Repos and Dennery.


      [The Eighth (United States)] The Eighth was a federal holiday in the United
      States from 1828 until 1861.  It honored the Battle of New Orleans, which took
      place on January 8, 1815, with Tennessee''s Andrew Jackson leading a successful
      battle against regular British soldiers and freed slaves.  The holiday was celebrated
      widely across the US South after this final battle in the War of 1812.  "The
      Eighth" became an official national holiday in 1828, following Jackson''s election
      as President.  The Eighth continued as an official national holiday from 1828
      until the advent of the American Civil War.


      [Saint-Jean-Baptiste Day] Saint-Jean-Baptiste Day (French: "Fête de la Saint-Jean-Baptiste"
      ), officially known in Quebec as the National Holiday, (French: "la fête nationale"
      ) is a holiday celebrated annually on June 24, the feast day of the Nativity
      of St. John the Baptist.  In Quebec, it is a public holiday with festivities
      occurring on June 23 and 24 which are publicly financed and organized by a "Comité
      organisateur de la fête nationale" (National Holiday Organizing Committee).  June
      24 is also celebrated as a festival of French Canadian culture in other Canadian
      provinces and the United States.


      [Oranjegekte] Oranjegekte (Orange craze) or Oranjekoorts (Orange fever) is a
      phenomenon in the Netherlands that occurs during major sporting events, especially
      international football championships, and during Koningsdag, an annual holiday
      celebrating the king''s birthday.  It manifests itself in the wearing of orange
      clothing such as T-shirts, caps and scarfs; lavish attention for sports and
      sports fans in the media; and the decoration of cars, rooms, houses, shops,
      and even entire streets in orange, the traditional color of the Dutch royal
      family, the House of Orange-Nassau.


      [White Sunday] White Sunday is a national holiday in Samoa falling on the second
      Sunday of October, with the Monday following a public holiday.  It is a day
      for parents and communities to acknowledge and celebrate childhood by hosting
      special programs during church services which include scriptural recitations.  Biblical
      story reenactments, and creative dance performances.  Children receive gifts
      (often new clothing and/or school supplies) on White Sunday and are allowed
      privileges normally reserved for elders, such as being the first to be served
      food at family meal time.


      [Christmas in the Basque Country] Christmas in the Basque Country starts with
      the of Santo Tomas on 21 December, a celebration in which most people go out
      onto the streets to dance and eat talo with txistorra (a type of Basque chorizo).  They
      wear a traditional outfit called the casera dress.  For girls it consists of
      a long skirt and a long-sleeved old-fashioned shirt with headscarves and aprons.  The
      boys wear a long black shirt, trousers and txapela (traditional black beret).  The
      casera outfits are normally dark blue, but can come in many colors.  They wear
      caseras because that is what the people of the mountain wear and the holiday
      used to celebrate the peasants who sold their goods in town and came on Santo
      Tomas to pay rent to landlords in the city.'
