    sources:
    - id: Can't Touch It
      content: '"Can''t Touch It" is a song by Australian singer and songwriter Ricki-Lee
        Coulter.  It was written by Coulter with Brian Kierulf and Joshua M. Schwartz
        of KNS Productions, who also produced the song.  "Can''t Touch It" was released
        as the lead single from Coulter''s second studio album "Brand New Day" on
        4 August 2007.  Upon its release, "Can''t Touch It" peaked at number two on
        the ARIA Singles Chart and number one on the ARIA Dance Singles Chart, where
        it remained for eight consecutive weeks.  It was certified platinum by the
        Australian Recording Industry Association for shipments of 70,000 copies.'
    - id: Stay (Shakespears Sister song)
      content: '"Stay" is a song by UK based pop act Shakespears Sister, released
        by London Records in January 1992 as the second single from their album "Hormonally
        Yours".  Upon release, the single became a global smash hit becoming the duo''s
        first and only No. 1 single in numerous territories, including the UK, where
        it topped the UK Singles Chart for eight consecutive weeks; the longest UK
        No. 1 reign for any all-female band, and was the fourth biggest selling single
        of 1992.  The single also held the No. 1 position in band member Siobhan Fahey''s
        birthplace, Ireland, for six weeks, and it was a transatlantic hit reaching
        No. 4 on the "Billboard" Hot 100 in the US.'
    - id: U Know What's Up
      content: '"U Know What''s Up" is a 1999 hit song by singer-songwriter-producer
        Donell Jones'' second studio album, "Where I Wanna Be".  The song features
        Lisa Lopes of TLC.  It reached number one on the Billboard Hot R&B/Hip-Hop
        Singles & Tracks chart on November 13, 1999, and stayed at number one for
        eight consecutive weeks.  It peaked at number seven on the Billboard Hot 100,
        remaining there for two consecutive weeks.  Outside the United States, the
        song peaked within the top ten of the charts in the United Kingdom.  The song
        was produced by Edward "Eddie F" Ferrell and Darren Lighty for Untouchables
        Entertainment.  It is Jones''s biggest hit to date.  The song was co-written
        by Anthony Hamilton.  The songs serves as the opening track on LaFace Records.'
    - id: Billy Ray Cyrus discography
      content: Billy Ray Cyrus is an American country music singer, songwriter, actor
        and philanthropist, who helped make country music a worldwide phenomenon.  He
        has released 12 studio albums and 44 singles since 1992, and is best known
        for his number one single "Achy Breaky Heart", which became the first single
        ever to achieve triple Platinum status in Australia and was the best-selling
        single of 1992 in the same country.  Thanks to the video of the song, the
        linedance entered the mainstream, becoming a worldwide craze.  Cyrus, a multi-platinum
        selling recording artist, has scored a total of eight top-ten singles on the
        Billboard Country Songs chart.  His most successful album to date is the debut
        of "Some Gave All", which has been certified 9× multi-platinum in the United
        States and is the longest time spent by a debut artist at number one on the
        "Billboard" 200 (17 consecutive weeks) and most consecutive chart-topping
        weeks in the SoundScan era.  It is the only album (from any genre) in the
        SoundScan era to log 17 consecutive weeks at number one and is also the second-highest
        selling debut album by a male country artist after Garth Brooks'.  It ranked
        43 weeks in the top 10, a total topped by only one country album in history,
        "Ropin' the Wind" by Garth Brooks.  "Some Gave All" was also the first debut
        album to enter at the number 1 in the Billboard Country Albums.  The album
        has also sold more than 20 million copies worldwide and is the best-selling
        debut album of all time for a solo male artist. " Some Gave All" was also
        the best-selling album of 1992 in the US with 4,832,000 copies.  In his career,
        he has released 35 charted singles, of which 16 have charted in the top 40.
    - id: I Don't Wanna Know
      content: '"I Don''t Wanna Know" is a song by American R&B artist Mario Winans,
        featuring a rap by P. Diddy, re-recorded background vocals by Enya and sampling
        the synthesizer riff from Enya''s song "Boadicea".  It reached number 1 in
        the United Kingdom and in Netherlands, and number 2 in the United States,
        stuck for eight consecutive weeks behind the Usher singles "Yeah" and "Burn",
        respectively.  It remains Winans'' only major success to date.  As a result
        of its eight weeks at number 2, "I Don''t Wanna Know" stands in joint fifth
        place for the most weeks at number 2 by a song which did not go to number
        1, behind Foreigner''s "Waiting for a Girl Like You", Missy Elliott''s "Work
        It", Donna Lewis''s "I Love You Always Forever" and Shania Twain''s "You''re
        Still the One".'
    - id: No One (Alicia Keys song)
      content: '"No One" is a song by American singer and songwriter Alicia Keys from
        her third studio album, "As I Am" (2007).  It was written and produced by
        Keys, Kerry Brothers Jr., and George M. Harry, and released as the album''s
        lead single on September 11, 2007.  The song topped the "Billboard" Hot 100
        for five consecutive weeks and the Hot R&B/Hip-Hop Songs chart for 10 consecutive
        weeks, while charting inside the top 10 in most major markets.'
    - id: Feel Good Inc.
      content: '"Feel Good Inc" is a song by British virtual band Gorillaz, featuring
        De La Soul.  The song was released as the lead single from the band''s second
        studio album "Demon Days" on 9 May 2005.  The single peaked at No. 2 in the
        United Kingdom and No. 14 in the United States.  It also topped the Hot Modern
        Rock Tracks chart in the U.S. for eight consecutive weeks, a first for the
        band.  This is the only song in Damon Albarn''s career to reach the top 40
        on the "Billboard" Hot 100.  It peaked in the top 10 in 17 countries, reaching
        No. 1 in Spain.  The song was listed in Pitchfork Media and Rolling Stone''s
        Best Songs of the 2000s.  The song won Best Pop Collaboration at the 2006
        Grammy Awards.  This song has surpassed "Clint Eastwood" to be Gorillaz''s
        most successful single worldwide.  Popdose ranked it 26th on their list of
        100 best songs of the decade.'
    - id: My Fair Lady (Broadway cast recording)
      content: The Broadway cast recording of the musical My Fair Lady was released
        as an album on April 2, 1956.  The songs were composed by Frederick Loewe
        with lyrics by Alan Jay Lerner and conducted by Franz Allers, while the cast
        included stars Julie Andrews and Rex Harrison.  The album became a massive
        seller, topping the charts on the US "Billboard" 200 for fifteen weeks at
        different times in 1956 (eight consecutive weeks), 1957, 1958 and 1959.  In
        the UK, upon its release in 1958, the album reached No.1 for 19 consecutive
        weeks and became the biggest-selling album of the year.  The album was released
        on Columbia Records, whose President, Goddard Lieberson provided the $375,000
        needed to stage the show in return for the rights to the Cast recording.  The
        album was later re-issued on Compact disc in 1988 and has been re-released
        a number of times since.  It is currently available with bonus tracks.
    - id: Yeah! (Usher song)
      content: '"Yeah!"  is a song by American singer Usher.  He co-wrote the song
        with Sean Garrett, Patrick J. Que Smith, Robert McDowell, LRoc, Ludacris,
        Da''Ron, and Lil Jon.  It also features guest vocals from Lil Jon and Ludacris,
        with the former also producing the song as well as incorporating crunk and
        R&B—which he coined as crunk&B—in the song''s production.  The song was released
        as the lead single from Usher''s fourth studio album "Confessions" (2004)
        on January 27, 2004, after Usher was told by Arista Records, his label at
        the time, to record more tracks for the album.'
    - id: Stay (Sugarland song)
      content: '"Stay" is a song recorded by American country music duo Sugarland.  It
        was released in September 2007 as the fourth and final single from their album
        "Enjoy the Ride" (see 2006 in country music).  Overall, the song is the group''s
        eighth single to enter the "Billboard" Hot Country Songs charts, where it
        reached a peak position of #2 for four weeks, stuck behind Taylor Swift''s
        "Our Song", and has become their signature song.  The music video for "Stay"
        was ranked #10 on CMT''s 100 Greatest Videos.'
