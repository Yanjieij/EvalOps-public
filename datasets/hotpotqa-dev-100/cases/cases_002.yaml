  input:
    query: Who was born earlier, Emma Bull or Virginia Woolf?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: Adeline Virginia Woolf
    aliases: []
    source_ids:
    - Emma Bull
    - Virginia Woolf
    supporting_sentences:
    - title: Emma Bull
      sentence: Emma Bull (born December 13, 1954) is an American science fiction
        and fantasy author.
    - title: Virginia Woolf
      sentence: Adeline Virginia Woolf (née Stephen; 25 January 1882 – 28 March 1941)
        was an English writer who is considered one of the foremost modernists of
        the twentieth century, and a pioneer in the use of stream of consciousness
        as a narrative device.
    sources:
    - id: The Mark on the Wall
      content: '"The Mark on the Wall" is the first published story by Virginia Woolf.  It
        was published in 1917 as part of the first collection of short stories written
        by Virginia Woolf and her husband, Leonard Woolf, called "Two Stories".  It
        was later published in New York in 1921 as part of another collection entitled
        "Monday or Tuesday".'
    - id: Emma Bull
      content: Emma Bull (born December 13, 1954) is an American science fiction and
        fantasy author.  Her novels include the Hugo- and Nebula-nominated "Bone Dance"
        and the urban fantasy "War for the Oaks".  She is also known for a series
        of anthologies set in Liavek, a shared universe that she created with her
        husband Will Shetterly.  As a singer, songwriter, and guitarist, she has been
        a member of the Minneapolis-based folk/rock bands Cats Laughing and The Flash
        Girls.
    - id: Virginia Woolf
      content: Adeline Virginia Woolf (née Stephen; 25 January 1882 – 28 March 1941)
        was an English writer who is considered one of the foremost modernists of
        the twentieth century, and a pioneer in the use of stream of consciousness
        as a narrative device.  Born in an affluent household in Kensington, London,
        she attended the King's College London and was acquainted with the early reformers
        of women's higher education.
    - id: 'Orlando: A Biography'
      content: 'Orlando: A Biography is a novel by Virginia Woolf, first published
        on 11 October 1928.  A high-spirited romp inspired by the tumultuous family
        history of Woolf''s lover and close friend, the aristocratic poet and novelist
        Vita Sackville-West, it is arguably one of Woolf''s most popular novels: a
        history of English literature in satiric form.  The book describes the adventures
        of a poet who changes sex from man to woman and lives for centuries, meeting
        the key figures of English literary history.  Considered a feminist classic,
        the book has been written about extensively by scholars of women''s writing
        and gender and transgender studies.'
    - id: Me! I'm Afraid of Virginia Woolf
      content: Me!  I'm Afraid of Virginia Woolf is a 1978 television play by Alan
        Bennett, produced by London Weekend Television and directed by Stephen Frears.  The
        title of the play is a parody of "Who's Afraid of Virginia Woolf? ", which
        in turn plays on the title of the Disney song "Who's Afraid of the Big Bad
        Wolf? ".
    - id: Jane de Gay
      content: Rev Dr "Jane de Gay" is a British academic and lecturer who has earned
        a reputation as an expert on the life and works of Virginia Woolf.  Dr de
        Gay's works on Woolf include a series of articles and a 2006 book, "Virginia
        Woolf's Novels and the Literary Past", published by Edinburgh University Press.  Her
        work has been recognised by the Virginia Woolf Society of Great Britain.  She
        has co-edited four books on gender and theatre, including "Languages of Theatre
        Shaped by Women" (with Lizbeth Goodman).
    - id: Freshwater (opera)
      content: Freshwater is a two-act chamber opera composed by Andy Vores, based
        on the 1929 comic play by Virginia Woolf.  Vores received assistance in creating
        the opera from Quentin Bell, Woolf's nephew and executor, who provided a rarely
        seen earlier version of the text that served as the inspiration for several
        passages of the libretto.
    - id: The Duchess and the Jeweller
      content: '"The Duchess and the Jeweller" (1938) is a short story by Virginia
        Woolf.  Woolf, being an advocate of addressing the "stream of consciousness,"
        shows the thoughts and actions of a greedy jeweller; Woolf makes a thematic
        point that corrupt people do corrupt actions for purely selfish motives (and
        often without regret).  It was first published in British "Harper''s Bazaar"
        Magazine in April 1938 and subsequently published posthumously in 1944 in
        the collection "A Haunted House and Other Short Stories.'
    - id: Moments of Being
      content: Moments of Being is a collection of posthumously-published autobiographical
        essays by Virginia Woolf.  The collection was first found in the papers of
        her husband, used by Quentin Bell in his biography of Virginia Woolf, published
        in 1972.  In 1976, the essays were edited for publication by Jeanne Schulkind.  The
        second edition was published in 1985.  The original texts are now housed at
        Sussex University and in the British Library in London.
    - id: Jane Marcus
      content: Jane Marcus (1938–2015) was a pioneering feminist literary scholar,
        specializing in women writers of the Modernist era, but especially in the
        social and political context of their writings.  Focusing on Virginia Woolf,
        Rebecca West, and Nancy Cunard, among many others, she devised groundbreaking
        analyses of Woolf's writings, upending a generation of criticism that ignored
        feminist, pacifist, and socialist themes in much of Woolf's work and critique
        of imperialism and bourgeois society.  Marcus's understanding of Woolf's place
        within the larger context of English literature has become prevailing wisdom
        today in the fields affected by her theorization and research, despite the
        controversial nature of her positions when they were originally formulated
        and how much opposition she garnered from earlier scholars and critics.
