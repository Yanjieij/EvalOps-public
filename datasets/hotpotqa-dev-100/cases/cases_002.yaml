      content: 'Fokienia is a genus of conifer tree belonging to the cypress family.  In
        its characteristics, "Fokienia" is intermediate between the genera of "Chamaecyparis"
        and "Calocedrus".  Genetically "Fokienia" is much closer to "Chamaecyparis",
        and not all researchers recognize "Fokienia" as a separate genus.  The genus
        comprises only one living species, Fokienia hodginsii or Fujian cypress (;
        Vietnamese: "Pơmu" ), and one fossil species ("Fokienia ravenscragensis").'
    - id: Frenchman Formation
      content: The Frenchman Formation is stratigraphic unit of Late Cretaceous (late
        Maastrichtian) age in the Western Canada Sedimentary Basin.  It is present
        in southern Saskatchewan and the Cypress Hills of southeastern Alberta.  The
        formation was defined by G.M. Furnival in 1942 from observations of outcrops
        along the Frenchman River, between Ravenscrag and Highway 37.  It contains
        the youngest of dinosaur genera, much like the Hell Creek Formation in the
        United States.
    - id: Ajuga
      content: Ajuga , also known as bugleweed, ground pine, carpet bugle, or just
        bugle, is a genus of 40 species annual and perennial herbaceous flowering
        plantsin the mint family Lamiaceae, with most species native to Europe, Asia,
        and Africa, but also two species in southeastern Australia.  They grow to
        5–50 cm tall, with opposite leaves.
    - id: Cupressus
      content: The genus Cupressus is one of several genera within the family Cupressaceae
        that have the common name cypress; for the others, see cypress.  It is considered
        a polyphyletic group.  Based on genetic and morphological analysis, the "Cupressus"
        genus is found in the Cupressoideae subfamily.  The common name comes from
        Old French "cipres" and that from Latin "cyparissus", which is the latinisation
        of the Greek κυπάρισσος ("kypárissos").
    - id: Cedrol
      content: Cedrol is a sesquiterpene alcohol found in the essential oil of conifers
        (cedar oil), especially in the genera "Cupressus" (cypress) and "Juniperus"
        (juniper).  It has also been identified in "Origanum onites", a plant related
        to oregano.  Its main uses are in the chemistry of aroma compounds.  It makes
        up about 19% of cedarwood oil Texas and 15.8% of cedarwood oil Virginia.
    - id: Libocedrus
      content: 'Libocedrus is a genus of five species of coniferous trees in the cypress
        family Cupressaceae, native to New Zealand and New Caledonia.  The genus is
        closely related to the South American genera "Pilgerodendron" and "Austrocedrus",
        and the New Guinean genus "Papuacedrus", both of which are included within
        "Libocedrus" by some botanists.  These genera are rather similar to the Northern
        Hemisphere genera "Calocedrus" and "Thuja": in earlier days, what is now "Calocedrus"
        was sometimes included in "Libocedrus".  They are much less closely related,
        as recently confirmed (Gadek et al. 2000).  The generic name means "teardrop
        cedar", apparently referring to drops of resin.'
    - id: Pilgerodendron
      content: Pilgerodendron is a genus of conifer belonging to the cypress family
        Cupressaceae.  It has only one species, Pilgerodendron uviferum, and is endemic
        to the Valdivian temperate rain forests and Magellanic subpolar forests of
        southern Chile and southwestern Argentina.  It grows from 40 to 55°S in Tierra
        del Fuego, where it is the southernmost conifer in the world.  It is a member
        of subfamily Callitroideae, a group of distinct southern hemisphere genera
        associated with the Antarctic flora.
    - id: Cypress-pine
