        football coach and former player.  A veteran coach at the high school, college,
        and professional levels, he last coached with Jerry Glanville at Portland
        State and with June Jones at the University of Hawaii at Manoa.  Davis served
        as the head football coach at Portland State University from 1975 to 1980,
        compiling a record of 42–24.  He has also been a head coach with the Denver
        Gold of the United States Football League (1985), the New York/New Jersey
        Knights of the World League of American Football (1991–1992), and the Detroit
        Fury (2001–2002) and the San Diego Riptide (2003) of the Arena Football League.  A
        native of Washington, Davis grew up in Oregon, where he started his coaching
        career as a high school football coach.  Davis is now widely regarded as the
        'godfather' of the run and shoot offense.
    - id: Jerry Glanville
      content: Jerry Michael Glanville (born October 14, 1941) is a former American
        football player and coach, former NASCAR driver and owner, and sportscaster.  He
        served as head coach of the Houston Oilers from 1986 to 1990 and the Atlanta
        Falcons from 1990 to 1994, compiling a career NFL record of 63–73.  From 2007
        to 2009, he was the Head Football Coach at Portland State University, tallying
        a mark of 9–24.  Glanville has worked as an analyst on HBO's "Inside the NFL",
        CBS's "The NFL Today"/"NFL on CBS" and Fox's coverage of the NFL.  He has
        also raced on the Automobile Racing Club of America circuit.  Glanville also
        briefly served as a consultant and liaison for the United Football League
        in 2011.
