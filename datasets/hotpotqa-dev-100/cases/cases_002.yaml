      Speedway ("The Rock") since 1966.  From 1966 to 1995, a 500-mile (805-km) race
      was held; the race was known as the Peach Blossom 500 (1966), the Carolina 500
      (1967–1985), and the Goodwrench 500 (1986–1995).  In 1996, the race was shortened
      to its current distance of 400 miles; the 400 mile race was called the Goodwrench
      Service 400 (1996–1997), the GM Goodwrench Service Plus 400 (1998), the Dura
      Lube/Big K 400 (1999), the Dura Lube/Kmart 400 (2000), the Dura Lube 400 (2001),
      and the Subway 400 (2002–2004).


      [Carolina Dodge Dealers 400] The Carolina Dodge Dealers 400 was the annual spring
      NASCAR Sprint Cup race held at Darlington Raceway in Darlington, South Carolina,
      USA.  A 100 mi race was held in May at the track in 1952, however the event
      did not become a regular one on the NASCAR schedule until 1957, as a 300 mi
      race in the Convertible Division, known as the Rebel 300.  In 1966, the race
      was expanded to 400 mi , and in 1973 to 500 mi .  In 1994, the race was returned
      to 400 miles.  In 2005, as part of the settlement of the Ferko lawsuit and as
      part of a schedule realignment, Darlington was forced to contract to one race
      date, with the 500 mile race (the famous Southern 500) moving to Mother''s Day
      weekend.  The 400 mile race was eliminated, although Dodge''s sponsorship was
      transferred to the 500 miler.


