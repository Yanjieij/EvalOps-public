      the song with Sean Garrett, Patrick J. Que Smith, Robert McDowell, LRoc, Ludacris,
      Da''Ron, and Lil Jon.  It also features guest vocals from Lil Jon and Ludacris,
      with the former also producing the song as well as incorporating crunk and R&B—which
      he coined as crunk&B—in the song''s production.  The song was released as the
      lead single from Usher''s fourth studio album "Confessions" (2004) on January
      27, 2004, after Usher was told by Arista Records, his label at the time, to
      record more tracks for the album.


      [Stay (Sugarland song)] "Stay" is a song recorded by American country music
      duo Sugarland.  It was released in September 2007 as the fourth and final single
      from their album "Enjoy the Ride" (see 2006 in country music).  Overall, the
      song is the group''s eighth single to enter the "Billboard" Hot Country Songs
      charts, where it reached a peak position of #2 for four weeks, stuck behind
      Taylor Swift''s "Our Song", and has become their signature song.  The music
      video for "Stay" was ranked #10 on CMT''s 100 Greatest Videos.'
