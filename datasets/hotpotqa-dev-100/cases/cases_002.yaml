    sources:
    - id: Romeo and Juliet on screen
      content: William Shakespeare's Romeo and Juliet may be one of the most-screened
        plays of all time.  The most notable theatrical releases were George Cukor's
        multi-Oscar-nominated 1936 production "Romeo and Juliet", Franco Zeffirelli's
        1968 film "Romeo and Juliet", and Baz Luhrmann's 1996 MTV-inspired "Romeo
        + Juliet".  The latter two were both, at the time, the highest-grossing Shakespeare
        films.  Cukor featured the mature actors Norma Shearer and Leslie Howard as
        the teenage lovers while Zeffirelli populated his film with beautiful young
        people, and Baz Luhrmann produced a heavily cut fast-paced version aimed at
        teenage audiences.
    - id: Romeo
      content: 'Romeo Montague (Italian: "Romeo Montecchi" ) is the protagonist of
        William Shakespeare''s tragedy "Romeo and Juliet".  The son of Montague and
        his wife, he secretly loves and marries Juliet, a member of the rival House
        of Capulet.  Forced into exile after slaying Juliet''s cousin, Tybalt, in
        a duel, Romeo commits suicide upon hearing falsely of Juliet''s death.'
    - id: Romeo + Juliet
      content: William Shakespeare's Romeo + Juliet (shortened to Romeo + Juliet)
        is a 1996 American romantic drama film directed, co-produced, and co-written
        by Baz Luhrmann, co-produced by Gabriella Martinelli, and co-written by Craig
        Pearce, being an adaptation and modernization of William Shakespeare's tragedy
        "Romeo and Juliet".  The film stars Leonardo DiCaprio and Claire Danes in
        the leading roles of Romeo and Juliet, who instantly fall in love when Romeo
        crashes a party and meets her, despite their being members of the Montague
        and Capulet family; Brian Dennehy, John Leguizamo, Pete Postlethwaite, Paul
        Sorvino, and Diane Venora star in supporting roles.
    - id: A rose by any other name would smell as sweet
      content: '"A rose by any other name would smell as sweet" is a popular reference
        to William Shakespeare''s play "Romeo and Juliet", in which Juliet seems to
        argue that it does not matter that Romeo is from her rival''s house of Montague,
        that is, that he is named "Montague."  The reference is often used to imply
        that the names of things do not affect what they really are.  This formulation
        is, however, a paraphrase of Shakespeare''s actual language, seen underlined
        below.  This scene is called the balcony scene by many people.  Juliet not
        only makes the statement above but compares Romeo to a rose saying that if
        he wasn''t named Romeo he would still be handsome and be Juliet''s Love.  Also
        as said before this states that if he wasn''t Romeo, then he wouldn''t be
        a Montague and she would be able to get married with no problem at all.'
    - id: List of Romeo × Juliet episodes
      content: '"Romeo × Juliet" (ロミオ×ジュリエット , Romio to Jurietto ) is a 24-episode
        anime television adaptation of "Romeo and Juliet", a 16th-century tragedy
        originally written by William Shakespeare.  The English playwright himself
        makes a cameo appearance in the series as a minor character.  The series was
        produced jointly by Gonzo and SKY Perfect Well Think, with Fumitoshi Oizaki
        as the main director.  It was first broadcast in Japan on Chubu-Nippon Broadcasting
        between April 4, 2007 and September 26, 2007.  It was later broadcast by other
        Japanese television networks such as TBS, KBS Kyōto and SUN-TV.  It was broadcast
        in Hungary by Animax and in Italy by Rai 4.  The chief screenwriter for the
        series was Reiko Yoshida.  The music was composed by Hitoshi Sakimoto and
        performed by Eminence Symphony Orchestra with Tomohiro Yoshida as sound director.  The
        series used three pieces of theme music.  The opening theme was "Inori (You
        Raise Me Up)" (祈り 〜You Raise Me Up〜 ) by Lena Park.  "Cyclone" (サイクロン) ) by
        12012 was the ending theme for the first 14 episodes.  "Good Bye, Yesterday"
        by Mizrock was the ending theme for episodes 15 to 23.  "Inori: You Raise
        Me Up" by Lena Park was used as a special ending for episode 24.  The anime
        is licensed in North America by Funimation.  The complete series was released
        in two sections, with the first half of the series, the "Romeo Collection"
        being released June 23, 2009 and the second half of the series, the "Juliet
        Collection" being released August 11, 2009.'
    - id: Tromeo and Juliet
      content: Tromeo and Juliet is a 1996 American independent transgressive romantic
        comedy film and a loose adaptation of William Shakespeare's "Romeo & Juliet"
        from Troma Entertainment.  The film was directed by Lloyd Kaufman from a screenplay
        by Kaufman and James Gunn, who also served as associate director.
    - id: Romeo × Juliet
      content: Romeo × Juliet (ロミオ×ジュリエット , Romio to Jurietto ) is an anime television
        series, loosely based on William Shakespeare's classical play, "Romeo and
        Juliet", along with numerous references and characters from other Shakespearean
        plays.  Though the anime borrows mostly from Shakespeare's story, the manga
        adaptation differs extensively from the original.  "Romeo × Juliet" was broadcast
        in Japan on Chubu-Nippon, broadcasting from April 4, 2007 to September 26,
        2007.  In 2009, "Romeo × Juliet" was dubbed into English and released by Funimation
        Entertainment.
    - id: James Gunn
      content: James Gunn (born August 5) is an American screenwriter, director, producer,
        novelist, actor, and musician.  He started his career as a screenwriter in
        the mid-1990s, writing the scripts for "Tromeo and Juliet" (1996), "Scooby-Doo"
        (2002) and its sequel "" (2004), and the 2004 version of "Dawn of the Dead".  He
        then started working also as a director, starting with "Slither" (2006).  He
        subsequently wrote and directed the web series "James Gunn's PG Porn", and
        the superhero films "Super" (2010), "Guardians of the Galaxy" (2014) and "Guardians
        of the Galaxy Vol.  2" (2017).
    - id: James Gunn's PG Porn
      content: James Gunn's PG Porn is a web series created by brothers James Gunn,
        Brian Gunn, and Sean Gunn.  It consists of a series of pornography spoofs,
        with a humorous event occurring just before the supposed commencement of pornographic
        sexual acts.  Each episode pairs a mainstream actor with a pornographic actress
        or model.  The tagline is, "For people who love everything about Porn...except
        the sex."
    - id: The Tragedy of Romeo and Juliet (film)
      content: The Tragedy of Romeo and Juliet is a 1982 film adaptation of William
        Shakespeare's "Romeo and Juliet", directed by William Woodman and starring
        Alex Hyde-White as Romeo and Blanche Baker as Juliet.
