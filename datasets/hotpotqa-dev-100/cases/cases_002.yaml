      in the Indianapolis 500 Mile Race.  The focus of this award is on those concepts
      that improve the performance, safety, or energy efficiency of racing cars, related
      components and systems, or driver and race track support equipment.


      [Indianapolis Motor Speedway] The Indianapolis Motor Speedway is an automobile
      racing circuit located in Speedway, Indiana, (an enclave suburb of Indianapolis)
      in the United States.  It is the home of the Indianapolis 500 and the Brickyard
      400, and formerly the home of the United States Grand Prix.  It is located on
      the corner of 16th Street and Georgetown Road, approximately 6 mi west of Downtown
      Indianapolis.


      [Lean Horse Ultramarathon] The Lean Horse Ultramarathon is run in August every
      year in the Black Hills of South Dakota.  It was first run in 2005.  It features
      a 100-mile race, a 50-mile race, and a 50-kilometer race.  Most of the course
      is on the George S. Mickelson Trail.  It was the 33rd sanctioned 100-mile race
      in the United States and is known as one of the easiest hundred mile races in
      the country.


      [Orange County Fair Speedway] Orange County Fair Speedway is a five-eighths
      mile dirt oval speedway in Middletown, Orange County, New York.  The facility
      holds weekly stock car races and demolition derbies during the summer months.  The
      track was built in 1857 for horse racing at the Orange County Fair and staged
      its first automobile race on August 16, 1919.  The fair began as an agricultural
      exhibit in 1843 and was permanently located in the Wallkill–Middletown area
      in 1857.  The speedway is located at 239 Wisner Avenue in Middletown on land
      which was known as The Ogden Tract in the mid-1850s.  It was originally a half-mile
      horse racing track known as the Harry Clay Oval, named after a race horse that
      was famous at that time.  Over the years, the track was widened and lengthened
      to a true 5/8-mile race track.


      [Johnny Rutherford] John Sherman "Johnny" Rutherford III (born March 12, 1938),
      also known as "Lone Star JR", is an American former automobile racing driver.  He
      is one of ten drivers to win the prestigious Indianapolis 500 mile race at least
      three times, winning in 1974, 1976, and 1980.


      [1957 Indianapolis 500] The 41st International 500-Mile Sweepstakes was held
      at the Indianapolis Motor Speedway on Thursday, May 30, 1957.  The event was
      part of the 1957 USAC National Championship Trail and it was race 3 of 8 in
      the 1957 World Championship of Drivers.


      [1964 Armstrong 500] The 1964 Armstrong 500 was a production car race held on
      4 October 1964 at the Mount Panorama Circuit just outside Bathurst in New South
