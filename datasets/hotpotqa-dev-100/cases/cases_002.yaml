        Bloody Valentine 3D".  He is also known for portraying Carter Horton in "Final
        Destination" (2000).
    - id: Jawbreaker (film)
      content: Jawbreaker is a 1999 American black comedy film written and directed
        by Darren Stein.  The film stars Rose McGowan, Rebecca Gayheart, and Julie
        Benz as girls in an exclusive clique in their high school.  Charlotte Ayanna
        has a non-speaking cameo role as the murdered leader of the group.  The film
        was inspired by the film "Heathers", and is often compared to it, particularly
        the plot involving a popular female clique, and the ostensibly accidental
        killing of one of its members.
    - id: Sarah Drew
      content: Sarah Drew (born October 1, 1980) is an American actress.  She is known
        for playing Hannah Rogers in The WB family drama series "Everwood" (2004–2006)
        and Dr. April Kepner in the ABC medical drama series "Grey's Anatomy" (2009–present).
    - id: Charmed (season 4)
      content: The fourth season of "Charmed", an American supernatural drama television
        series, began airing on October 4, 2001 on The WB.  Airing on Thursdays at
        9:00 pm, the season consisted of 22 episodes and concluded its airing on May
        16, 2002.  This season also saw the introduction of Rose McGowan as Paige
        Matthews—half-sister to Prue, Piper and Phoebe—and a slight alteration of
        the opening credits, due to the third season departure of Shannen Doherty
        as Prue.  Paramount Home Entertainment released the complete fourth season
        in a six-disc boxed set on February 28, 2006.
    - id: List of Charmed characters
      content: '"Charmed" is an American television series that was originally broadcast
        by The WB for eight seasons from October 7, 1998, until May 21, 2006.  The
        series narrative follows a trio of sisters, known as The Charmed Ones, the
        most powerful good witches of all time, who use their combine Power of Three
        to protect innocent lives from evil beings such as demons and warlocks.  Each
        sister possesses unique magical powers that grow and evolve, while they attempt
        to maintain normal lives in modern-day San Francisco.  The main characters
