  input:
    query: What race track in the midwest hosts a 500 mile race eavery May?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: Indianapolis Motor Speedway
    aliases: []
    source_ids:
    - 1957 Indianapolis 500
    - Indianapolis Motor Speedway
    supporting_sentences:
    - title: 1957 Indianapolis 500
      sentence: The 41st International 500-Mile Sweepstakes was held at the Indianapolis
        Motor Speedway on Thursday, May 30, 1957.
    - title: Indianapolis Motor Speedway
      sentence: The Indianapolis Motor Speedway is an automobile racing circuit located
        in Speedway, Indiana, (an enclave suburb of Indianapolis) in the United States.
    sources:
    - id: Subway 400
      content: The Subway 400 was the second race of the NASCAR Winston Cup Series
        season until 2004, held a week after the Daytona 500.  This 400-mile (644 km)
        annual race was sponsored by Subway and was held at North Carolina Speedway
        ("The Rock") since 1966.  From 1966 to 1995, a 500-mile (805-km) race was
        held; the race was known as the Peach Blossom 500 (1966), the Carolina 500
        (1967–1985), and the Goodwrench 500 (1986–1995).  In 1996, the race was shortened
        to its current distance of 400 miles; the 400 mile race was called the Goodwrench
        Service 400 (1996–1997), the GM Goodwrench Service Plus 400 (1998), the Dura
        Lube/Big K 400 (1999), the Dura Lube/Kmart 400 (2000), the Dura Lube 400 (2001),
        and the Subway 400 (2002–2004).
    - id: Carolina Dodge Dealers 400
      content: The Carolina Dodge Dealers 400 was the annual spring NASCAR Sprint
        Cup race held at Darlington Raceway in Darlington, South Carolina, USA.  A
        100 mi race was held in May at the track in 1952, however the event did not
        become a regular one on the NASCAR schedule until 1957, as a 300 mi race in
        the Convertible Division, known as the Rebel 300.  In 1966, the race was expanded
        to 400 mi , and in 1973 to 500 mi .  In 1994, the race was returned to 400
        miles.  In 2005, as part of the settlement of the Ferko lawsuit and as part
        of a schedule realignment, Darlington was forced to contract to one race date,
        with the 500 mile race (the famous Southern 500) moving to Mother's Day weekend.  The
        400 mile race was eliminated, although Dodge's sponsorship was transferred
        to the 500 miler.
    - id: Louis Schwitzer Award
      content: The Louis Schwitzer Award is presented annually to an engineer, or
        a team of engineers, for excellence in the design, development and implementation
        of new, innovative motorsports technology concepts for use in the Indianapolis
        500 Mile Race.  The focus of this award is on those concepts that improve
        the performance, safety, or energy efficiency of racing cars, related components
        and systems, or driver and race track support equipment.
    - id: Indianapolis Motor Speedway
      content: The Indianapolis Motor Speedway is an automobile racing circuit located
        in Speedway, Indiana, (an enclave suburb of Indianapolis) in the United States.  It
        is the home of the Indianapolis 500 and the Brickyard 400, and formerly the
        home of the United States Grand Prix.  It is located on the corner of 16th
        Street and Georgetown Road, approximately 6 mi west of Downtown Indianapolis.
    - id: Lean Horse Ultramarathon
      content: The Lean Horse Ultramarathon is run in August every year in the Black
        Hills of South Dakota.  It was first run in 2005.  It features a 100-mile
        race, a 50-mile race, and a 50-kilometer race.  Most of the course is on the
        George S. Mickelson Trail.  It was the 33rd sanctioned 100-mile race in the
        United States and is known as one of the easiest hundred mile races in the
        country.
    - id: Orange County Fair Speedway
      content: Orange County Fair Speedway is a five-eighths mile dirt oval speedway
        in Middletown, Orange County, New York.  The facility holds weekly stock car
        races and demolition derbies during the summer months.  The track was built
        in 1857 for horse racing at the Orange County Fair and staged its first automobile
        race on August 16, 1919.  The fair began as an agricultural exhibit in 1843
        and was permanently located in the Wallkill–Middletown area in 1857.  The
        speedway is located at 239 Wisner Avenue in Middletown on land which was known
        as The Ogden Tract in the mid-1850s.  It was originally a half-mile horse
        racing track known as the Harry Clay Oval, named after a race horse that was
        famous at that time.  Over the years, the track was widened and lengthened
        to a true 5/8-mile race track.
    - id: Johnny Rutherford
      content: John Sherman "Johnny" Rutherford III (born March 12, 1938), also known
        as "Lone Star JR", is an American former automobile racing driver.  He is
        one of ten drivers to win the prestigious Indianapolis 500 mile race at least
        three times, winning in 1974, 1976, and 1980.
    - id: 1957 Indianapolis 500
      content: The 41st International 500-Mile Sweepstakes was held at the Indianapolis
        Motor Speedway on Thursday, May 30, 1957.  The event was part of the 1957
        USAC National Championship Trail and it was race 3 of 8 in the 1957 World
        Championship of Drivers.
    - id: 1964 Armstrong 500
      content: The 1964 Armstrong 500 was a production car race held on 4 October
        1964 at the Mount Panorama Circuit just outside Bathurst in New South Wales,
        Australia.  The 500 mile race was open to Australian built production sedans
        of which 100 examples had been registered.  It was the fifth Armstrong 500
        and the second to be held at Bathurst although it is commonly referred to
