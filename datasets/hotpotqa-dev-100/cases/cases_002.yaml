  input:
    query: Vince Phillips held a junior welterweight title by an organization recognized
      by what larger Hall of Fame?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: International Boxing Hall of Fame
    aliases: []
    source_ids:
    - Vince Phillips
    - International Boxing Federation
    supporting_sentences:
    - title: Vince Phillips
      sentence: ' He held the IBF junior welterweight title from 1997 to 1999, notably
        scoring an upset victory against then-undefeated Kostya Tszyu to become champion.'
    - title: International Boxing Federation
      sentence: The International Boxing Federation (IBF) is one of four major organizations
        recognized by the International Boxing Hall of Fame (IBHOF) which sanction
        world championship boxing bouts, alongside the World Boxing Association (WBA),
        World Boxing Council (WBC) and World Boxing Organization (WBO).
    sources:
    - id: Ralph Charles
      content: Ralph Charles (born 5 February 1943) is an English amateur welterweight
        and professional light welter/welter/light middle/middleweight boxer of the
        1960s and '70s who as an amateur won the Amateur Boxing Association of England
        (ABAE) 1959 Junior Class-A title against Kenneth "Ken"/"Kenny" J. Cooper  (Warley
        ABC), boxing out of West Ham Boys & ABC, won the Amateur Boxing Association
        of England (ABAE) 1960 Junior Class-B title against J. Harwood (National Association
        of Boys Clubs), boxing out of West Ham Boys & ABC, and was runner-up for the
        1963 Amateur Boxing Association of England welterweight title, against Johnny
        Pritchett (Bingham & District ABC), boxing out of West Ham ABC, and as a professional
        won the British Boxing Board of Control (BBBofC) Southern Area welterweight
        title, BBBofC British welterweight title, European Boxing Union (EBU) welterweight
        title, and Commonwealth welterweight title, and was a challenger for the World
        Boxing Council (WBC) welterweight title, and World Boxing Association (WBA)
        World welterweight title against José Nápoles, his professional fighting weight
        varied from 140 lb , i.e. light welterweight to 157 lb , i.e. middleweight.
    - id: Bunny Grant
      content: George Leslie "Bunny" Grant (born 29 September 1940) is a Jamaican
        professional feather/super feather/light/light welter/welterweight/light middleweight
        boxer of the 1950s, '60s and '70s who won the Jamaican lightweight title,
        Jamaican welterweight title, Central American light welterweight Title, Latin
        American junior welterweight title, and British Commonwealth lightweight title,
        and was a challenger for the World Boxing Council (WBC) light welterweight
        title and World Boxing Association (WBA) World light welterweight title against
        Eddie Perkins, Commonwealth welterweight title against Clyde Gray, his professional
        fighting weight varied from 125+1/2 lb , i.e. featherweight to 152+1/2 lb
        , i.e. light middleweight.  Bunny Grant was managed by Jacques Deschamps,
        and Pancho Rankine (circa 1962), and trained by Harry Wiley (circa 1962).
    - id: Vince Phillips
      content: Vincent Edwards "Vince" Phillips (born July 23, 1963) is an American
        former professional boxer who competed from 1989 to 2007.  He held the IBF
        junior welterweight title from 1997 to 1999, notably scoring an upset victory
        against then-undefeated Kostya Tszyu to become champion.
    - id: Andrew Murray (Guyanese boxer)
      content: Andrew "The Eagle" Murray (1 July 1971 — 26 January 2002 (aged 30))
        born in Georgetown was a Guyanese professional welter/light middle/middleweight
        boxer of the 1990s and 2000s who won the World Boxing Council (WBC) FECARBOX
        welterweight title, World Boxing Association (WBA) Fedelatin welterweight
        title, and Commonwealth welterweight title, and was a challenger for the World
        Boxing Association (WBA) World welterweight title against Ike Quartey, World
        Boxing Union (WBU) welterweight title against Michele Piccirillo, and World
        Boxing Organization (WBO) North American Boxing Organization (NABO) light
        middleweight title against Fathi Missaoui, his professional fighting weight
        varied from 145 lb , i.e. welterweight to 156 lb , i.e. middleweight.  Andrew
        Murray was trained by Emanuel Steward, and was the Vice-President of the Guyana
        Amateur Boxing Board and was training several young boxers, and he had coached
        Hugo Lewis to the Guyanese super featherweight title on 26 December 2001.  Andrew
        Murray died in a traffic collision on the Soesdyke-Linden Highway early in
