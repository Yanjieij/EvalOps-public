    sources:
    - id: Selver
      content: Selver is a chain of supermarkets and hypermarkets operating in Estonia.  Selver
        is a subsidiary of Tallinna Kaubamaja.  The chain was established in 1995
        with the opening of Punane Selver in Lasnamäe, Tallinn.  Expansion outside
        of Tallinn began on 10 May 2002 with the opening of Mai Selver in Pärnu.  Since
        18 December 2008 Selver also operated in Latvia, but in the end of 2009 due
        to the financial crisis Selver was forced to close all its 6 supermarkets
        in Latvia.  There are currently 44 stores in operation all over Estonia (as
        of December 2014).
    - id: Holiday Inn Lake Buena Vista Downtown
      content: Holiday Inn Orlando - Disney Springs Area is a resort hotel located
        on the property of Walt Disney World Resort in Lake Buena Vista, Florida.  It
        is near the Disney Springs district on Hotel Plaza Boulevard.  The hotel opened
        in February 1973 as a Howard Johnson's; it was expanded in 1978.  It remained
        part of the chain until 1994.  In 1995 it was bought by Host Marriott Corporation
        and operated as a Courtyard by Marriott hotel until 2003.  Holiday Inn bought
        the resort in December 2003.  The hotel closed on August 14, 2004 after Hurricane
        Charley caused extensive damage when it blew through Florida.  It was owned
        by CIG LBV LLC and stayed under the Holiday Inn brand, part of the InterContinental
        Hotels Group PLC, when it reopened on February 12, 2010 after a reportedly
        $35 million renovation.  On December 9, 2016, the hotel was sold and from
        then on operated and managed by Interstate Hotels & Resorts, still operating
        under the Holiday Inn brand.  The resort has 323 rooms, a heated swimming
        pool and a hot tub.  The hotel also has a view of the Disney Springs area
        and the rest of the Walt Disney World Resort from certain areas of the hotel.
    - id: Tesco Extra
      content: Tesco Extra is a chain of mainly out-of-town hypermarkets, owned and
        operated by the United Kingdom's largest retailer, Tesco.
    - id: Tazweed Center
      content: Tazweed Center is a chain of independently owned and operated hypermarkets
        operating in the Syrian refugee camps.  The word "tazweed" translates as "resupply".
    - id: Carrefour
      content: Carrefour S.A. (] ) is a French multinational retailer headquartered
        in Boulogne Billancourt, France, in the Hauts-de-Seine Department near Paris.  It
        is one of the largest hypermarket chains in the world (with 1,462 hypermarkets
        at the end of 2016).  Carrefour operates in more than 30 countries, in Europe,
        the Americas, Asia and Africa.  Carrefour means "crossroads" and "public square"
        in French.  The company is a component of the Euro Stoxx 50 stock market index.
    - id: John A. Brown (department store)
      content: John A. Brown was an Oklahoman department store chain.  It operated
        under that name from 1932, when its founder bought out its predecessor and
        renamed the chain for himself.  After Mr. Brown died in 1940, his widow took
        over management until her own death in 1967, forcing a change in ownership.  Dayton-Hudson,
        another retail company, but continued operating the chain under its own name,
        until 1984, when Dayton-Hudson sold the Brown chain to Dillard's, another
        national chain, which combined all of the Brown stores under its own name.  The
        flagship store on West Main Street was closed in 1974 and was subsequently
        razed as part of an urban renewal project.  The project was supposed to result
        in a new shopping center known as the Galleria.  However, the project was
        never completed, so the Brown chain never returned to downtown.
    - id: SavaCentre
      content: SavaCentre was a chain of 13 hypermarkets and later a further seven
        discount supermarkets owned and operated jointly by Sainsbury's and BHS, beginning
        in 1977.  Sainsbury's later took full control of the stores alone in 1989,
        rebranding them as Sainsbury’s SavaCentre, until 2005 when the stores were
        integrated into the Sainsbury's supermarket brand.  The hypermarket stores
        ranged in size from 66,000 sqft to 117,000 sqft and the discount supermarkets
        ranged in size from 31,000 sqft to 70,000 sqft .  At the time of its inception,
        it was the only dedicated hypermarket chain in the UK.
    - id: Uno-X
      content: Uno-X is a chain of unmanned fuel stations throughout Norway and Denmark.  It
        is operated as the low-cost section of YX Energi.  The chain was originally
        created as a low cost chain in Denmark in the late 1950s.  The rights to use
        the name in Sweden were sold to Britain's Burmah Oil.  In 1991 Norsk Hydro
        acquired the 330 outlets of the Danish operation and five years later it bought
        the Swedish Uno-X chain from Burmah.
    - id: Euromarché
      content: Euromarché ("Euromarket") was a French hypermarket chain.  The first
        store opened in 1968 in Saint-Michel-sur-Orge.  In June 1991, the group was
        rebought by its rival, Carrefour, for 5,2 billion francs.
    - id: Lewis's
      content: Lewis's was a chain of British department stores that operated from
        1856 to 2010.  The parent companies of Lewis's have gone into administration
        many times over the years, including 1991.  The first store, which opened
        in Liverpool city centre, became the flagship of the chain of stores operating
        under the Lewis's name.  Several stores in the chain were bought in 1991 by
        the company Owen Owen and continued to operate under the Lewis's brand name
        for several years, but after the closure of the Manchester store in 2002,
        only the original Liverpool store continued to trade under the Lewis's name.  This
        store was sold in 2007 to the Vergo Retail Ltd and closed in 2010.
