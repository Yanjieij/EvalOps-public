    sources:
    - id: Parkridge, Saskatoon
      content: Parkridge is a residential community in western Saskatoon, Saskatchewan,
        located on land annexed by the city between 1975 and 1979.  Development of
        the subdivision (initially called "Fairhaven II" after the neighbouring community
        to the east, began in the early 1980s.  The extreme west end of the neighbourhood
        remained undeveloped until the subsequent creation of the adjacent Blairmore
        Suburban Centre led to the final phase of Parkridge being built out in the
        early 2010s.  Whereas the majority of residents are employed in the sales
        and service sector, the next highest employer is business, finance and administration.  The
        two main age groups are those in their 40s and teenagers as of 2005.  Until
        recently Parkridge was the farthest western neighbourhood of Saskatoon south
        of 22nd Street.  However, new construction will soon see Neighbourhood 2 of
        the Blairmore SDA bear that claim to fame.  In comparison, the neighbourhood
        of Parkridge with a 2001 census population of 4,505 is larger than the Saskatchewan
        city of Melville which had a population of 4,149 in 2006, and 4,453 in 2001
        and Parkridge is a little smaller than the provincial city of Humboldt which
        was 4,998 in 2006, and 5,161 in 2001.  In Saskatchewan rural towns must maintain
        a population above 5,000 to apply for city status.  According to MLS data,
        the average sale price of a home as of 2013 was $327,072.
    - id: Willoughton
      content: Willoughton is a village and civil parish in the West Lindsey district
        of Lincolnshire, England.  It is situated 2 mi west from the A15 road, 13
        mi north from Lincoln and 3 mi south from Kirton Lindsey.  According to the
        2001 Census the village had a population of 330, increasing to 341 at the
        2011 census.
    - id: 2001 Bangladesh census
      content: In 2001, the Bangladesh Bureau of Statistics, conducted a national
        census in Bangladesh, ten years after the 1991 census.  They recorded data
        from all of the districts and upazilas and main cities in Bangladesh including
        statistical data on population size, households, sex and age distribution,
        marital status, economically active population, literacy and educational attainment,
        religion, number of children etc.  According to the adjusted 2001 census figures,
        Bangladesh's population stood at 129.3 million (an initial count put it at
        124.4 million; an adjustment for the standard rate of undercounting then boosted
        the figure).  According to the census, Hindus were 9.2 per cent of the population.
    - id: Boston, Lincolnshire
      content: Boston ( ) is a town and small port in Lincolnshire, on the east coast
        of England.  It is the largest town of the wider Borough of Boston local government
        district.  The borough had a total population of 66,900, at the ONS mid 2015
        estimates, while the town itself had a population of 35,124 at the 2001 census.  It
        is due north of Greenwich on the Prime Meridian.
    - id: Kirton, Suffolk
      content: Kirton is a village and a civil parish in the shire county of Suffolk,
        England, situated off the A14 road, about 4.5 km from Felixstowe and around
        10 km from Ipswich.  The closest train station to Kirton is Trimley.  According
        to the 2011 census, Kirton had a population of 1,146.  It is located between
        the River Debben and the River Orwell.  The village of Kirton covers a total
        area of 8.3 km2 .  As the county of Suffolk lacks quarries, many of the buildings
        are made from flint, clay and timber.
    - id: Kirton, Nottinghamshire
      content: Kirton is a village in Nottinghamshire, England.  It is located 3 mi
        east of Ollerton.  According to the United Kingdom Census 2001 it had a population
        of 273, reducing to 261 at the 2011 census.
    - id: Urbanisation in India
      content: Urbanization in India began to accelerate after independence, due to
        the country's adoption of a mixed economy, which gave rise to the development
        of the private sector.  Urbanisation is taking place at a faster rate in India.  Population
        residing in urban areas in India, according to 1901 census, was 11.4%.  This
        count increased to 28.53% according to 2001 census, and crossing 30% as per
        2011 census, standing at 31.16%.  According to a survey by UN State of the
        World Population report in 2007, by 2030, 40.76% of country's population is
        expected to reside in urban areas.  As per World Bank, India, along with China,
        Indonesia, Nigeria, and the United States, will lead the world's urban population
        surge by 2050.
    - id: Sauce Viejo, Argentina
      content: Sauce Viejo is a city in the province of Santa Fe, Argentina.  It is
        located about 22 km from the province's capital city, Santa Fe, and has a
        population of 6,825 inhabitants (2001 census ) which represents a growth of
        87.96% compared to the 3,631 inhabitants (2001 census ) of the previous census.
    - id: Borough of Berwick-upon-Tweed
      content: Berwick-upon-Tweed was a local government district and borough in Northumberland
        in the north-east of England, on the border with Scotland.  The district had
        a resident population of 25,949 according to the 2001 census, which also notes
        that it is the most ethnically homogeneous in the country, with 99.6% of the
        population recording themselves in the 2001 census as "White".  It was also
        the smallest district in England with borough status, and the third-least
        densely populated local government district (after Eden and Tynedale).
    - id: Kirton End
      content: Kirton End is a hamlet in the civil parish of Kirton in the Boston
        district of Lincolnshire, England.  It lies on the B1391 road, 4 mi south-west
        from Boston, and 1.5 mi north-east from Kirton.
