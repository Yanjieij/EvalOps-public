      Ground Intelligence Officer can be a Recon Marine after their training is done.


      [National Intelligence Estimate] National Intelligence Estimates (NIEs) are
      United States federal government documents that are the authoritative assessment
      of the Director of National Intelligence (DNI) on intelligence related to a
      particular national security issue.  NIEs are produced by the National Intelligence
      Council and express the coordinated judgments of the United States Intelligence
      Community, the group of 16 U.S. intelligence agencies.  NIEs are classified
      documents prepared for policymakers.'
