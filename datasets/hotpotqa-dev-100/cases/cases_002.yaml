      content: Ken Herock (born July 16, 1941, in Pittsburgh) was an American college
        and professional football player who played tight end.  He played collegiately
        at West Virginia and professionally in the American Football League, where
        he played for the AFL Champion Oakland Raiders in the second AFL-NFL World
        Championship Game, held after the 1967 season.  He attended Munhall High School
        in Pittsburgh.  His six-year pro career was spent with the Oakland Raiders,
        who he helped win the AFL title, the Cincinnati Bengals, and the Boston Patriots.  After
        his playing career ended, Herock was a player personnel executive in the NFL
        with the Raiders, the Tampa Bay Buccaneers, and the Atlanta Falcons.  He is
        known for trading Brett Favre from the Falcons to the Green Bay Packers at
        the urging of head coach Jerry Glanville.
    - id: 1990 Atlanta Falcons season
      content: The 1990 Atlanta Falcons season was the franchise's 25th season in
        the National Football League (NFL).  Jerry Glanville was hired to be the team's
        new coach.  The franchise changed their helmets from red to black.  Atlanta
        looked to improve on its 3-13 record from 1989.  The team did improve on its
        3-13 record, finishing 5-11, but the Falcons missed the playoffs for the eighth
        straight season.  The season started out pretty well for Atlanta, as they
        beat playoff contenders Houston, New Orleans, and Cincinnati at home.  The
        team sat at 3-4 after their win against Cincinnati.  It then lost seven games
        in a row before winning its last two to end the season.  Atlanta went 5-3
        at home, but winless on the road, which cost them a trip to the postseason.
