    - title: EFL Cup
      sentence: The EFL Cup (referred to historically, and colloquially, as simply
        the League Cup), currently known as the Carabao Cup for sponsorship reasons,
        is an annual knockout football competition in men's domestic English football.
    sources:
    - id: 2017–18 Wigan Athletic F.C. season
      content: The 2017–18 season is Wigan Athletic's 86th year in existence and their
        first back in League One, after being relegated the previous season.  Along
        with competing in the league, the club will also participate in the FA Cup,
        EFL Cup and EFL Trophy.  Paul Cook was appointed as manager on 31 May 2017,
        signing a 3 year deal, following the departure of much of the previous coaching
        staff the day before.
    - id: 2007–08 Wigan Athletic F.C. season
      content: The 2007–08 Wigan Athletic F.C. season was the club's 30th season in
        the Football League and their third season in the Premier League.
    - id: EFL Cup
      content: The EFL Cup (referred to historically, and colloquially, as simply
        the League Cup), currently known as the Carabao Cup for sponsorship reasons,
        is an annual knockout football competition in men's domestic English football.  Organised
        by the English Football League (EFL), it is open to any club within the top
        four levels of the English football league system – 92 clubs in total – comprising
        the top level Premier League, and the three divisions of the English Football
        League's own league competition (Championship, League One and League Two).
    - id: Springfield Park (Wigan)
      content: Springfield Park was a multi-purpose stadium in Wigan, Greater Manchester.  It
        was the home ground of Wigan Athletic F.C. until the club moved to the new
        JJB Stadium (now DW Stadium) after the 1998–99 season.  At its largest, the
        stadium held 40,000.  In its 102-year existence the ground only saw 32 years
        as a Football League venue, 11 years for Wigan Borough F.C. and 21 years for
        Wigan Athletic FC, before it was demolished to make way for a housing estate
        in 1999.
    - id: Trinidad and Tobago League Cup
      content: The Trinidad and Tobago League Cup, or commonly known as the First
        Citizens Cup for sponsorship reasons, is the league cup style football competition
        open for Trinidad and Tobago teams competing in the country's TT Pro League.  Similar
        to the FA Trophy, it is played on a knockout (single elimination) basis in
        September and October towards the beginning of each Pro League season.  Unlike
        the FA Trophy, where 36 teams enter each season from the top three tiers of
        the Trinidad and Tobago football league system and the Secondary Schools Football
        League, only teams from the TT Pro League compete in the league cup.  The
        knockout tournament was inaugurated in 2000 and is currently sponsored by
        First Citizens Bank.  Although the league cup is one of the three major domestic
        trophies attainable by Trinidad and Tobago league teams, it is perceived as
        a lower priority than the league championship and the FA Trophy.  The current
        theme is "Where Winners Reign", with TT$110,000 to the winner, TT$20,000 to
        the runners-up, semifinal winners receive TT$7,000, quaterfinal winners receive
        TT$5,000 and Play-off round winners receive TT$3,000.
    - id: 1979–80 Wigan Athletic F.C. season
      content: The 1979–80 season was the 42nd season in the history of Wigan Athletic
        F.C. and their second as a professional club in the Football League.
    - id: Nick Powell
      content: Nicholas Edward "Nick" Powell (born 23 March 1994) is an English professional
        footballer who plays for Wigan Athletic as a midfielder.  He began his career
        at Crewe Alexandra, initially as a forward, making his debut at the age of
        16.  After impressing for Crewe Alexandra during the 2011–12 season, including
        scoring in their 2–0 victory in the League Two play-off Final, he moved to
        Manchester United in July 2012.  Unable to break into the Manchester United
        first team, however, he went on loan to Wigan Athletic, Leicester City and
        Hull City before being released in June 2016.  He joined Wigan Athletic in
        July 2016.  He has represented England at under-16, under-17, under-18, under-19
        and under-21 levels.
    - id: 2006–07 Wigan Athletic F.C. season
      content: The 2006–07 Wigan Athletic F.C. season was the club's 29th season in
        the Football League and their second season in the Premier League.
    - id: 1978–79 Wigan Athletic F.C. season
      content: The 1978–79 season was the 41st season in the history of Wigan Athletic
        F.C. and their first as a professional club in the Football League.  After
        finishing 2nd in the Northern Premier League during the previous season, the
        club was nominated to apply for Football League status, and were elected into
        the league to replace Southport.  After a poor start, the club exceeded expectations
        in the league, and towards the end of the season, a second consecutive promotion
        seemed possible.  The club eventually fell short, finishing the season in
        6th place with a total of 55 points.
    - id: List of Wigan Borough F.C. players
      content: Wigan Borough F.C. was an English football club based in the town of
        Wigan.  The club was founded in 1920 and joined the Lancashire Combination.  In
        1921, Borough turned professional when their application was accepted to play
        in the inaugural season of the newly formed Football League Third Division
        North.  The team played in the Football League for ten seasons, with their
        most successful season coming in 1928–29, finishing fourth in the league and
        reaching the third round of the FA Cup.  Wigan Borough folded during the 1931–32
        season due to financial problems, and League football did not return to the
        town until Wigan Athletic F.C. were elected into the Football League in 1978.
