      1958 and 1959.  In the UK, upon its release in 1958, the album reached No.1
      for 19 consecutive weeks and became the biggest-selling album of the year.  The
      album was released on Columbia Records, whose President, Goddard Lieberson provided
      the $375,000 needed to stage the show in return for the rights to the Cast recording.  The
      album was later re-issued on Compact disc in 1988 and has been re-released a
      number of times since.  It is currently available with bonus tracks.


