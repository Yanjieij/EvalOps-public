      sentence: Drifting is a driving technique where the driver intentionally oversteers,
        with loss of traction in the rear wheels or all tires, while maintaining control
        and driving the car through the entirety of a corner.
    sources:
    - id: Raimund Harmstorf
      content: Raimund Harmstorf (7 October 1939 in Hamburg – 3 May 1998 in Marktoberdorf)
        was a German actor.  He became famous as the protagonist of a German TV mini
        series based on Jack London's the Sea-Wolf (which was sold into many countries)
        and starred later on successfully in another German TV series based on Jules
        Verne's Michael Strogoff.
    - id: Rising Star (France)
      content: Rising Star is a French musical television competition series based
        on the Rising Star contest series based on the Israeli programme "HaKokhav
        HaBa".  The TV viewers become the instant ultimate juries with expert panelists
        given only a nominal percentage weight in voting.  The French rights were
        bought by specialized music-oriented station M6.
    - id: Iron Man (TV series)
      content: 'Iron Man, also known as Iron Man: The Animated Series, is an American
        animated television series based on Marvel Comics'' superhero Iron Man.  The
        series aired from 1994 to 1996 in syndication as part of "The Marvel Action
        Hour", which packaged "Iron Man" with another animated series based on Marvel
        properties, the "Fantastic Four", with one half-hour episode from each series
        airing back-to-back.  The show was backed by a toy line that featured many
        armor variants.'
    - id: Raaz Pichhle Janam Ka
      content: 'Raaz Pichhle Janm Ka (Hindi: राज़ पिछले जनम का , "Past Life Secrets")
        is an Indian reality television series based on the technique of past life
        regression.  The NDTV Imagine show is hosted by actor Ravi Kishan, while the
        past life regression sessions are conducted by Mumbai-based psychologist Trupti
        Jayin.  The first season started on December 7, 2009, was planned for a 20-episode
        run from Monday to Friday, 9.30 pm, by Ideas Box Entertainment, got an extension
        of 20 episodes, and ended on January 15, 2010, while Second season started
        on October 23, 2010, with actor, Chunky Pandey as guest.'
    - id: List of The Office (U.S. TV series) characters
      content: '"The Office" is a television series based on the British television
        comedy of the same name.  The format of the series is a parody of the fly
        on the wall documentary technique that intersperses traditional situation
        comedy segments with mock interviews with the show''s characters, provides
        the audience access to the ongoing interior monologues for all of the main
        characters, as well as occasional insights into other characters within the
        show.'
    - id: 'Night School: the Web Series'
      content: Night School is a British web series based on the Night School books
        by CJ Daugherty.  It was the first ever web series based on a British young
        adult book.  The show premiered on YouTube on December 12, 2014.  The series
        was written and created by CJ Daugherty and Jack Jewers.
    - id: Ripley's Believe It or Not! (TV series)
      content: Ripley's Believe It or Not!  is the name of several documentary television
        series based on the newspaper feature.  The first series aired on NBC from
        1949 to 1950, and was hosted by Robert L. Ripley until his death, after which
        several substitute hosts filled in.  The series was revived for ABC in the
        1980s, and was hosted primarily by Jack Palance.  Another revival debuted
        on TBS in 2000, and aired until 2003, with Dean Cain as host.  A Filipino
        version, hosted by Chris Tiu, debuted in 2008.  An animated series based on
        the "Ripley's" franchise was also created.
    - id: Drifting (motorsport)
      content: Drifting is a driving technique where the driver intentionally oversteers,
        with loss of traction in the rear wheels or all tires, while maintaining control
        and driving the car through the entirety of a corner.  Car drifting is caused
        when the rear slip angle is greater than the front slip angle, to such an
        extent that often the front wheels are pointing in the opposite direction
        to the turn (e.g. car is turning left, wheels are pointed right or vice versa,
        also known as opposite lock or counter-steering).
    - id: D1NZ
      content: 'D1NZ is a production car drifting series in New Zealand.  There is
        currently no New Zealand drifting championship so D1NZ is the premier series
        running as a clubsport advanced event under MotorSport New Zealand.  It began
        early in 2003 as a small competition consisting of several drifting teams
        from all over the country in order to organise and regulate Drifting events
        on the circuit.  Since then it has continued to grow larger and more professional,
        now involving professional drivers with sponsored cars.  The series now includes
        two championships: Pro and Pro-sport.  New competitors generally need to prove
        themselves in the Pro-sport championship before entering the Pro championship
        (unless coming from an equivalent international series).  Organizers aim to
        promote and educate Drifting in New Zealand, with a regulated safe environment.  Despite
        similar moniker, the series is not related to the Japanese D1 Grand Prix series.  It
        has been recognised as the longest running drifting series in the world.'
    - id: Katri, Girl of the Meadows
      content: Katri, Girl of the Meadows (牧場の少女カトリ , Makiba no Shōjo Katori ) is
        an anime series based on the Finnish novel, ""Paimen, piika ja emäntä"" by
        Auni Nuolivaara.  The series was broadcast originally in Japan in 1984 as
        part of the children's anthology series "World Masterpiece Theater", also
        known simply as ""Meisaku" from Nippon Animation.  The anthology had before
        and after produced a great variety of animated series based on different children's
        novels from around the world; among them were "" (1983) and "Little Princess
        Sara" (1985).  In Europe, where "World Masterpiece Theater" series have found
        huge success, "Katri, Girl of the Meadows" made its way to different countries,
        including Spain, Italy, France, and Germany.  The series has never been broadcast
        or published in Finland where it remains mostly unknown.
