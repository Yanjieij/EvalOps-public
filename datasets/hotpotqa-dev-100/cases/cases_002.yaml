      out on Goulding''s album from 2013.  The song features English singer and songwriter
      Ellie Goulding and also included as one of the tracks on Goulding''s "Halcyon
      Days" (2013), the reissue of her second studio album, "Halcyon" (2012).  The
      Invisible Men assisted the artists in writing the song.


      [Delirium (Ellie Goulding album)] Delirium is the third studio album by English
      singer and songwriter Ellie Goulding, released on 6 November 2015 by Polydor
      Records.  Music critics were generally impressed by the overall production of
      the record, although they were ambivalent in regards to its originality.  It
      debuted at number three on the UK Albums Chart and the US "Billboard" 200, earning
      Goulding her highest-charting record in the latter country and her highest first-week
      sales figures in both territories.  The album spawned three singles: "On My
      Mind", "Army" and "Something in the Way You Move".


      [Something in the Way You Move] "Something in the Way You Move" is a song by
      English singer and songwriter Ellie Goulding from her third studio album, "Delirium"
      (2015).  The song was serviced to contemporary hit radio in the United States
      on 19 January 2016 as the album''s second single in North America, and third
      overall.  It reached number 51 on the UK Singles Chart and number 43 on the
      US "Billboard" Hot 100.


      [List of songs recorded by Ellie Goulding] English singer and songwriter Ellie
      Goulding has recorded songs for three studio albums and guest features.  After
      signing a contract with record label Polydor Records in July 2009, Goulding
      began to work on her debut studio album, "Lights", which was ultimately released
      in February 2010.  The first single released from the album was "Under the Sheets",
      which Goulding wrote in collaboration with Starsmith.  Starsmith co-wrote four
      other songs and served as the album''s primary producer.  Goulding also collaborated
      with Jonny Lattimer on the singles "Starry Eyed" and "The Writer", and shared
      writing credits with Fraser T Smith on "Your Biggest Mistake".  In November
      2010, the singer re-released "Lights" as "Bright Lights", which included the
      standard version of the album and several new songs.  She collaborated with
      Richard Stannard and Ash Howes on "Lights" and recorded a cover version of Elton
      John''s "Your Song".  At this time, Goulding also contributed guest vocals on
      the song "Wonderman" for Tinie Tempah''s debut studio album "Disc-Overy" (2010).'
