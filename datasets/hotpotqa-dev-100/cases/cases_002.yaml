        as the Oilers or the Titans was in 2009 when they lost 59-0 to the New England
        Patriots.  It was the second time the Oilers had allowed 61 points to the
        Bengals, the other being a 61-17 loss at home in 1972. '
    - id: Keith Bostic (American football)
      content: William Keith Bostic (born January 17, 1961) is a former professional
