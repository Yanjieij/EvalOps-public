        by Paul Verhoeven, starring Arnold Schwarzenegger, Rachel Ticotin, Sharon
        Stone, Ronny Cox, and Michael Ironside.  The film is loosely based on the
        Philip K. Dick short story "We Can Remember It for You Wholesale".  It tells
        the story of a construction worker who is having troubling dreams about Mars
        and a mysterious woman there.  It was written by Ronald Shusett, Dan O'Bannon,
