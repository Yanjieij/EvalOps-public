        8-7 record and fail to reach the playoffs.  Noll was renowned as a stoic character,
        but in complete contrast was his reaction to Jerry Glanville, the head coach
        of the Oilers.  After the Steelers second meeting, Noll in the post game handshake
        grabbed Glanville and told him he'd better watch out or he'd get jumped on.  This
        was in reaction to Glanville's earlier comments on how the Oilers field was
        the 'house of pain' and his prediction that his players would intentionally
        hurt the Steelers.
