        by Rose McGowan as the long-lost younger half-sister Paige Matthews from the
        fourth season onwards.  The following list only contains characters that appeared
        in five or more episodes.'
    - id: Charmed
      content: Charmed is an American television series created by Constance M. Burge
        and produced by Aaron Spelling and his production company Spelling Television,
        with Brad Kern serving as showrunner.  The series was originally broadcast
        by The WB for eight seasons from October 7, 1998, until May 21, 2006.  The
        series narrative follows a trio of sisters, known as The Charmed Ones, the
        most powerful good witches of all time, who use their combined "Power of Three"
