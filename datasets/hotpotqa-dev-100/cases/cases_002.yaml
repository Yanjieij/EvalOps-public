    sources:
    - id: Charlotte Hornets all-time roster
      content: The Charlotte Hornets are an American professional basketball team
        based in Charlotte, North Carolina.  They play in the Southeast Division of
        the Eastern Conference in the National Basketball Association (NBA).  The
        Hornets were first established in 1988 as an expansion team, but relocated
        to New Orleans following the 2001–02 season.  In 2004, a new expansion team,
        the Charlotte Bobcats, was established.  After 10 seasons as the Bobcats,
        the team changed its name to the Charlotte Hornets for the 2014–15 season,
        a year after the New Orleans franchise relinquished the Hornets name and renamed
        itself the Pelicans.  In addition to re-inheriting the Hornets name from New
        Orleans, the Charlotte franchise reclaimed the history and records of the
        original 1988–2002 Hornets, effectively becoming a continuation of the original
        franchise.
    - id: List of Texas Tech Lady Raiders in the WNBA Draft
      content: 'The Texas Tech Lady Raiders basketball team, representing Texas Tech
        University, has had 9 players drafted into the Women''s National Basketball
        Association (WNBA) since the league began holding drafts in 1997.  Sheryl
        Swoopes was Texas Tech''s first player drafted in the WNBA, selected in the
        1997 Initial Player Allocation.  The Charlotte Sting had drafted three Lady
        Raiders, more than any other WNBA franchise: Michi Atkins, in the WNBA Elite
        Draft, and Angie Braziel and Jia Perkins during the college draft.'
    - id: 1992–93 Charlotte Hornets season
      content: The 1992–93 NBA season was the fifth season for the Charlotte Hornets
        in the National Basketball Association.  In the 1992 NBA draft, the Hornets
        selected center Alonzo Mourning out of Georgetown with the second overall
        pick.  With the addition of Mourning, along with second-year star Larry Johnson
        and Muggsy Bogues, the Hornets struggled around .500 for most of the season,
        but won 9 of their final 12 games finishing their season third in the Central
        Division with a 44–38 record, and qualified for their first ever playoff appearance.  The
        team became the first of the four expansion franchises of the late 1980s to
        win a playoff series, when Mourning sunk a 20 ft jumper at the buzzer in Game
        4 of the first round playoff series against the 4th-seeded Boston Celtics.  However,
        in the semifinals, the Hornets were eliminated by the New York Knicks in five
        games.
    - id: Charlotte Hornets draft history
      content: The original Charlotte Hornets of the National Basketball Association
        (NBA) were established in 1988 as an expansion team, based in Charlotte, North
        Carolina.  The team's roster was filled with unprotected players at the 1988
        NBA Expansion Draft, and five days later the Hornets made their first picks
        out of college players at the 1988 NBA draft.  The Hornets remained in Charlotte
        for 14 seasons before relocating to New Orleans in 2002.  Two years after
        the Hornets' departure, the Charlotte Bobcats were established in 2004.  The
        Bobcats first participated in the 2004 NBA draft, two days after their expansion
        draft was held.  The franchise's name was changed back to the Hornets at the
        conclusion of the 2013–14 season, one year after the team in Louisiana renamed
        itself the New Orleans Pelicans.  The history and records of the original
        Charlotte Hornets were conveyed to the newly named Charlotte Hornets.
    - id: Ayana Walker
      content: Ayana D’Nay Walker (born September 10, 1979) is an American former
        women's basketball player.  She played for the Louisiana Tech Lady Techsters
        basketball team from 1998 to 2002.  Walker was a member of gold-medal winning
        USA Basketball Women’s National Team in 2001 and set a USA single-game record
        with 19 rebounds in gold-medal game.  She was also a member of gold-medal
        winning USA Basketball World University Games Team in 2001.  Walker was drafted
        as the 20th overall pick by the Detroit Shock in the 2002 WNBA Draft.  As
        a member of the Shock, she won the 2003 WNBA Championship.  On July 3, 2005,
        Walker signed with the Charlotte Sting.  After the Sting franchise folded,
        Walker was drafted by Los Angeles Sparks as the 12th pick in the dispersal
        draft on January 8, 2007.  She returned to Detroit for her final season in
        2007.
    - id: 2003 WNBA season
      content: The 2003 WNBA Season was the Women's National Basketball Association's
        seventh season.  It was first season in which teams either folded or relocated,
        as well as the first to have teams that were not co-owned with NBA teams.  The
        Orlando Miracle relocated to Connecticut and became the Connecticut Sun, the
        Utah Starzz relocated to San Antonio, Texas and became the San Antonio Silver
        Stars.  Meanwhile, both the Miami Sol and the Portland Fire folded, while
        the Charlotte Sting became the second WNBA team without a brother NBA team.  The
        schedule increased from 32 games per team to 34, where it stands to this day.  The
        season ended with the Detroit Shock winning their first WNBA Championship.
    - id: List of Charlotte Hornets seasons
      content: The Charlotte Hornets are a professional basketball club based in Charlotte,
        North Carolina.  They are members of the National Basketball Association (NBA),
        playing in the Southeast Division of the Eastern Conference.  The original
        Charlotte Hornets franchise played in Charlotte from 1988–2002 before relocating
        to New Orleans, Louisiana and becoming the New Orleans Hornets.  A new franchise,
        the "Charlotte Bobcats", began play in the 2004–05 season.  The team played
        for ten seasons as the Bobcats before adopting the Hornets name for the 2014–15
        season.  The Hornets name was left available after the New Orleans Hornets
        became the New Orleans Pelicans.  As part of a deal between the Bobcats, Hornets
        and NBA, the renamed Hornets reclaimed the original Hornets' history and records
        from 1988 to 2002, while all of the Hornets' records from 2002 to 2013 remained
        with the Pelicans.  As a result, the Hornets are now reckoned as having suspended
        operations after the 2001–02 season before returning as the Bobcats in 2004;
        This has allowed all of Charlotte's NBA history to be recognized under one
        single franchise.
    - id: Charlotte Hornets
      content: The Charlotte Hornets are an American professional basketball team
        based in Charlotte, North Carolina.  The Hornets compete in the National Basketball
        Association (NBA), as a member of the league's Eastern Conference Southeast
        Division.  The team is largely owned by former NBA player and North Carolina
        native Michael Jordan, who acquired controlling interest in the team in 2010.  The
        Hornets play their home games at the Spectrum Center in Uptown Charlotte.
    - id: Muggsy Bogues
      content: Tyrone Curtis "Muggsy" Bogues (born January 9, 1965) is an American
        retired basketball player.  The shortest player ever to play in the National
        Basketball Association, the 5 ft Bogues played point guard for four teams
        during his 14-season career in the NBA.  He is best known for his ten seasons
        with the Charlotte Hornets, and also played for the Washington Bullets, Golden
        State Warriors, and Toronto Raptors.  After his NBA career, he served as head
        coach of the now-defunct WNBA team Charlotte Sting.
    - id: 2014–15 Charlotte Hornets season
      content: The 2014–15 Charlotte Hornets season was the franchise's 25th season
        in the National Basketball Association (NBA).  This was the team's first year
        as the Charlotte Hornets since 2002.  The team had been known as the Charlotte
        Bobcats since its revival in 2004.  However, when the team formally changed
        its name to the Hornets on May 20, 2014; they also reclaimed the history and
        records of the original Charlotte Hornets franchise from the 1988–89 NBA season
        through the 2001–02 NBA season.  The New Orleans Pelicans retained the remaining
        history that exists under the New Orleans(/Oklahoma City) Hornets name from
        the 2002–03 NBA season through the 2012–13 NBA season.  The team was led by
        head coach Steve Clifford and assistant coaches Patrick Ewing, Bob Beyer,
        Stephen Silas, Bob Weiss, and Mark Price.
