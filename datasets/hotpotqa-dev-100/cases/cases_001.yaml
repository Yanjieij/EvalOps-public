    - id: St. Andre (Goa Assembly constituency)
      content: St. Andre Vidhan Sabha Constituency is one of the 40 Goa Legislative
        Assembly constituencies of the state of Goa in southern India.  St. Andre
        is also one of the 20 constituencies falling under the North Goa Lok Sabha
        constituency.
    - id: Tunnels &amp; Trolls
      content: Tunnels & Trolls (abbreviated "T&T") is a fantasy role-playing game
        designed by Ken St. Andre and first published in 1975 by Flying Buffalo.  The
        second modern role-playing game published, it was written by Ken St. Andre
        to be a more accessible alternative to "Dungeons & Dragons" and is suitable
        for solitaire, group, and play-by-mail gameplay.
    - id: St. Andre's Parish
      content: St. Andre's Parish is a former parish of the Roman Catholic Diocese
        of Portland, located Biddeford, Maine.  The parish was founded in 1860 to
        serve the city's large French-Canadian and French-American communities.  On
        July 1, 2008, St. Andres was merged into the newly formed Good Shepherd Parish,
        made up of Saint Joseph's Church in Biddeford, Saint Mary's Church in Biddeford,
        Most Holy Trinity Church in Saco, Notre Dame Church in Saco, Saint Margaret's
        Church in Old Orchard Beach, Saint Lukes in Old Orchard Beach, Saint Brendan's
        in Biddeford Pool,and St. Phillip's Church in Lyman.  Of those 8 Churches,
        only Saint Joseph, Most Holy Trinity, Saint Margaret, and Saint Philip remain
        open.  (St. Brendan's has always, and continues to serve as a summer chapel.)  The
        parish complex of four buildings, including the church, rectory, convent,
        and school, was listed on the National Register of Historic Places in 2015,
        at which time most of it stood vacant.
    - id: Jon St. Andre
      content: Jon St. Andre (born December 8, 1939 in Ishpeming, Michigan) is an
        American former ski jumper who competed in the 1960 Winter Olympics.
    - id: Ken St. Andre
      content: Kenneth Eugene St. Andre (born on April 28, 1947 in Ogden, Utah) is
        an American fantasy author and game designer, best known for his work with
        "Tunnels & Trolls" and "Wasteland".  He has been an active member of "The
        Science Fiction and Fantasy Writers of America" since 1989.
    - id: Mercenaries, Spies and Private Eyes
      content: Mercenaries, Spies and Private Eyes ("MSPE") is a tabletop role-playing
        game designed and written by Michael A. Stackpole and first published in April
        1983 by Blade, a division of Flying Buffalo, Inc.  A second edition was later
        published by Sleuth Publications, but Flying Buffalo continues to distribute
        the game.  "MSPE"'s mechanics are based on those of "Tunnels and Trolls",
        with the addition of a skill system for characters.  A few adventure modules
        were also released for "MSPE".  The ruleset of 1987 video game "Wasteland",
        on which Michael A. Stackpole worked, is based on "MSPE"; as the upcoming
        2013 sequel "Wasteland 2" will use similar mechanics, so it too can be seen
        as based on MSPE.
    - id: Starfaring
      content: Starfaring is a science fiction role-playing game created by Ken St.
        Andre and published by Flying Buffalo in August 1976.
    - id: Crank Caverns
      content: Crank Caverns is the common name of the remains of the Rainford Delph
        Quarry near Crank in St. Helens, Merseyside.  It is a network of underground
        tunnels and caverns, as well as an extensive woodland.  Information in the
        St. Helens local history archives states that sandstone quarrying began here
        as early as 1730.  As the quarry expanded, the cost of purchasing land to
        open cast mine it increased, so it was decided to opt for a different method.  Instead
        of quarrying out the stone, they would mine it out, following a seam of stone
        until it ran out.  This resulted in the network of caves, tunnels and shafts
        we see today.  Rainford Delph is listed as a Colliery by 1854, under the ownership
        of Charles Howarth or Yorkshire Charlie as he was known locally by 1880.  Mining
        finally ceased and the woods and caverns were used as a game reserve by the
        Earl of Derby until 1939, when they became a storage facility for ammunition
        for the anti-aircraft position at Crank.  After the war, the caverns ceased
        use as a game reserve.  Today, Crank Caverns are not officially open to the
        public and due to their increasing instability, attempts have been made to
        close access to the caverns and tunnels themselves.  Despite this, the site
        is still physically accessible from a nearby public footpath and is still
        a draw for generations of curious locals who wish to explore, many having
        heard the numerous local myths and legends from an early age.
