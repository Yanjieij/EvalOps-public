    sources:
    - id: 2012–13 VCU Rams men's basketball team
      content: The 2012–13 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2012–13 NCAA Division I men's basketball season.  It
        was the 45th season of the University fielding a men's basketball program.  Led
        by fourth-year head coach Shaka Smart, they played their home games at the
        Stuart C. Siegel Center.  This was the Rams inaugural season in the Atlantic
        10 Conference (A10), after spending the past 17 years in the Colonial Athletic
        Association (CAA).  They finished the season 27–9, 12–4 in A10 play to finish
        in second place.  They advanced to the championship game of the 2013 Atlantic
        10 Tournament where they lost to Saint Louis.  They received an at-large bid
        to the 2013 NCAA Tournament, their third straight NCAA Tournament appearance,
        where they defeated Akron in the first round before losing in the third round
        to Michigan.
    - id: 2009–10 VCU Rams men's basketball team
      content: The 2009–10 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2009–10 college basketball season.  This was head coach
        Shaka Smart's first season at VCU.  The Rams compete in the Colonial Athletic
        Association and played their home games at Stuart C. Siegel Center.  They
        finished the season 27–9, 11–7 in CAA play and lost in the semifinals of the
        2010 CAA Men's Basketball Tournament.  They were champions of the 2010 College
        Basketball Invitational.
    - id: 1995–96 VCU Rams men's basketball team
      content: The 1995–96 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 1995–96 NCAA Division I men's basketball season.  It
        was the 28th season of the University fielding a men's basketball program,
        and the program's first season in the Colonial Athletic Association, after
        previously playing in the Metro Conference.  The Rams were coached by 7th
        year head coach, Sonny Smith.
    - id: Virginia Commonwealth University
      content: Virginia Commonwealth University (VCU) is a public research university
        located in Richmond, Virginia.  VCU was founded in 1838 as the medical department
        of Hampden–Sydney College, becoming the Medical College of Virginia in 1854.  In
        1968, the Virginia General Assembly merged MCV with the Richmond Professional
        Institute, founded in 1917, to create Virginia Commonwealth University.  In
        2015, more than 31,000 students pursue 226 degree and certificate programs
        through VCU's 13 schools and one college.  The VCU Health System supports
        the university's health care education, research and patient care mission.
    - id: 2013–14 VCU Rams men's basketball team
      content: The 2013–14 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2013–14 NCAA Division I men's basketball season.  It
        was the 46th season of the University fielding a men's basketball program.  Led
        by fifth-year head coach Shaka Smart, they played their home games at the
        Stuart C. Siegel Center.  It was the second season for the Rams playing in
        the Atlantic 10 Conference.  They finished the season 26–9, 12–4 in A-10 play
        to finish in second place.  They advanced to the championship game of the
        A-10 Tournament where they lost to Saint Joseph's.  They received an at-large
        bid to the NCAA Tournament where they lost in the second round to Stephen
        F. Austin.
    - id: 2011–12 VCU Rams men's basketball team
      content: The 2011–12 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2011–12 NCAA Division I men's basketball season.  It
        was the 44th season of the University fielding a men's basketball program.  Led
        by third-year head coach Shaka Smart, the Rams were coming off a season marked
        by a run to the Final Four.  Expected to finish lower in the CAA regular season
        standings, the Rams finished as regular season runners-up with a 15–3 conference
        record, before winning the 2012 CAA Men's Basketball Championship against
        Drexel, 59–56, earning their 11th ever berth into the NCAA Tournament.  It
        was also the first season since 1984–85 that the Rams consecutively qualified
        for the NCAA Tournament.
    - id: 2010–11 VCU Rams men's basketball team
      content: The 2010–11 VCU Rams men's basketball team represented Virginia Commonwealth
        University in the Colonial Athletic Association conference during the 2010–11
        NCAA Division I men's basketball season.  The Rams, led by second year head
        coach Shaka Smart, played their home games at the Stuart C. Siegel Center.  They
        finished the season 28–12, 12–6 in CAA play and lost in the championship game
        of the 2011 CAA Men's Basketball Tournament to Old Dominion.  They received
        an at-large bid in the 2011 NCAA Men's Division I Basketball Tournament where
        they played in the new "First Four" round, defeating Southern California.  They
        defeated Georgetown and Purdue in the second and third rounds, respectively,
        to advance to the "Sweet Sixteen".  The defeated Florida State to advance
        to the "Elite Eight" where they defeated Kansas.  They advanced to the school's
        first ever "Final Four", being just the third 11 seed in Tournament history
        to advance to the "Final Four", where they were defeated by Butler.  The VCU
        Rams finished 6th in the ESPN/USA Today Coaches Poll at the end of the season.  This
        was the highest ranking in VCU's history and the highest ranking of any team
        from the CAA.  The 2011 NCAA tournament run by VCU is regarded as one of the
        best Cinderella runs of all time.  To date, they are the only men's Division
        I basketball team whose NCAA tournament journey ran from The First Four to
        the Final Four.  They are also the only team in the tournament to win five
        games, and not qualify for the national championship game.
    - id: 2015–16 VCU Rams men's basketball team
      content: The 2015–16 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2015–16 NCAA Division I men's basketball season.  It
        was the 48th season of the University fielding a men's basketball program.  The
        program was led by Will Wade, who was leading the program for his first season
        after previously coaching Chattanooga.  Wade replaced former head coach, Shaka
        Smart, who resigned from VCU for the vacancy at Texas.
    - id: 2014–15 VCU Rams men's basketball team
      content: The 2014–15 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2014–15 NCAA Division I men's basketball season.  It
        was the 47th season of the University fielding a men's basketball program.  Led
        by sixth-year head coach Shaka Smart, they continued to play their home games
        at the Stuart C. Siegel Center.  They were a member of the Atlantic 10 Conference.  They
        finished the season 26–10, 12–6 in A-10 play to finish in a tie for fourth
        place.  They defeated Fordham, Richmond, Davidson, and Dayton to become champions
        of the Atlantic 10 Tournament.  They received an automatic bid to the NCAA
        Tournament where they lost in the second round to Ohio State.
    - id: 2004–05 VCU Rams men's basketball team
      content: The 2004–05 VCU Rams men's basketball team represented Virginia Commonwealth
        University during the 2004–05 NCAA Division I men's basketball season.  It
        was the 37th season of the University fielding a men's basketball program.  Led
        by third-year head coach Jeff Capel III, they continued to play their home
        games at the Stuart C. Siegel Center.  They were a member of the Atlantic
        10 Conference.  They finished the season 19–13, 13–5 in CAA play to finish
        in a tie for second place.  The Rams defeated Delaware and UNC Wilmington
        in the CAA Tournmanet, before losing to Old Dominion in the final.  They received
        an at-large bid to the NIT where they lost in the opening round to Davidson.
