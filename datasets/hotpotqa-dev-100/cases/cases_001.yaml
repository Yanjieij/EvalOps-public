    - id: Lead programmer
      content: A lead programmer is a software engineer in charge of one or more software
        projects.  Alternative titles include "development lead", "technical lead",
        "lead software engineer", "software design engineer lead" (SDE lead), "software
        development manager", "software manager", or "lead application developer".  When
        primarily contributing in a high-level enterprise software design role, the
        title "software architect" (or similar) is often used.
    - id: Sachin Bansal
      content: Sachin Bansal (born 5 August 1981) is an Indian Software engineer and
        Internet entrepreneur known for co-founding India's e-commerce platform Flipkart.  Sachin
        is from Chandigarh and is an engineering graduate from Indian Institute of
        Technology Delhi.
    - id: William Connolley
      content: William Michael Connolley (born 12 April 1964) is a British software
        engineer, writer, and blogger on climatology.  Until December 2007 he was
        Senior Scientific Officer in the Physical Sciences Division in the Antarctic
        Climate and the Earth System project at the British Antarctic Survey, where
        he worked as a climate modeller.  After this he became a software engineer
        for Cambridge Silicon Radio.
    - id: Wes McKinney
      content: Wes McKinney is an American statistician, data scientist and businessman.  He
        was the CEO and founder of technology startup Datapad.  He is the main author
        of the open-source Pandas package for data analysis in the Python programming
        language, and has also written the textbook "Python for Data Analysis" on
        the topic.  He worked as a software engineer for Cloudera following their
        acquisition of Datapad in 2014.  He is now a software engineer at Two Sigma
        Investments.
