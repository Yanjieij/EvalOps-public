    sources:
    - id: All I Wanna Do Is Make Love to You
      content: '"All I Wanna Do Is Make Love to You" is a song by the rock band Heart.  It
        was composed by veteran songwriter and producer Robert John "Mutt" Lange and
        released as the lead single from the band''s tenth studio album, "Brigade",
        as well as their first hit single of the 1990s.  The song was first recorded
        as "All I Want to Do Is Make Love to You" by Dobie Gray in 1979, though with
        different lyrics.'
    - id: Be the One (Poison song)
      content: '"Be the One" is a power ballad by American rock band Poison.  The
        song was released as the second single from their 2000 "Crack a Smile...and
        More! " album.  The single/sampler was released in February 2000 and featured
        five b-sides including the first single from the album "Shut Up, Make Love"
        and the four unplugged bonus tracks from the album: "Every Rose Has Its Thorn",
        "Talk Dirty to Me", "Your Mama Don''t Dance" and "Something to Believe In".'
    - id: Make Love
      content: '"Make Love" is a song performed by American recording artist and songwriter
        Keri Hilson.  It was written by Jamal "Polow da Don" Jones, Ester Dean and
        Jason Perry, and produced by Polow da Don and Perry for Hilson''s debut studio
        album, "In a Perfect World..." (2009).  The song was sent for urban adult
        contemporary airplay on June 23, 2009 as the fifth single from the album.  Musically,
        "Make Love" is a downtempo R&B ballad.  The song received mixed reviews from
        music critics; some of them criticized its long length and Hilson''s vocals,
        while others named it one of the album''s standouts.'
    - id: Make Love Not War (album)
      content: Make Love Not War is the 2004 debut album by Australian alternative
        rock band Cosmic Nomads recorded in Sydney, New South Wales at Damien Gerard
        Studios.  Cosmic Nomads worked with renowned engineer Russell Pilling who,
        with 25 years experience, has recorded The Vines, The Church (band), The Cruel
        Sea (band) and Jon Stevens.  A single and music video of the same name were
        released and distributed by MGM Sydney prior to the album release.  Pilling
        said "Make Love Not War" "is a grower, once you listen to it a few times you
        begin to appreciate what it means".
    - id: Greatest Hits (Dan Fogelberg album)
      content: 'Greatest Hits is a compilation album by American recording artist
