      his deputy on the Revolutionary Military Council, where he served with distinction
      during the Russian Civil War (1918-1920) and helped improve the fighting condition
      of the Red Army—Trotsky called him the Carnot of the Russian Revolution.  In
      1924 his position as Trotsky''s deputy was taken over by Grigory Zinoviev''s
      ally Mikhail Frunze.  Instead, he was made chairman of the Mossukno state textile
      trust, and the following May he left on a tour of Germany, France, and the United
      States to acquire technical information.  On August 27, 1925 he died in a boating
      accident on Long Lake (New York) along with , the first head of Amtorg Trading
      Corporation.  The high-ranking Soviet defector Boris Bazhanov was convinced
      that Sklyansky had been drowned on Stalin''s orders, and the alleged accident
      had been organized by and Genrikh Yagoda.


      [World Summit of Nobel Peace Laureates] The World Summit of Nobel Peace Laureates
      was initiated by Mikhail Gorbachev in the 90s, as a forum in which the Nobel
      Peace Laureates and the Peace Laureate Organizations could come together to
      address global issues with a view to encourage and support peace and human well
      being in the world.  Its Permanent Secretariat is an independent, non-profit,
      ECOSOC non-governmental organization, based in Rome, operating on a permanent
      basis.  A permanent staff, mainly composed of volunteers, promotes the work
      of the Nobel Peace Prize Winners and organizes the World Summit of Nobel Peace
      Laureates on a yearly basis.  To date, the Permanent Secretariat has organized
      16 Summits, the most recent having been held in February 2017 in the city of
      Bogota, Colombia.  This was the first time that the Summit took place in Latin
      America.


      [Anastas Mikoyan] Anastas Ivanovich Mikoyan ; 25 November 1895 – 21 October
      1978) was an Old Bolshevik and Soviet statesman during the mandates of Lenin,
      Stalin, Khrushchev, and Brezhnev.  He was the only Soviet politician who managed
      to remain at the highest levels of power within the Communist Party of the Soviet
      Union, as that power oscillated between the Central Committee and the Politburo,
      from the latter days of Lenin''s rule, throughout the eras of Stalin and Khrushchev,
      until his peaceful retirement after the first months of Brezhnev''s rule.


      [Mikhail Gorbachev] Mikhail Sergeyevich Gorbachev, ( ; Russian: Михаи́л Серге́евич
      Горбачёв ; ] ; born 2 March 1931) is a former Soviet statesman.  He was the
      eighth and last leader of the Soviet Union, having been General Secretary of
      the Communist Party of the Soviet Union from 1985 until 1991.  He was the country''s
      head of state from 1988 until 1991 (titled as Chairman of the Presidium of the
      Supreme Soviet from 1988 to 1989, as Chairman of the from 1989 to 1990, and
      as Soviet Union]] from 1990 to 1991).


      [David Waksberg] David Jonathan Waksberg, born December 14, 1956 in New York
      City, was a leading activist in the Soviet Jewry Movement during the 1980s and
      early 1990s.  In the 1970s he became involved in the Student Struggle for Soviet
      Jewry.  In the early 1980s he moved to California and began working for the
      Bay Area Council for Soviet Jews, first as Assistant Director, and later as
      Executive Director.  He initiated public and political activities on behalf
      of Soviet Jewry, supervised research and monitoring of their welfare and coordinated
      financial, medical and legal aid to Refuseniks and Prisoners of Conscience trapped
      in the Soviet Union.  He organized numerous protest demonstrations and vigils
      to raise public awareness of the plight of Jews in the USSR.  In 1985 Waksberg
      became National Vice-President of BACSJ''s umbrella organization, the Union
      of Councils for Soviet Jews.  Waksberg frequently visited Jewish communities
      the Soviet Union and the Former Soviet states and coordinated briefings of the
      American travelers interested in visiting those communities.  In 1990 Waksberg
      took on the role of Director of the Center for Jewish Renewal, newly established
      by UCSJ.  The mission of the CJR was to promote the renewal and development
      of Jewish life in the USSR and the emigration rights, human rights and resettlement
      needs of Jews in the Former Soviet Union.  The CJR established a network of
      human rights and emigration bureaus in major cities of the former Soviet Union.  In
      mid-1990s Waksberg was a member of Bay Area Council''s Board of Directors and
      served as Director of Development and Communication of the UCSJ.  Since 2007
      Waksberg serves as Executive Director of the Bureau of Jewish Education of San
      Francisco.


      [Sergo Mikoyan] Sergo Anastasi Mikoyan (Armenian: Սերգո Անաստասի Միկոյան ; Russian:
      Сергo Анаста́сович Микоян ; June 5, 1929 – March 7, 2010) was one of the Soviet
      Union''s leading historians who specialized on the foreign policies of the Soviet
      Union and the United States in Latin America.  He was the son of Anastas Mikoyan,
      an Old Bolshevik and high level Soviet statesman and adviser to Soviet leader
      Nikita Khrushchev.'
