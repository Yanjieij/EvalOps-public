      artist and theorist Jean Metzinger (1883–1956); considered by Guillaume Apollinaire
      and André Salmon as a founder of Cubism, along with Georges Braque and Pablo
      Picasso.  "L''Oiseau bleu", one of Metzinger''s most recognizable and frequently
      referenced works, was first exhibited in Paris at the Salon des Indépendants
      in the spring of 1913 (n. 2087), several months after the publication of the
      first (and only) Cubist manifesto, "Du «Cubisme»", written by Jean Metzinger
      and Albert Gleizes (1912).  It was subsequently exhibited at the 1913 in Berlin
      (titled "Der blaue Vogel", n. 287).  Apollinaire described "L''Oiseau bleu"
      as a ''very brilliant painting'' and ''his most important work to date''.  "L''Oiseau
      bleu", acquired by the City of Paris in 1937, forms part of the permanent collection
      at the Musée d''Art Moderne de la Ville de Paris.


      [Levasseur PL.8] The Levasseur PL.8 was a single engine, two-seat long-distance
      record-breaking biplane aircraft modified from an existing Levasseur PL.4 carrier-based
      reconnaissance aircraft produced in France in the 1920s.  Levasseur built the
      aircraft in 1927, specifically for pilots Charles Nungesser and François Coli
      for a transatlantic attempt to win the Orteig Prize.  Only two examples of the
      type were built, with the first PL.8-01 named "L''Oiseau Blanc" (The White Bird),
      that gained fame as Nungesser and Coli''s aircraft.


      [Paul Sauvage (aviator)] Sergent Paul Joannes Sauvage was a French World War
      I flying ace credited with eight confirmed and six unconfirmed aerial victories.  He
      was originally posted to fly a Nieuport for Escadrille 65, and scored his first
      victory with them on 16 July 1916.  He became the youngest French ace on 2 October,
      and held that distinction until his death by anti-aircraft fire on January 7,
      1917.


      [Wooster and Davis] Wooster and Davis-- Lieutenant Stanton Hall Wooster (April
      1, 1895 Connecticut - April 26, 1927) and Lieutenant Commander Noel Guy Davis
      (December 25, 1891 Salt Lake City, Utah - April 26, 1927) were two United States
      Navy (USN) airmen who made an attempt to fly the Atlantic Ocean from New York-to-Paris
      in the spring of 1927.  The men were trying to win the $25,000 dollar Orteig
      Prize offered by New York hotelier Raymond Orteig for the first nonstop flight
      between New York and Paris.  Competitors for the prize were French World War
      One ace Rene Fonck and his crew of three, USN Commander Richard Evelyn Byrd,
      Clarence Chamberlain and a young airmail pilot named Charles Lindbergh.  On
      the Paris side of the Atlantic their competitors were another World War One
      French ace, Charles Nungesser, and his navigator Francois Coli.


      [L''Oiseau Blanc] L''Oiseau Blanc (commonly known in the English-speaking world
      as The White Bird ) was a French Levasseur PL.8 biplane that disappeared in
      1927, during an attempt to make the first non-stop transatlantic flight between
      Paris and New York City to compete for the Orteig Prize.  The aircraft was flown
      by French World War I aviation heroes, Charles Nungesser and François Coli.  The
      aircraft took off from Paris on 8 May 1927 and was last seen over Ireland.  Less
      than two weeks later, Charles Lindbergh successfully made the New York–Paris
      journey and claimed the prize, flying the "Spirit of St. Louis".'
