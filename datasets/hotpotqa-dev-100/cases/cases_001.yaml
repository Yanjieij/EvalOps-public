  input:
    query: The Livesey Hal War Memorial commemorates the fallen of which war, that
      had over 60 million casualties?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: World War II
    aliases: []
    source_ids:
    - Livesey Hall War Memorial
    - World War II casualties
    supporting_sentences:
    - title: Livesey Hall War Memorial
      sentence: The Livesey Hall War Memorial commemorates the fallen of World War
        I and World War II who had been employed by the South Suburban Gas Company
        of London.
    - title: World War II casualties
      sentence: ' Over 60 million people were killed, which was about 3% of the 1940
        world population (est. 2.3 billion).'
    sources:
    - id: Livesey Hall War Memorial
      content: The Livesey Hall War Memorial commemorates the fallen of World War
        I and World War II who had been employed by the South Suburban Gas Company
        of London.  It is also a tribute to those employees who served in the wars.  The
        monument was designed and executed by British sculptor Sydney March, of the
        March family of artists.
    - id: Alamein Memorial
      content: The Alamein Memorial is a Commonwealth War Graves Commission war memorial
        in the El Alamein War Cemetery, El Alamein, Egypt.  The memorial commemorates
        11,866 Commonwealth forces members who died during World War II.  The memorial
        was designed by Hubert Worthington and unveiled by Viscount Montgomery of
        Alamein on 24 October 1954.
    - id: Rainham War Memorial
      content: The Rainham War Memorial commemorates soldiers killed in both World
        Wars as well as civilian casualties of World War II.
    - id: Portsmouth Naval Memorial
      content: The Portsmouth Naval Memorial, sometimes known as Southsea Naval Memorial,
        is a war memorial in Portsmouth, Hampshire, England, on Southsea Common beside
        Clarence Esplanade, between Clarence Pier and Southsea Castle.  The memorial
        commemorates approximately 25,000 British and Commonwealth sailors who were
        lost in the World Wars, around 10,000 sailors in the First World War and 15,000
        in the Second World War.  The memorial features a central obelisk, with names
        of the dead on bronze plaques arranged around the memorial according to the
        year of death.
    - id: Freetown Memorial
      content: The Freetown Memorial is a Commonwealth War Graves Commission war memorial
        located outside the Secretariate Building in Freetown, Sierra Leone.  The
        memorial generally commemorates Soldiers from Sierra Leone who died whilst
        serving with the Royal West African Frontier Force in West Africa and whose
        graves are not known.  The Freetown Memorial commemorates 1,109 First World
        War casualties and 247 from the Second World War.
    - id: Vietnam War Memorial, Hanoi
      content: The War Memorial in Hanoi is located across the Ba Dinh Square, across
        the Ho Chi Minh Mausoleum and close to Hanoi Citadel.  Constructed in 1993
        in a fusion of traditional Vietnamese and modernist architecture, the memorial
        commemorates men and women who sacrificed themselves during the Second Indochina
        War.  The war is known by many names, e.g. as the American War in Vietnam.  The
        memorial is a focal point for state functions, commemorating the war dead.
    - id: Tower Hill Memorial
      content: The Tower Hill Memorial is a Commonwealth War Graves Commission war
        memorial on the south side of Trinity Square Gardens, in London, England.  The
        memorial commemorates those from the Merchant Navy and fishing fleets who
        died during both world wars and have "no grave but the sea".  The memorial
        was designed by Edwin Lutyens with sculpture work by William Reid Dick, the
        Second World War extension was designed by Edward Maufe with sculpture work
        by Charles Wheeler.
    - id: Arras Flying Services Memorial
      content: The Arras Flying Services Memorial Commonwealth War Graves Commission
        war memorial in the Faubourg d'Amiens Cemetery, Arras, France.  The memorial
        commemorates nearly 1,000 airmen from forces of the Commonwealth who were
        killed on the Western Front during World War I and who have no known grave.  The
        memorial was designed by Edwin Lutyens, sculpted by William Reid Dick and
        unveiled by Hugh Trenchard, 1st Viscount Trenchard, Marshal of the Royal Air
        Force on 31 July 1932.
    - id: Masnières Newfoundland Memorial
      content: The Masnières Newfoundland Memorial is a Dominion of Newfoundland war
        memorial that commemorates the actions of the Royal Newfoundland Regiment
        during the First Battle of Cambrai, of World War I.  Located at the north
        end of the town of Masnières, France, the memorial commemorates the participation
        of the Newfoundlanders in the taking and defense of the town during the First
        Battle of Cambrai between the 20th of November and 2 December 1917.
    - id: World War II casualties
      content: World War II was the deadliest military conflict in history in absolute
        terms of total casualties.  Over 60 million people were killed, which was
        about 3% of the 1940 world population (est. 2.3 billion).  The tables below
        give a detailed country-by-country count of human losses.  World War II fatality
        statistics vary, with estimates of total deaths ranging from 50 million to
        more than 80 million.  The higher figure of over 80 million includes deaths
        from war-related disease and famine.  Civilians killed totalled 50 to 55 million,
        including 19 to 28 million from war-related disease and famine.  Military
        deaths from all causes totalled 21 to 25 million, including deaths in captivity
        of about 5 million prisoners of war.
