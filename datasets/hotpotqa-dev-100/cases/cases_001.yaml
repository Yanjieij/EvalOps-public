    - id: Death of Abdul Wali
      content: Abdul Wali was an Afghan man who died in US custody on June 21, 2003
        at the age of 28.  At the time of his death, he had been held for three days
        at the US base 10 miles south of Asadabad, in Kunar Province, Afghanistan,
        on suspicion of involvement in a rocket attack on the same base.  The cause
        of his death was at first reported to be a heart attack, but this came into
        question when three members of the U.S. 82nd Airborne Division came forward
        to testify that CIA contractor David Passaro assaulted Wali.  Passaro, a former
        U.S. Army Ranger, allegedly beat Wali for two consecutive nights, causing
        grievous injuries including a fractured pelvis.  Prosecutors would charge
        that Passaro ordered soldiers not to allow Wali to sleep, limited his access
        to food and water and subjected him to two consecutive nights of interrogation
        and beatings.  Among other injuries, Wali suffered a suspected fractured pelvis
        that would have made it impossible for him to urinate.  Witnesses testified
        that during one session Passaro, while wearing combat boots, kicked Wali in
        the groin hard enough to lift him off the ground, threw Wali to the ground,
        beat Wali on the arms and legs with a heavy Maglite flashlight, and that Passaro
        also vigorously thrust a flashlight into Wali's abdomen.  After the second
        night of beatings, Wali begged the soldiers to kill him and moaned a phrase
        that meant, "I'm dying."  Wali died on his fourth day in custody.  He repeatedly
        denied any involvement in the rocket attacks.
