      content: James A. Shoulders (May 13, 1928 – June 20, 2007) was an American professional
        rodeo cowboy and rancher.  He is commemorated at the ProRodeo Hall of Fame
        and at the time of his death, was the most successful contestant in the Professional
        Rodeo Cowboys Association (PRCA).  Known as the 'Babe Ruth of rodeo', Shoulders
        was a spokesperson for a number of commercial products such as Miller Lite,
        Justin Boots and Wrangler Jeans.  He was born in Tulsa, Oklahoma and died
        in Henryetta, Oklahoma.  He was of English descent.
