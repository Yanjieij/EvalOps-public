      of TMS.  Lentz previously held several executive positions including Toyota
      division group vice president and general manager where he oversaw all sales,
      logistics and marketing activities for Toyota and Scion regional sales offices
      and distributors.  He also served as the group vice president of marketing for
      the Toyota division and vice president of Scion, and was responsible for the
      initial launch of a new line of vehicles.  Lentz spent several years in the
      field as vice president and general manager of the Los Angeles region and before
      that general manager of the San Francisco region.  Prior to his role as general
      manager Lentz was vice president of marketing services for CAT in Maryland.  He
