  input:
    query: A Japanese manga series based on a 16 year old high school student Ichitaka
      Seto, is written and illustrated by someone born in what year?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: '1962'
    aliases: []
    source_ids:
    - Masakazu Katsura
    - I&quot;s
    supporting_sentences:
    - title: Masakazu Katsura
      sentence: Masakazu Katsura (桂 正和 , Katsura Masakazu , born December 10, 1962)
        is a Japanese manga artist, known for several works of manga, including "Wing-man",
        "Shadow Lady", "DNA²", "Video Girl Ai", "I"s", and "Zetman".
    - title: I&quot;s
      sentence: ' The story''s main character is 16-year-old high school student Ichitaka
        Seto who is in love with his classmate Iori Yoshizuki, but too shy to tell
        her.'
    sources:
    - id: Manga Bible (series)
      content: 'Manga Bible (新約聖書 , Shinyaku Seisho ) is a five-volume manga series
        based on the Christian Bible created under the direction of the non-profit
        organization Next, a group formed by people from the manga industry.  Though
        first published in English, the books are originally written in Japanese and
        each volume is illustrated by a Japanese manga artist.  Each book is adapted
        from the Bible by Hidenori Kumai.  The first two books were illustrated by
        manga artist Kozumi Shinozawa, while the remaining three will be illustrated
        by a different artist.  The first book in the series, "Manga Messiah" was
        published in 2006 and covered the four gospels of the Bible: Matthew, Mark,
        Luke, and John.  "Manga Metamorphosis" (2008) covers the events in Acts and
        several of Paul''s letters.  "Manga Mutiny" (2008, 2009) begins in Genesis
        and ends in Exodus.  "Manga Melech" (2010) picks up where "Manga Mutiny" left
        off and continues into the reign of David.  The fifth, and currently final
        book, "Manga Messengers" (2011) addresses events starting with the reign of
        King Solomon and takes stories from several of the major and minor prophets,
        and the Book of Esther and concludes with anticipation of a messiah.'
    - id: Masakazu Katsura
      content: Masakazu Katsura (桂 正和 , Katsura Masakazu , born December 10, 1962)
        is a Japanese manga artist, known for several works of manga, including "Wing-man",
        "Shadow Lady", "DNA²", "Video Girl Ai", "I"s", and "Zetman".  He has also
        worked as character designer for "", "Tiger & Bunny" and "".
    - id: 'Neuro: Supernatural Detective'
      content: 'Neuro: Supernatural Detective, known in Japan as Majin Tantei Nōgami
        Neuro (Japanese: 魔人探偵 脳噛ネウロ , lit.  "Demon Detective Neuro Nōgami") , is a
        Japanese manga series written and illustrated by Yūsei Matsui.  The series
        follows Neuro Nōgami, a demon who depends on mysteries for sustenance.  Having
        consumed all the mysteries in the demon world, Neuro travels to the human
        world in search of more.  There, Neuro recruits high school student Yako Katsuragi
        as a facade for a detective agency.  The supernatural-themed manga was created
        because Matsui considered himself unable to draw humans.'
    - id: Haven't You Heard? I'm Sakamoto
      content: Haven't You Heard?  I'm Sakamoto (坂本ですが?  , Sakamoto desu ga?  , lit.  "I'm
        Sakamoto, You Know?")  is a Japanese manga series written and illustrated
        by Nami Sano.  The manga follows a high school student named Sakamoto, who
        has a reputation for being the "coolest" person among the entire student body.  The
        series has been licensed for an English release by Seven Seas Entertainment.  An
        anime television adaptation by Studio Deen aired between April 8, 2016 and
        July 1, 2016.
    - id: My Bride is a Mermaid
      content: 'My Bride Is a Mermaid (Japanese: 瀬戸の花嫁 , Hepburn: Seto no Hanayome
        , lit.  "The Inland Sea Bride") is a Japanese manga series written by Tahiko
        Kimura.  The manga was serialized between the September 2002 and May 2009
        issues of "Monthly Gangan Wing", and the June and December 2010 issues of
        "Monthly Gangan Joker", both published by Square Enix.  In 2004, a drama CD
        based on the series was released by Frontier Works.  A 26-episode anime television
        series adaptation animated by Gonzo and directed by Seiji Kishi aired in Japan
        on TV Tokyo between April and September 2007.  Two original video animation
        episodes were released in November 2008 and January 2009.  Odex, a Singaporean
        distributor, released it in English in Singapore as "Seto No Hana Yome".  The
        anime was licensed for a North American distribution by Funimation Entertainment
        and was released in 2010 under the title "My Bride Is a Mermaid!" .'
    - id: Clear Skies!
      content: 'Clear Skies!  (Japanese: 毎日晴天!  , Hepburn: Mainichi Seiten! )  is
        a Japanese manga series written by Akira Sugano and illustrated by Etsumi
        Ninomiya.  The manga is licensed in North America by Digital Manga Publishing
        under its Juné imprint, which released the first volume on 28 August 2008.  It''s
        about four brothers living together, when one of the brother''s old high school
        flame turns up and claims that he''s married to the brothers'' wild older
        sister, who is nowhere to be found, bringing his adopted son.'
    - id: Silver Spoon (manga)
      content: 'Silver Spoon (Japanese: 銀の匙 , Hepburn: Gin no Saji ) is a Japanese
        manga series written and illustrated by Hiromu Arakawa, set in the fictional
        Ooezo Agricultural High School in Hokkaido.  It depicts the daily life of
        Yuugo Hachiken, a high school student from Sapporo who enrolled at Ezo fleeing
        from the demands of his strict father.  However, he soon learns that life
        on an agricultural school is not as easy as he initially believed.  Unlike
        his new classmates, he has no intention of following an agricultural career
        after graduating, although he envies them for already having set goals for
        their lives and the pursuit of their dreams.'
    - id: The Prince of Tennis
      content: 'The Prince Of Tennis (Japanese: テニスの王子様 , Hepburn: Tenisu no Ōjisama
        ) is a Japanese manga series about a tennis prodigy written and illustrated
        by Takeshi Konomi.  The title is often shortened to Tenni-Pri (テニプリ ) , a
        portmanteau of the words "Tennis Prince".  The manga was first published in
        Japan in Shueisha''s "Weekly Shōnen Jump" in July 1999, and ended publication
        on March 3, 2008.  A total of 379 chapters were serialized, spanning 42 volumes.  As
        of volume 40, the manga has sold over 40 million copies in Japan.  News that
        a sequel to the manga series was going to be developed was announced in the
        December issue of the Japanese manga magazine "Jump Square".  The new manga
        series, entitled "New Prince of Tennis", began serialization in the "Jump
        Square" magazine on March 4, 2009, with the story taking place several months
        after the end of the original manga.  Viz Media acquired the license to distribute
        the series in English in North America.'
    - id: The Kindaichi Case Files
      content: 'The Kindaichi Case Files (Japanese: 金田一少年の事件簿 , Hepburn: Kindaichi
        Shōnen no Jikenbo ) is a Japanese mystery manga series based on the crime
        solving adventures of a high school student, Hajime Kindaichi, the supposed
        grandson of the famous (fictional) private detective Kosuke Kindaichi.  They
        are written by Yōzaburō Kanari or Seimaru Amagi (depending on series) and
        illustrated by Fumiya Satō.  The "Kindaichi series", which started serialization
        in "Weekly Shōnen Magazine" in 1992, is one of the earliest works in the mystery
        manga genre.  In 1995, the manga won the Kodansha Manga Award for shōnen.'
    - id: I&quot;s
      content: I"s (アイズ , Aizu ) is a Japanese manga series written and illustrated
        by Masakazu Katsura.  The story's main character is 16-year-old high school
        student Ichitaka Seto who is in love with his classmate Iori Yoshizuki, but
        too shy to tell her.  Again and again he plans to tell her his true feelings,
        but each time something (usually a misunderstanding of some kind) gets in
        the way.  Things become even more complicated when Itsuki Akiba returns to
        Japan; she is a girl Ichitaka was friends with in their childhood before she
        moved to the United States, and who had a huge crush on him.
