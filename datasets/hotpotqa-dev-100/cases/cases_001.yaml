      musicianship, as Bret Lunsford stated in an interview that, while recording
      album opener "Bewitched," his guitar string got stuck on a protruding screw
      and he continued to play through the song, hitting the string a bit harder until
      it became unstuck.


      [Gary Lee Conner] Gary Lee Conner (born Lee Gary Conner on August 22, 1962 in
      Fort Irwin, California, USA) was the lead guitarist for rock act Screaming Trees,
      along with his brother Van Conner, who was the band''s bassist.  Conner began
      his career with Screaming Trees in 1985 which lasted until their disbanding
      in 2000.  During that time he released two non-Tree albums: The Purple Outside-Mystery
      Lane (1990 New Alliance Records) with brother Patrick Conner on Drums and the
      single Grasshopper''s Daydream/Behind The Smile (1999 sub pop) this album also
      featured Josh Homme from Queens of the Stone Age.  Appearances on other artists
      material include, Beat Happening "Indian Summer" and "Midnight a Go-Go" from
      "Jamboree" as well as "Against the 70s" by Mike Watt from "Ball-Hog or Tugboat?
      " (1995 Columbia Records).  After ten years of seclusion he finally released
      a new album in 2010 from his band Microdot Gnome.  The album "4D Sugarcubes"
      was released on Moonbus International Recordings in April 2010 as was available
      on CD and MP3.  At the moment he is planning future releases from Microdot Gnome.  In
      August 2016, Conner released a long-awaited solo album, Ether Trippers, on Strange
      Earth Records.


      [Mad Season (band)] Mad Season was an American rock supergroup formed in Seattle,
      Washington in 1994 by members of three popular Seattle-based bands: Alice in
      Chains, Pearl Jam and Screaming Trees.  Mad Season released only one album,
      "Above", and is best known for the single "River of Deceit".  The band went
      on a semi-permanent hiatus in 1996 due to the band members'' conflicting schedules
      and vocalist Layne Staley''s problems with substance abuse.  Attempts were made
      in the late 1990s to revive the group without Staley; however, the band dissolved
      following the death of bassist John Baker Saunders in 1999.  Staley died three
      years later of a drug overdose.


      [Beat Happening/Screaming Trees] Beat Happening/Screaming Trees is an EP and
      a one-off collaboration between Beat Happening (from Olympia, Washington) and
      Screaming Trees (from Ellensburg, Washington).  Originally released on Homestead
      Records in 1988, it was later reissued as part of Beat Happening''s box set
      "Crashing Through" in 2002.  The journal of Kurt Cobain contains a draft of
      a letter sent to Mark Lanegan, in which he described "Polly Pereguin" as his
      favorite pop song of the 1980s.


      [Screaming Trees] Screaming Trees was an American rock band formed in Ellensburg,
      Washington in 1985 by vocalist Mark Lanegan, guitarist Gary Lee Conner, bass
      player Van Conner and drummer Mark Pickerel.  Pickerel had been replaced by
      Barrett Martin by the time the band reached its most successful period.  Although
      widely associated with grunge, the band''s sound incorporated hard rock and
      psychedelic elements.  During Screaming Trees'' existence the band released
      seven studio albums, five EPs, and three compilations.


      [Screaming Trees discography] The discography of Screaming Trees, an Ellensburg,
      Washington-based rock band, consists of seven studio albums, three compilation
      albums, five extended plays (EP), and six singles, though this does not include
      any solo material recorded by the individual members of Screaming Trees.


      [Van Conner] Van Conner (born March 17, 1967 in Apple Valley, California) is
      an American rock musician.  In 1984 he co-founded the band Screaming Trees with
      his brother Gary Lee Conner and close friends Mark Lanegan and Mark Pickerel.  On
      the 25 June 2000 Screaming Trees announced their official breakup.  Conner would
      start a low key band under the name Gardener which released its only album in
      the 1990s under the name "New Dawning Time".  Conner has also had brief appearances
      as a session musician with other known bands such as Queens of the Stone Age
      and helping Mark Lanegan on his solo album I''ll Take Care of You.'
