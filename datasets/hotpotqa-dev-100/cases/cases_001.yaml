  input:
    query: Who is the writer of this song that was inspired by words on a tombstone
      and was the first track on the box set Back to Mono?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: Phil Spector
    aliases: []
    source_ids:
    - Back to Mono (1958–1969)
    - To Know Him Is to Love Him
    supporting_sentences:
    - title: Back to Mono (1958–1969)
      sentence: 'Back to Mono (1958–1969) is a box set (4 compact discs or 5 vinyl
        LPs) compilation of the recorded work of record producer Phil Spector, through
        the 1960s, released in 1991 by ABKCO as #7118-2.'
    - title: Back to Mono (1958–1969)
      sentence: ' The first track, "To Know Him Is to Love Him," released in 1958,
        features Spector performing as part of the group the Teddy Bears.'
    - title: To Know Him Is to Love Him
      sentence: '"To Know Him Is to Love Him" is a song written by Phil Spector, inspired
        by words on his father''s tombstone, "To Know Him Was To Love Him."'
    sources:
    - id: Trash Box
      content: Trash Box is a 5-CD box set of mid-1960s garage rock and psychedelic
        rock recordings, primarily by American bands.  This box set is similar to
        the earlier "Pebbles Box" (a 5-LP box set) and includes almost all of the
        same recordings in that box set (and in the same order), along with numerous
        bonus tracks at the end of each disc.  Supposedly, "the Trash Box" collects
        the first five volumes of the CDs in the Pebbles series (i.e., those released
        by AIP Records, not to be confused with the 4 earlier CDs that were issued
        by ESD Records).  However, as is generally true of the CD reissues of these
        five volumes (though not nearly to the same extent), the tracks differ significantly
        on all five discs as compared to both the original Pebbles LPs and the later
        Pebbles CDs in the corresponding volumes; and the surf rock rarities on "Pebbles,
        Volume 4" have been eschewed entirely.  Overall, there are 109 tracks in the
        box set (excluding the introduction and ending cuts) as compared to 101 songs
        on the individual CDs and 72 tracks in the "Pebbles Box".  Although most of
        the recordings on "the Trash Box" were released at some point on one of the
        individual Pebbles albums, several of the songs have not appeared elsewhere
        in the Pebbles series.  Inexplicably, one of these songs is the well-known
        hit "I Fought the Law (but the Law Won)" by the Bobby Fuller Four (on Disc
        Four) – which is also included in the "Pebbles Box" – in place of the much
        rarer "Wine Wine Wine" by Bobby Fuller that appears on "Pebbles, Volume 2".
    - id: Chrome, Smoke &amp; BBQ
      content: Chrome, Smoke & BBQ is a box set by American blues-rock band ZZ Top,
        released in 2003.  At the time of release, this box set was notable for using
        the original mixes for all of the tracks from the band's first five albums
        for the first time on the CD format.  This box set, and the companion release
        "Rancho Texicano", were the only two CD releases which featured original mixes
        from "ZZ Top's First Album", "Rio Grande Mud", and "Tejas", aside from 1977's
        "The Best of ZZ Top" which features two tracks from "Rio Grande Mud" and one
        track from "First Album". " Tres Hombres" and "Fandango! " were reissued in
        their original mixes in 2006, and in 2013, Warner Brothers released the CD
        box set 'The Complete Studio Albums 1970-1990' which includes the first ten
        ZZ Top studio albums, all with the original mixes.
    - id: Back to Mono (1958–1969)
      content: 'Back to Mono (1958–1969) is a box set (4 compact discs or 5 vinyl
        LPs) compilation of the recorded work of record producer Phil Spector, through
        the 1960s, released in 1991 by ABKCO as #7118-2.  The first track, "To Know
        Him Is to Love Him," released in 1958, features Spector performing as part
        of the group the Teddy Bears.  Initially a vinyl album-sized package, the
        box contained a booklet with photographs, complete song lyrics, discographical
        information, and a reproduction of the essay on Spector by Tom Wolfe, "The
        First Tycoon of Teen."  The package also contained a small, round, red "Back
        to Mono" pin.'
    - id: Live in Japan (John Coltrane album)
      content: 'Live in Japan is a four-disc box set by American saxophonist John
        Coltrane and his last group, featuring the quintet of Coltrane, his wife/pianist
        Alice, saxophonist/bass clarinetist Pharoah Sanders, bassist Jimmy Garrison
        and drummer Rashied Ali.  The 4-CD set compiles all the music issued as three
        albums in the seventies by Impulse! ; "Concert In Japan" (1973, US 2-LP, electronically
        processed for compatible quadrophonic/stereo), "Coltrane In Japan" (1974,
        Japan 3-LP (side six is blank), mono) and "Second Night In Tokyo" (1976, Japan
        3-LP (side six contains an interview, mono).  (Some of this material was also
        reissued as two 2-LP sets in 1980 by MCA under the titles "Coltrane In Tokyo
        Vol.  1" and "Coltrane In Tokyo Vol.  2") The first CD issues were by Impulse!  Japan
        as two 2-CD sets: "Live In Japan Vol.  1" (same as "Coltrane In Japan") and
        "Live In Japan Vol.  2" (same as "Second Night In Tokyo").  The US 4-CD edition
        includes both of these volumes, with identical mastering from the original
        mono tapes.  The side six interview from "Second Night In Tokyo" has never
        been reissued on any CD edition.'
    - id: Nashville Rebel (box set)
      content: Nashville Rebel is a box set by Waylon Jennings, released on RCA Records
        through Legacy Recordings in 2006.  According to Allmusic's Stephen Thomas
        Erlewine, it is ""the first comprehensive, multi-label Waylon Jennings retrospective
        ever assembled", comprising ninety-two songs recorded between 1958 and 1994,
        with selections from the majority of the singer's recording career.  The first
        track of the box set is the Buddy Holly-produced "Jole Blon," released in
        1958, while the last is "I Do Believe," a song produced by Don Was that was
        included on The Highwaymen's 1995 release, "The Road Goes on Forever".  The
        other material on the box set covers Jennings' career chronologically, with
        songs ranging from his years on RCA's roster to later compositions from his
        short-lived stay at Epic Records; it ignores, however, the tracks from Jennings
        albums released on independent labels.  The majority of the singer's charting
        singles are included in the package, as are collaborations such as "Mamas
        Don't Let Your Babies Grow Up to Be Cowboys" with Willie Nelson and "Highwayman"
        with The Highwaymen.  A notable addition is the previously unreleased "The
        Greatest Cowboy of Them All," a 1978 duet with Johnny Cash which was later
        recorded by Cash alone for "A Believer Sings the Truth" (1979) and "The Mystery
        of Life" (1991); two others, "It's Sure Been Fun" and "People in Dallas Got
        Hair," had never been released in the United States.  "Nashville Rebel" was
        released on four CDs, with a 140-page booklet and liner notes by Rich Keinzle
        and Lenny Kaye.
