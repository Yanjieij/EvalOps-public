      completed his basic training at Fort Knox, Kentucky and Advanced Individual
      Training at Fort Lewis, Washington he was assigned to the 1st Battalion, 3rd
      Infantry Unit, "The Old Guard" at Arlington National Cemetery where he served
      for about two and one half years attaining the rank of Staff Sergeant, E-6 before
      taking an early release to return to Moravian College in September 1969.  While
      serving at Arlington, SSG Nyce participated in former President Dwight D. Eisenhower''s
      funeral, President Nixon''s Inauguration and Robert F. Kennedy''s Funeral.


      [President pro tempore of the United States Senate] The president pro tempore
      of the United States Senate ( or ), also president pro tem, is the second-highest-ranking
      official of the United States Senate.  of the United States Constitution provides
      that the Vice President of the United States is, despite not being a senator,
      the President of the Senate, and mandates that the Senate must choose a president
      "pro tempore" to act in the Vice President''s absence.  Unlike the vice president,
      the president pro tempore is an elected member of the Senate, able to speak
      or vote on any issue.  Selected by the Senate at large, the president pro tempore
      has enjoyed many privileges and some limited powers.  During the vice president''s
      absence, the president pro tempore is empowered to preside over Senate sessions.  In
      practice, neither the vice president nor the president pro tempore usually presides;
      instead, the duty of presiding officer is rotated among junior senators of the
      majority party to give them experience in parliamentary procedure.


      [Executive Order 10925] Executive Order 10925, signed by President John F. Kennedy
      on March 6, 1961, required government contractors to "take affirmative action
      to ensure that applicants are employed and that employees are treated during
      employment without regard to their race, creed, color, or national origin."  It
      established the President''s Committee on Equal Employment Opportunity (PCEEO),
      which was chaired by then Vice President Lyndon Johnson.  Vice Chair and Secretary
      of Labor Arthur Goldberg was in charge of the Committee''s operations.  This
      first implementation of Affirmative Action was meant to give equal opportunities
      in the workforce to all U.S. citizens, not to give special treatment to those
      discriminated against.


      [Gore-Chernomyrdin Commission] The Gore-Chernomyrdin Commission, or U.S.-Russian
      Joint Commission on Economic and Technological Cooperation, was a United States
      and Russian Joint Commission developed to increase cooperation between the two
      countries in several different areas.  The Commission was developed by the United
      States’ President Bill Clinton and Russian President Boris Yeltsin at a summit
      in Vancouver in April 1993.  Al Gore, the United States Vice President, and
      Victor Chernomyrdin, the Russian Prime Minister, were appointed as co-chairmen,
      and the committee derives its name from those two individuals.  Before his appointment
      to the Commission, Chernomyrdin oversaw the Soviet national oil industry as
      minister from 1985-1989.  After the fall of the Soviet Union, Chernomyrdin organized
      the Soviet oil industry into the Gazprom corporation.


      [Jim Lentz] Jim Lentz is the chief executive officer for Toyota North America;
      president and chief operating officer of Toyota Motor North America, Inc. (TMA);
      and a senior managing officer of the parent company Toyota Motor Corporation
      (TMC) which is located in Japan.  In that role Lentz manages all of Toyota’s
