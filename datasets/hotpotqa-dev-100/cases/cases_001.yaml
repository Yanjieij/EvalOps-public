      [Alfred Balk] Alfred Balk (July 24, 1930 – November 25, 2010) was an American
      reporter, nonfiction author and magazine editor who wrote groundbreaking articles
      about housing segregation, the Nation of Islam, the environment and Illinois
      politics.  His refusal to identify a confidential source led to a landmark court
      case.  During a career-long emphasis on media improvement, he served on the
