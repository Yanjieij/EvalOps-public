  input:
    query: Which British first-generation jet-powered medium bomber was used in the
      South West Pacific theatre of World War II?
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: English Electric Canberra
    aliases: []
    source_ids:
    - No. 2 Squadron RAAF
    - English Electric Canberra
    supporting_sentences:
    - title: No. 2 Squadron RAAF
      sentence: ' It saw action as a bomber unit in the South West Pacific theatre
        of World War II and, equipped with English Electric Canberra jets, in the
        Malayan Emergency and the Vietnam War.'
    - title: English Electric Canberra
      sentence: The English Electric Canberra is a British first-generation jet-powered
        medium bomber that was manufactured during the 1950s.
    sources:
    - id: No. 2 Squadron RAAF
      content: No. 2 Squadron is a Royal Australian Air Force (RAAF) squadron that
        operates from RAAF Base Williamtown, near Newcastle, New South Wales.  From
        its formation in 1916 as part of the Australian Flying Corps, it has flown
        a variety of aircraft types including fighters, bombers, and Airborne Early
        Warning & Control (AEW&C).  During World War I, the squadron operated on the
        Western Front conducting fighter sweeps and ground-attack missions.  It was
        disbanded in mid-1919, following the end of hostilities.  The squadron was
        briefly re-raised in 1922 as part of the newly independent RAAF, but was disbanded
        after only a couple of months and not reformed until 1937.  It saw action
        as a bomber unit in the South West Pacific theatre of World War II and, equipped
        with English Electric Canberra jets, in the Malayan Emergency and the Vietnam
        War.  The squadron was again disbanded in 1982, following the retirement of
        the Canberra.  It was re-formed in 2000 to operate the Boeing 737 AEW&C "Wedgetail".  One
        of the six Boeing 737s was deployed to the Middle East in September 2014,
        as part of Australia's contribution to the military coalition against ISIS.
    - id: South West Pacific theatre of World War II
      content: The South West Pacific theatre, during World War II, was a major theatre
        of the war between the Allies and Japan.  It included the Philippines, the
        Dutch East Indies (except for Sumatra), Borneo, Australia and its mandate
        Territory of New Guinea (including the Bismarck Archipelago) and the western
        part of the Solomon Islands.  This area was defined by the Allied powers'
        South West Pacific Area (SWPA) command.
    - id: English Electric Canberra
      content: The English Electric Canberra is a British first-generation jet-powered
        medium bomber that was manufactured during the 1950s.  It was developed by
        English Electric during the mid-to-late 1940s in response to a 1944 Air Ministry
        requirement for a successor to the wartime de Havilland Mosquito fast-bomber.  Amongst
        the performance requirements for the type was the demand for an outstanding
        high altitude bombing capability in addition to flying at high speeds.  These
        were partly accomplished by making use of newly developed jet propulsion technology.  When
        the Canberra was introduced to service with the Royal Air Force (RAF), the
        type's first operator, in May 1951, it became the service's first jet-powered
        bomber aircraft.
    - id: Asiatic-Pacific Theater
      content: The Asiatic-Pacific Theater, was the theater of operations of U.S.
        forces during World War II in the Pacific War during 1941-45.  From mid-1942
        until the end of the war in 1945, there were two U.S. operational commands
        in the Pacific.  The Pacific Ocean Areas (POA), divided into the Central Pacific
        Area, the North Pacific Area and the South Pacific Area, were commanded by
        Admiral Chester W. Nimitz, Commander-in-Chief Pacific Ocean Areas.  The South
        West Pacific Area (SWPA) was commanded by General Douglas MacArthur, Supreme
        Allied Commander South West Pacific Area.  During 1945, the United States
        added the United States Strategic Air Forces in the Pacific, commanded by
        General Carl A. Spaatz.
    - id: Savoia-Marchetti SM.79
      content: The Savoia-Marchetti SM.79 "Sparviero" (Italian for sparrowhawk) was
        a three-engined Italian medium bomber with a wood-and-metal structure.  Originally
        designed as a fast passenger aircraft, between 1937 and 1939 this low-wing
        monoplane set 26 world records, qualifying it for some time as the fastest
        medium bomber in the world.  It first saw action during the Spanish Civil
        War and flew on all fronts in which Italy was involved during World War II.  It
        achieved success as a torpedo bomber in the Mediterranean theater, and became
        the best-known Italian aeroplane of the war.  It was easily recognizable due
        to its distinctive fuselage dorsal "hump", and was well liked by its crews,
        who nicknamed it "il gobbo maledetto" ("damned hunchback").
    - id: South West Pacific Area (command)
      content: South West Pacific Area (SWPA) was the name given to the Allied supreme
        military command in the South West Pacific Theatre of World War II.  It was
        one of four major Allied commands in the Pacific War.  SWPA included the Philippines,
        Borneo, the Dutch East Indies (excluding Sumatra), East Timor, Australia,
        the Territories of Papua and New Guinea, and the western part of the Solomon
        Islands.  It primarily consisted of United States and Australian forces, although
        Dutch, Filipino, British and other Allied forces also served in the SWPA.
    - id: Tupolev Tu-12
      content: The Tupolev Tu-12 (development designation Tu-77) was an experimental
        Soviet jet-powered medium bomber developed from the successful piston-engined
        Tupolev Tu-2 bomber after the end of World War II.  It was designed as a transitional
        aircraft to familiarize Tupolev and the VVS with the issues involved with
        jet-engined bombers.
    - id: No. 12 Squadron RAAF
      content: No. 12 Squadron was a Royal Australian Air Force (RAAF) general purpose,
        bomber and transport squadron.  The squadron was formed in 1939 and saw combat
        in the South West Pacific theatre of World War II.  From 1941 to 1943, it
        mainly conducted maritime patrols off northern Australia.  The squadron was
        based at Merauke in western New Guinea from November 1943 to July 1944, when
        it was withdrawn from operations.  After being re-equipped, it operated as
        a heavy bomber unit from February 1945 until the end of the war.  The squadron
        continued in this role until it was redesignated No. 1 Squadron RAAF in February
        1948.  The squadron was reformed in 1973 to operate transport helicopters
        but was again disbanded in 1989.
    - id: Coastwatchers
      content: The Coastwatchers, also known as the Coast Watch Organisation, Combined
        Field Intelligence Service or Section C, Allied Intelligence Bureau, were
        Allied military intelligence operatives stationed on remote Pacific islands
        during World War II to observe enemy movements and rescue stranded Allied
        personnel.  They played a significant role in the Pacific Ocean theatre and
        South West Pacific theatre, particularly as an early warning network during
        the Guadalcanal campaign.
    - id: Edwin A. Doss
      content: Edwin A. Doss (September 14, 1914January 7, 1996) was an American fighter
        pilot and commander in the U.S. Air Force during World War II and Korean War.  Logging
        more than 4,500 flying hours, Doss flew 573 combat hours and accrued 280 combat
        missions during his leadership in the South West Pacific Theatre and Korean
        War.  For his two-year service as commander of the 35th Fighter Group during
        World War II, Doss was awarded the Distinguished Flying Cross, Legion of Merit,
        and the Air Medal.  He received his second Legion of Merit and the Korean
        Ulchi medal with a Silver Star for his assignments as commander of the 49th
        Fighter Bomber Wing and the 3rd Bomber Wing at Kunsan, Korea.  Colonel Doss’s
        service has been cited as integral to the development of long-range fighter
        tactics in the South West Pacific Theater.
