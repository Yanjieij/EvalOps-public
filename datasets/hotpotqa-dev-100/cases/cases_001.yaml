    - title: Alfred Balk
      sentence: Alfred Balk (July 24, 1930 – November 25, 2010) was an American reporter,
        nonfiction author and magazine editor who wrote groundbreaking articles about
        housing segregation, the Nation of Islam, the environment and Illinois politics.
    - title: Alfred Balk
      sentence: ' During a career-long emphasis on media improvement, he served on
        the Twentieth Century Fund''s task force that established a National News
        Council, consulted for several foundations, served as secretary of New York
        Governor Nelson Rockefeller''s Committee on the Employment of Minority Groups
