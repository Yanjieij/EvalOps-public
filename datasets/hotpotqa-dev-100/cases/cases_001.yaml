      1939 this low-wing monoplane set 26 world records, qualifying it for some time
      as the fastest medium bomber in the world.  It first saw action during the Spanish
      Civil War and flew on all fronts in which Italy was involved during World War
      II.  It achieved success as a torpedo bomber in the Mediterranean theater, and
      became the best-known Italian aeroplane of the war.  It was easily recognizable
      due to its distinctive fuselage dorsal "hump", and was well liked by its crews,
      who nicknamed it "il gobbo maledetto" ("damned hunchback").


      [South West Pacific Area (command)] South West Pacific Area (SWPA) was the name
      given to the Allied supreme military command in the South West Pacific Theatre
      of World War II.  It was one of four major Allied commands in the Pacific War.  SWPA
      included the Philippines, Borneo, the Dutch East Indies (excluding Sumatra),
      East Timor, Australia, the Territories of Papua and New Guinea, and the western
      part of the Solomon Islands.  It primarily consisted of United States and Australian
      forces, although Dutch, Filipino, British and other Allied forces also served
      in the SWPA.


      [Tupolev Tu-12] The Tupolev Tu-12 (development designation Tu-77) was an experimental
      Soviet jet-powered medium bomber developed from the successful piston-engined
      Tupolev Tu-2 bomber after the end of World War II.  It was designed as a transitional
      aircraft to familiarize Tupolev and the VVS with the issues involved with jet-engined
      bombers.


      [No. 12 Squadron RAAF] No. 12 Squadron was a Royal Australian Air Force (RAAF)
      general purpose, bomber and transport squadron.  The squadron was formed in
      1939 and saw combat in the South West Pacific theatre of World War II.  From
      1941 to 1943, it mainly conducted maritime patrols off northern Australia.  The
      squadron was based at Merauke in western New Guinea from November 1943 to July
      1944, when it was withdrawn from operations.  After being re-equipped, it operated
      as a heavy bomber unit from February 1945 until the end of the war.  The squadron
      continued in this role until it was redesignated No. 1 Squadron RAAF in February
      1948.  The squadron was reformed in 1973 to operate transport helicopters but
      was again disbanded in 1989.


      [Coastwatchers] The Coastwatchers, also known as the Coast Watch Organisation,
      Combined Field Intelligence Service or Section C, Allied Intelligence Bureau,
      were Allied military intelligence operatives stationed on remote Pacific islands
      during World War II to observe enemy movements and rescue stranded Allied personnel.  They
      played a significant role in the Pacific Ocean theatre and South West Pacific
      theatre, particularly as an early warning network during the Guadalcanal campaign.


      [Edwin A. Doss] Edwin A. Doss (September 14, 1914January 7, 1996) was an American
      fighter pilot and commander in the U.S. Air Force during World War II and Korean
      War.  Logging more than 4,500 flying hours, Doss flew 573 combat hours and accrued
      280 combat missions during his leadership in the South West Pacific Theatre
      and Korean War.  For his two-year service as commander of the 35th Fighter Group
      during World War II, Doss was awarded the Distinguished Flying Cross, Legion
      of Merit, and the Air Medal.  He received his second Legion of Merit and the
      Korean Ulchi medal with a Silver Star for his assignments as commander of the
      49th Fighter Bomber Wing and the 3rd Bomber Wing at Kunsan, Korea.  Colonel
      Doss’s service has been cited as integral to the development of long-range fighter
      tactics in the South West Pacific Theater.'
