    supporting_sentences:
    - title: Elko Regional Airport
      sentence: 'Elko Regional Airport (IATA: EKO, ICAO: KEKO, FAA LID: EKO) , formerly
        Elko Municipal Airport, is a mile west of downtown Elko, in Elko County, Nevada.'
    - title: Gerald R. Ford International Airport
      sentence: 'Gerald R. Ford International Airport (IATA: GRR, ICAO: KGRR, FAA
        LID: GRR) is a commercial airport in Cascade Township approximately 13 mi
        southeast of Grand Rapids, Michigan.'
    sources:
    - id: Grantley Adams International Airport
      content: 'Grantley Adams International Airport (GAIA) (IATA: BGI, ICAO: TBPB)
        is the international airport of Barbados, located in Seawell, Christ Church.  It
        is the only designated port of entry for persons arriving and departing by
        air in Barbados and operates as a major gateway to the Eastern Caribbean.  The
        airport has direct service to destinations in the United States, Canada, Central
        America and Europe and serves as the second hub for LIAT.  In 2016, the airport
        was the 8th busiest airport in the Caribbean region; and the third busiest
        airport in the Lesser Antilles; after Queen Beatrix International Airport
        located in Aruba, and Pointe-à-Pitre International Airport located in the
        Republic of France within the island of Guadeloupe.  GAIA, also remains an
        important air-link for cruise ship passengers departing and arriving at the
        Port of Bridgetown, and a base of operations for the Regional Security System
        (RSS), and the Regional (Caribbean) Police Training Centre.'
    - id: Pensacola International Airport
      content: 'Pensacola International Airport (IATA: PNS, ICAO: KPNS, FAA LID: PNS)
        , formerly Pensacola Gulf Coast Regional Airport and Pensacola Regional Airport
        (Hagler Field), is a public use airport three nautical miles (6 km) northeast
        of the central business district of Pensacola, in Escambia County, Florida,
        United States.  It is owned by the City of Pensacola.  Despite the name, this
        airport does not offer direct international flights.  This airport is one
        of the five major airports in North Florida, others being: Northwest Florida
        Beaches International Airport, Destin-Fort Walton Beach Airport Tallahassee
        International Airport, and Jacksonville International Airport.'
    - id: Elko Regional Airport
      content: 'Elko Regional Airport (IATA: EKO, ICAO: KEKO, FAA LID: EKO) , formerly
        Elko Municipal Airport, is a mile west of downtown Elko, in Elko County, Nevada.'
    - id: Gerald R. Ford International Airport
      content: 'Gerald R. Ford International Airport (IATA: GRR, ICAO: KGRR, FAA LID:
        GRR) is a commercial airport in Cascade Township approximately 13 mi southeast
        of Grand Rapids, Michigan.  The facility is owned by the Kent County Board
        of Commissioners and managed by an independent authority.  The Federal Aviation
        Administration (FAA) National Plan of Integrated Airport Systems for 2017–2021
        categorized it as a small hub primary commercial service facility.'
    - id: Pre-Commissioning Unit
      content: A pre-commissioning unit (PRECOMMUNIT) or (PCU) is used by the United
        States Navy to describe vessels under construction prior to their official
        commissioning.  For example, prior to its commissioning, the aircraft carrier
        "Gerald R. Ford" (CVN-78) has been described by the Navy as "pre-commissioning
        unit (PCU) "Gerald R. Ford" ."  However, "PCU" is only a descriptive term
        and is not a prefix or a part of the ship's official name.  Until they are
        commissioned, U.S. Navy vessels are officially identified by their given name
        and hull number only with no prefix, such as "Gerald R. Ford" (CVN-78).
    - id: John Glenn Columbus International Airport
      content: 'John Glenn Columbus International Airport (IATA: CMH, ICAO: KCMH, FAA
        LID: CMH) , is an international airport located 6 mi east of downtown Columbus,
        Ohio.  Formerly known as Port Columbus International Airport, it is managed
        by the Columbus Regional Airport Authority, which also oversees operations
        at Rickenbacker International Airport and Bolton Field.  The airport code
        ''CMH'' stands for "Columbus Municipal Hangar," the original name for the
        airport.'
    - id: Raleigh Executive Jetport
      content: 'Raleigh Exec: The Raleigh Executive Jetport @ Sanford-Lee County or
        Raleigh Exec Jetport at Sanford-Lee CountyFAA Airport Master Record for TTA
        (Form 5010 ) (ICAO: KTTA, FAA LID: TTA) is a public use airport located seven nautical
        miles (8 mi, 13 km) northeast of the central business district of Sanford,
        a city in Lee County, North Carolina, United States.  It is owned by the Sanford-Lee
        County Regional Airport Authority and was previously known as Sanford-Lee
        County Regional Airport.  This airport is included in the National Plan of
        Integrated Airport Systems for 2011–2015, which categorized it as a "reliever
        airport" for Raleigh-Durham International Airport.'
    - id: Bishop International Airport
      content: 'Bishop International Airport (IATA: FNT, ICAO: KFNT, FAA LID: FNT)
        is a commercial and general aviation airport located in Flint, Michigan.  It
        is named after banker and General Motors board member Arthur Giles Bishop
        (April 12, 1851 – January 22, 1944), who donated 220 acres of his farmland
        for the airport in 1928.  The third busiest airport in Michigan, it surpassed
        competitor MBS International Airport in terms of airline operations in 2002.  In
        2007, 1,071,238 passengers used Bishop International Airport; in 2011, 938,914
        passengers used the airport.  It is included in the Federal Aviation Administration
        (FAA) National Plan of Integrated Airport Systems for 2017–2021, in which
        it is categorized as a small hub primary commercial service facility.  The
        airport is currently served by several passenger airlines: Allegiant Air,
        Southwest Airlines and Delta Air Lines operate mainline service out of the
        airport, as well as affiliates of Delta Connection, United Express and American
        Eagle.  Additionally, FedEx Express and a FedEx Feeder affiliate operate cargo
        services out of the airport.  Accompanying the airlines is fixed-base operator
        Av Flight that handles both general aviation and airline operations and the
        flight school American Wings Aviation.  Bishop International Airport is in
        southwestern Flint, and is surrounded by Flint Township to the north, east
        and west; and Mundy Township to the south.'
    - id: Gerald R. Ford Freeway
      content: 'The Gerald R. Ford Freeway refers to Interstate Highways named for
        former President Gerald R. Ford in Omaha (where he was born) and Michigan
        (where he grew up and was a Congressman):'
    - id: Gerald R. Ford Presidential Library
      content: The Gerald R. Ford Presidential Library is a repository located on
        the north campus of the University of Michigan in Ann Arbor.  The library
        houses archival materials on the life, career, and presidency of Gerald Ford,
        the 38th President of the United States.  The Gerald R. Ford Presidential
        Library is a part of the National Archives and Records Administration's presidential
        library system.
