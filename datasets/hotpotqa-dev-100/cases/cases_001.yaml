  input:
    query: 'Which dog''s ancestors include Gordon and Irish Setters: the Manchester
      Terrier or the Scotch Collie?'
    collection: hotpotqa-distractor
    top_k: 10
  expected:
    answer: Scotch Collie
    aliases: []
    source_ids:
    - Manchester Terrier
    - Scotch Collie
    supporting_sentences:
    - title: Manchester Terrier
      sentence: The Manchester Terrier is a breed of dog of the smooth-haired terrier
        type.
    - title: Scotch Collie
      sentence: The Scotch Collie is a landrace breed of dog which originated from
        the highland regions of Scotland.
    - title: Scotch Collie
      sentence: ' Other ancestors include the Gordon and Irish Setters.'
    sources:
    - id: Teddy Roosevelt Terrier
      content: The Teddy Roosevelt Terrier is a small to medium-sized American hunting
        terrier.  Lower-set with shorter legs, more muscular, and heavier bone density
        than its cousin the American Rat Terrier.  There is much diversity in the
        history of the Teddy Roosevelt Terrier breed and it shares a common early
        history with the American Rat Terrier, Fox Paulistinha and Tenterfield Terrier.  It
        is said the Rat Terrier background stems from the terriers or other dogs that
        were brought over by early English and other working class immigrants.  Since
        the breed was a farm, hunting and utility dog there was little to no planned
        breeding other than breeding dogs with agreeable traits to each other in order
        to produce the desired work ethic in the dog.  It is assumed that the Feist
        (dog), Bull Terrier, Smooth Fox Terrier, Manchester Terrier, Whippet, Italian
        Greyhound, the now extinct English White Terrier, Turnspit dog and or Wry
        Legged Terrier all share in the Teddy Roosevelt Terrier's ancestry.  These
        early Ratting Terriers were then most likely bred to the Beagle or Beagle
        cross bred dogs (for increased scenting ability) and other dogs.  Maximizing
        the influences from these various breeds provides the modern Teddy Roosevelt
        Terrier with a keen sense of awareness and prey drive, an acute sense of smell
        and a very high intellect.  Although they tend to be aloof with strangers
        they are devoted companion dogs with a strong desire to please and be near
        their owners side at all times.
    - id: Manchester Terrier
      content: The Manchester Terrier is a breed of dog of the smooth-haired terrier
        type.
    - id: Feist (dog)
      content: A Feist is a small hunting dog, descended from the terriers brought
        over to the United States by English miners and other working class immigrants.  These
        terriers probably included crosses between the Smooth Fox Terrier, the Manchester
        Terrier and the now extinct English White Terrier.  These dogs were used as
        ratters, and gambling on their prowess in killing rats was a favorite hobby
        of their owners.  Some of these dogs have been crossed with Whippets or Italian
        Greyhounds (for speed) and Beagles (for hunting ability) - extending the family
        to include a larger variety of purpose than the original ratter, or Rat Terrier.
    - id: English Setter
      content: The English Setter is a medium size breed of dog.  It is part of the
        Setter family, which includes the red Irish Setters, Irish Red and White Setters,
        and black-and-tan Gordon Setters.  The mainly white body coat is of medium
        length with long silky fringes on the back of the legs, under the belly and
        on the tail.  The coat features flecks of colour, and the different colour
        varieties are referred to as belton.
    - id: Russkiy Toy
      content: 'The Russian Toy (also known as the Russian Toy Terrier, and in Russia
        as the Russkiy Toy, Toychik,Russian: Русский той, Тойчик ) is a very small
        breed of dog originally bred in Russia from the English Toy Terrier which
        is known today as the Manchester Terrier.  There are two types of coats in
        the breed: smooth coat and long coat.  The smooth-coated variety was previously
        known as the Russian Toy Terrier and long-coated as the Moscow Long Haired
        Toy Terrier.  Both were brought together under the same Russian Toy Terrier
        name in 1988 and the "Terrier" was dropped from the name when the breed was
        added in 2006 to the official list of breeds registered with the Fédération
        Cynologique Internationale and has been registered in the Foundation Stock
        Service of the American Kennel Club since 2008, allowed to compete in AKC
        companion events since 2010.  The first official breed standard of the two
        varieties was written in 1966 in Russia.'
    - id: Viol
      content: The viol , viola da gamba ] , or (informally) gamba, is any one of
        a family of bowed, fretted and stringed instruments with hollow wooden bodies
        and pegboxes where the tension on the strings can be increased or decreased
        to adjust the pitch of each of the strings.  Frets on the viol are usually
        made of gut, tied on the fingerboard around the instrument's neck, to enable
        the performer to stop the strings more cleanly.  Frets improve consistency
        of intonation and lend the stopped notes a tone which better matches the open
        strings.  Viols first appeared in Spain in the mid to late 15th century and
        were most popular in the Renaissance and Baroque (1600-1750) periods.  Early
        ancestors include the Arabic "rebab" and the medieval European vielle, but
        later, more direct possible ancestors include the Venetian "viole" and the
        15th- and 16th-century Spanish "vihuela", a 6-course plucked instrument tuned
        like a lute (and also like a present-day viol) that looked like but was quite
        distinct from (at that time) the 4-course guitar (an earlier chordophone).
    - id: Collie
      content: The collie is a distinctive type of herding dog, including many related
        landraces and standardised breeds.  The type originated in Scotland and Northern
        England.  The collie is a medium-sized, fairly lightly built dog, with a pointed
        snout.  Many types have a distinctive white pattern over the shoulders.  Collies
        are very active and agile, and most types of collies have a very strong herding
        instinct.  Collie breeds have spread through many parts of the world (especially
        Australia and North America) and have diversified into many varieties, sometimes
        with mixture from other dog types.  Some collie breeds have remained as working
        dogs, used for herding cattle, sheep and other livestock, while others are
        kept as pets, show dogs or for dog sports, in which they display great agility,
        stamina and trainability.  While the AKC has a breed they call "Collie", in
        fact collie dogs are a distinctive type of herding dog including many related
        landraces and formal breeds.  There are usually major distinctions between
        show dogs and those bred for herding trials or dog sports.  They typically
        display great agility, stamina and trainability and more importantly sagacity.
    - id: Scotch Collie
      content: The Scotch Collie is a landrace breed of dog which originated from
        the highland regions of Scotland.  The breed consisted of both the long-haired
        (now known as Rough) Collie and the short-haired (now known as Smooth) Collie.  It
        is generally believed to have descended from a variety of ancient herding
        dogs, some dating back to the Roman occupation, which may have included Roman
        Cattle Dogs, Native Celtic Dogs and Viking Herding Spitzes.  Other ancestors
        include the Gordon and Irish Setters.
    - id: Toy Manchester Terrier
      content: The Toy Manchester Terrier is a breed of dog, categorized as a terrier.  The
        breed was bred down in size in North America from the Manchester Terrier,
        and is placed in the Toy Group by the American Kennel Club and the Canadian
        Kennel Club (the Manchester Terrier is placed in the Terrier Group.)  Neither
        the Fédération Cynologique Internationale nor The Kennel Club recognize a
        Toy variety of the Manchester Terrier.
    - id: Florence Nagle
      content: Florence Nagle (26 October 1894 – 30 October 1988) was a trainer and
        breeder of racehorses, a breeder of pedigree dogs, and an active feminist.  Nagle
        purchased her first Irish Wolfhound in 1913, and went on to own or breed twenty-one
        United Kingdom Champions.  Best in Show at Crufts in 1960 was awarded to Sulhamstead
        Merman, who was bred, owned and exhibited by Nagle.  She also competed successfully
        in field trials with Irish Setters, from the 1920s until the mid-1960s resulting
        in eighteen Field Trial Champions.  The male dog who was a linchpin in the
        1970s revival of the Irish Red and White Setter breed was descended from one
        of Nagle's Irish Setters.
