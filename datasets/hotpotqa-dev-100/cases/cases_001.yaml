      [Gerald Ford] Gerald Rudolph Ford Jr. (born Leslie Lynch King Jr.; July 14,
      1913 – December 26, 2006) was an American politician who served as the 38th
      President of the United States from August 1974 to January 1977, following the
      resignation of Richard Nixon.  Prior to this he served eight months as the 40th
      Vice President of the United States, following the resignation of Spiro Agnew.  He
      was the first person appointed to the vice presidency under the terms of the
      25th Amendment, and consequently the only person to have served as both Vice
      President and President of the United States without being elected to executive
      office.  Before his appointment to the vice presidency, Ford served 25 years
      as U.S. Representative from Michigan''s 5th congressional district, the final
      nine of them as the House Minority Leader.


      [Nelson Rockefeller] Nelson Aldrich Rockefeller (July 8, 1908 – January 26,
      1979) was an American businessman and politician.  He served as the 41st Vice
      President of the United States from 1974 to 1977, and previously as the 49th
      Governor of New York (1959–1973).  He also served as Assistant Secretary of
      State for American Republic Affairs for Presidents Franklin D. Roosevelt and
      Harry S. Truman as well as Under Secretary of Health, Education and Welfare
      under Dwight D. Eisenhower.  A member of the wealthy Rockefeller family, he
      was also a noted art collector, as well as administrator of Rockefeller Center
      in Manhattan, New York.


      [Robert Nyce] Robert E. Nyce is a former Republican member of the Pennsylvania
      House of Representatives.  A graduate of Northampton Area Senior High School,
      Northampton, PA and Moravian College, Bethlehem, PA for over twenty years he
      was a tax professional working at Lehigh Portland Cement Company, Allentown,
      PA from 1970 to 1973, Manager, Credit Taxes, Insurance and Payroll at Frick
      Company, Waynesboro, PA from 1973 to 1975, Senior Tax Accountant for Bethlehem
      Steel Corporation from 1975 to 1985 and Asst. Vice President, Taxes for Chrysler
      First, Inc., Allentown, PA from 1985 to 1990.  He was a member of the Tax Executives
      Institute including Chairman of the State Tax Committee in the 1980s.  During
      his private sector employment, Mr. Nyce was active in his community of East
      Allen Township.  From 1979 to 1984 he served as a member and Chairman of the
      East Allen Township Municipal Authority and again from 2007 to 2013 as a member
      and Treasurer.  From 2011 to 2013 Mr. Nyce negotiated and helped close the sale
      of the East Allen Township Municipal Authority''s assets to The City of Bethlehem
      and the Bath Borough Municipal Authority thereby ensuring high quality service
      of water and sewer for the future for all residents of East Allen Township.  From
      1984 to 1990, Mr. Nyce served on the Northampton Area School District Board
      of Directors as member, Vice Chairman and Chairman.  He also served on the Bethlehem
      Area Vocational Technical School Joint Operating Committee as member, Vice Chairman
      and Chairman.  In both capacities, he was responsible for normal business operations
      and participated in union contract negotiations with staff.  In 1990, Mr. Nyce
      ran for and was elected State Representative for the 138th PA House District
      encompassing parts of Northampton and Monroe Counties.  During his three terms
      in the House of Representatives he served on several important committees: Education,
      Local Government, Fish and Game, Finance to name a few.  In 1996 he ran for
      PA Auditor General in an unsuccessful bid to represent the people of PA as their
      financial watchdog.  Following the campaign, he was hired as the Executive Director
      of the Pennsylvania Independent Regulatory Review Commission (IRRC).  Mr. Nyce
      served for eight years in that capacity overseeing two major revisions to the
      Regulatory Review Act and many significant regulatory issues facing the residents
      of Pennsylvania.  The PA IRRC reviews all regulations promulgated in PA and
      provides citizens an opportunity to comment on and affect those regulations
      prior to their promulgation by the state agency that authored the regulation.  The
      two exceptions are the PA Fish and Boat Commission and the PA Game Commission
