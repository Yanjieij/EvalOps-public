    - id: Hailstorm Alley
      content: Hailstorm Alley is a colloquial term referring to an area of south
        and central Alberta, Canada where hail storms are frequently produced.  These
        storms frequently produce hail that is damaging to property.  This area stretches
        from High River in southern Alberta, northward through Calgary, through Red
        Deer to Lacombe and then westward to Rocky Mountain House.  It is known to
        be one of the worst areas in the world for damaging hail produced by thunderstorms.  These
        are regarded as loose boundaries.  While this area is common for damaging
        hailstorms, the reality is damaging hailstorms occur over much of central
        and southern Alberta every summer.  The City of Calgary is regarded as the
        hailstorm capital of Canada.
    - id: Dewey Beard
      content: Dewey Beard or Wasú Máza ("Iron Hail", 1858–1955) was a Minneconjou
        Lakota who fought in the Battle of Little Bighorn as a teenager.  After George
        Armstrong Custer's defeat, Wasu Maza followed Sitting Bull into exile in Canada
        and then back to South Dakota where he lived on the Cheyenne River Indian
        Reservation.  Chief Iron Hail is often mistaken by historians for Chief Iron
        Tail, being Lakota contemporaries with similar-sounding names.  Most biographies
        incorrectly report that Chief Iron Tail fought in the Battle of the Little
        Bighorn and that his family was killed in 1890 at Wounded Knee, when in truth
        it was Chief Iron Hail who suffered the loss.
    - id: Kyo (musician)
