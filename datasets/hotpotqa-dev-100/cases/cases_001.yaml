    supporting_sentences:
    - title: Dictyosperma
      sentence: Dictyosperma is a monotypic genus of flowering plant in the palm family
        found in the Mascarene Islands in the Indian Ocean (Mauritius, Réunion and
        Rodrigues).
    - title: Huernia
      sentence: The genus Huernia (family Apocynaceae, subfamily Asclepiadoideae)
        consists of stem succulents from Eastern and Southern Africa, first described
        as a genus in 1810.
    sources:
    - id: Dictyosperma
      content: Dictyosperma is a monotypic genus of flowering plant in the palm family
        found in the Mascarene Islands in the Indian Ocean (Mauritius, Réunion and
        Rodrigues).  The sole species, Dictyosperma album, is widely cultivated in
        the tropics but has been farmed to near extinction in its native habitat.  It
        is commonly called princess palm or hurricane palm, the latter owing to its
        ability to withstand strong winds by easily shedding leaves.  It is closely
        related to, and resembles, palms in the "Archontophoenix" genus.  The genus
        is named from two Greek words meaning "net" and "seed" and the epithet is
        Latin for "white", the common color of the crownshaft at the top of the trunk.
    - id: Huernia
      content: The genus Huernia (family Apocynaceae, subfamily Asclepiadoideae) consists
        of stem succulents from Eastern and Southern Africa, first described as a
        genus in 1810.  The flowers are five-lobed, usually somewhat more funnel-
        or bell-shaped than in the closely related genus "Stapelia", and often striped
        vividly in contrasting colours or tones, some glossy, others matt and wrinkled
        depending on the species concerned.  To pollinate, the flowers attract flies
        by emitting a scent similar to that of carrion.  The genus is considered close
        to the genera "Stapelia" and "Hoodia".  The name is in honour of Justin Heurnius
        (1587–1652) a Dutch missionary who is reputed to have been the first collector
        of South African Cape plants.  His name was actually mis-spelt by the collector.
    full_context: '[Dictyosperma] Dictyosperma is a monotypic genus of flowering plant
      in the palm family found in the Mascarene Islands in the Indian Ocean (Mauritius,
      Réunion and Rodrigues).  The sole species, Dictyosperma album, is widely cultivated
      in the tropics but has been farmed to near extinction in its native habitat.  It
      is commonly called princess palm or hurricane palm, the latter owing to its
      ability to withstand strong winds by easily shedding leaves.  It is closely
      related to, and resembles, palms in the "Archontophoenix" genus.  The genus
      is named from two Greek words meaning "net" and "seed" and the epithet is Latin
      for "white", the common color of the crownshaft at the top of the trunk.


      [Huernia] The genus Huernia (family Apocynaceae, subfamily Asclepiadoideae)
      consists of stem succulents from Eastern and Southern Africa, first described
      as a genus in 1810.  The flowers are five-lobed, usually somewhat more funnel-
      or bell-shaped than in the closely related genus "Stapelia", and often striped
      vividly in contrasting colours or tones, some glossy, others matt and wrinkled
      depending on the species concerned.  To pollinate, the flowers attract flies
      by emitting a scent similar to that of carrion.  The genus is considered close
      to the genera "Stapelia" and "Hoodia".  The name is in honour of Justin Heurnius
      (1587–1652) a Dutch missionary who is reputed to have been the first collector
      of South African Cape plants.  His name was actually mis-spelt by the collector.'
