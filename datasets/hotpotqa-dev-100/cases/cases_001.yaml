    sources:
    - id: Hackers (film)
      content: 'Hackers is a 1995 American crime film directed by Iain Softley and
        starring Jonny Lee Miller, Angelina Jolie, Renoly Santiago, Matthew Lillard,
        Jesse Bradford, Lorraine Bracco, and Fisher Stevens.  The film follows a group
        of high school hackers and their involvement in a corporate extortion conspiracy.  Made
        in the 1990s when the internet was unfamiliar to the general public, it reflects
        the ideals laid out in the Hacker Manifesto quoted in the film: "This is our
        world now... the world of the electron and the switch [...] We exist without
        skin color, without nationality, without religious bias... and you call us
        criminals.  [...] Yes, I am a criminal.  My crime is that of curiosity."  "Hackers"
        has achieved cult classic status.'
    - id: Freakonomics Radio
      content: Freakonomics Radio is an American public radio program which discusses
        socioeconomic issues for a general audience.  The show is a spin-off of the
        2005 book "Freakonomics".  Journalist Stephen Dubner hosts the show, with
        economist Steven Levitt as a regular guest.  The show is also distributed
        as a podcast, and is among the most popular on iTunes.  Created in September
        2010, it is a weekly podcast.  Twice a year, a series of one-hour "Freakonomics
        Radio" specials air on public-radio stations around the country.
    - id: Heidi Ewing
      content: 'Heidi Ewing is a director, producer, and writer of documentary films.  She
        and Rachel Grady founded Loki Films in 2001, and have collaborated on several
        documentaries together.  She is best known as the co-director of "Jesus Camp",
        which was nominated for an Academy Award for best documentary in 2006.  Next
        came"12th & Delaware" (HBO), which premiered at the 2010 Sundance Film Festival.  The
        film "casts a heart-rending light on the abortion divide" (LA Times) and was
        honored with a Peabody Award.  "Detropia", a poetic look at Ewing''s home
        town, also won several awards, including Best Editing at Sundance 2012, Outstanding
        Direction and Outstanding Original Score, at the 2013 Cinema Eye Honors for
        Nonfiction Filmmaking and a News and Documentary Emmy for editing.  "Norman
        Lear: Just Another Version of You" was the opening night selection of the
        2016 Sundance Film Festival and premiered on PBS American Masters on October
        25, 2016.  Other films as a director include "The Boys of Baraka", "Freakonomics",
        and "The Education of Mohammed Hussein".'
    - id: Shayne Workman
      content: 'Shayne Workman (born December 5, 1978) is an American author, actor,
        theatre director and stage manager.  His first work, '':A Journey to the Spirit
        Realm", was published in late autumn 2014.  It was later added to his anthology,
        "The Spirit Realm: An Anthology of Fables From The Spirit Realm".  He has
        also penned, The Diary Of A Vagabond King, an inspiring true account of his
        personal experiences over the course of two years, where he was faced with
        impossible odds, and tragic losses.  The royalties from the sale of the book
        will be going towards the creation and operation of the Blue Purity Fund created
        for aiding organizations with programs aimed at getting the nations homeless
        off the streets and back into being full members of society.'
    - id: Jay Leiderman
      content: Jason Scott "Jay" Leiderman (born April 12, 1971) is an American criminal
        defense lawyer based in Ventura, California. " The Atlantic" Magazine called
        Leiderman the "Hacktivist’s Advocate" for his work defending hacker-activists
        accused of computer crimes, or so-called (“Hacktivism”) especially people
        associated with Anonymous.  Leiderman "keeps an encrypted chat app open at
        all times so he can dispense ad hoc pro bono legal advice to members of Anonymous"
        Buzzfeed called Leiderman "The Maserati-Driving Deadhead Lawyer Who Stands
        Between Hackers And Prison" and stated he was "A medical marijuana and criminal
        defense lawyer from Southern California [who] has made himself into the country’s
        leading defender of hackers."
    - id: Peter W. Smith
      content: Peter W. Smith (February 23, 1936 – May 14, 2017) was an American investment
        banker from Chicago.  He had a 40-year career managing corporate acquisitions
        and venture investments.  He was active in Republican politics.  In 1998 he
        was identified as a major financial supporter of the 1993 Troopergate story,
        in which several Arkansas state troopers accused U.S. President Bill Clinton
        of having carried out sexual dalliances while he was Governor of Arkansas.  In
        2017 he confirmed to the "Wall Street Journal" that he had tried in 2016 to
        contact computer hackers, including Russian hackers, in an attempt to obtain
        opposition research material to use against Hillary Clinton in the 2016 presidential
        election.  Ten days after speaking to the paper, he committed suicide in a
        hotel room, citing ill health.
    - id: Psycho Realm
      content: The Psycho Realm is an American hip hop group started in 1989 by brown
        man & brothers Sick Jacken (Joaquin Gonzalez) and Big Duke (Gustavo Gonzalez)
        from the Downtown, Pico-Union area of Los Angeles.  The first recorded Psycho
        Realm song, "Scandalous," was released on the soundtrack of the film Mi Vida
        Loca in 1994.  That same year B-Real of the rap group Cypress Hill saw Psycho
        Realm performing at Olvera Street for an End Barrio Warfare concert.  Their
        performance inspired B-Real to the point that he wanted to join the group.  With
        this time period being the height of Cypress Hill’s career anything Cypress
        Hill related would get major publicity.
    - id: In the Realm of the Hackers
      content: In The Realm of the Hackers is a 2003 Australian documentary directed
        by Kevin Anderson about the prominent hacker community, centered in Melbourne,
        Australia in the late 1980s until early 1990.  The storyline is centered on
        the Australian teenagers going by the hacker names "Electron" and "Phoenix",
        who were members of an elite computer hacking group called 'The Realm' and
        hacked into some of the most secure computer networks in the world, including
        those of the US Naval Research Laboratory, Lawrence Livermore National Laboratory,
        a government lab charged with the security of the US nuclear stockpile, and
        NASA.  The film runs for 55 minutes and was inspired by the book "Underground",
        by Melbourne-based writer and academic Suelette Dreyfus.
    - id: Freakonomics (film)
      content: 'Freakonomics: The Movie is a 2010 American documentary film based
        on the 2005 book "Freakonomics: A Rogue Economist Explores the Hidden Side
        of Everything" by economist Steven D. Levitt and writer Stephen J. Dubner.  The
        film premiered at the Tribeca Film Festival in April 2010 with a theatrical
        release later in the year.  The film received a lukewarm reception and a 65%
        fresh rating at Rottentomatoes.'
    - id: Robin Goldstein
      content: Robin Goldstein is an American author, food and wine critic, and economics
        pundit.  He is known for his books and articles questioning conventional wisdom
        and pricing in the food and wine industries, particularly a widely publicized
        exposé of Wine Spectator magazine, and for his writing on the Freakonomics
        blog.  He is author of several books, including "The Wine Trials" (the world's
        bestselling guide to cheap wine), "The Beer Trials", and an upcoming book
        tentatively entitled "A Defense of Fast Food".  Goldstein was also one of
        the subjects of "Think Like a Freak", the 2014 book by "Freakonomics" authors
        Steven Levitt and Stephen Dubner.  He lives in Oakland, California.
